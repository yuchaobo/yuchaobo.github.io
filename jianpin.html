<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>绘图区</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #e8eef5;
      min-height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0;
    }

    .wrap {
      width: 95vw;
      height: 95vh;
      max-width: 100%;
      margin: 0 auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(30, 60, 90, 0.1);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .plot-wrap {
      flex: 1;
      min-height: 0;
      border: 1px solid #cbd5e1;
      border-radius: 0;
      background: #f8fafc;
      padding: 16px;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .plot-wrap svg {
      display: block;
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      cursor: crosshair;
      touch-action: none;
    }

    .plot-wrap svg.is-cut {
      cursor: default;
    }

    .user-stroke {
      fill: none;
      stroke: #dc2626;
      stroke-width: 2.5;
      stroke-dasharray: 8 6;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .para-yellow {
      fill: #fbbf24;
      stroke: #d97706;
      stroke-width: 2;
    }

    .right-angle-marker {
      fill: none;
      stroke: #dc2626;
      stroke-width: 2;
      pointer-events: none;
    }

    .cut-toolbar {
      flex-shrink: 0;
      padding: 10px 16px 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      border-top: 1px solid #e2e8f0;
      background: #fff;
    }

    .btn-reset {
      padding: 0.45rem 0.95rem;
      font-size: 0.95rem;
      color: #475569;
      background: #fff;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      cursor: pointer;
    }

    .btn-reset:hover {
      background: #f1f5f9;
    }

    .scissors-handle {
      min-width: 88px;
      padding: 0.45rem 1rem;
      font-size: 1.85rem;
      line-height: 1;
      font-weight: 600;
      color: #475569;
      background: transparent;
      border: none;
      border-radius: 10px;
      cursor: grab;
      box-shadow: none;
      user-select: none;
      touch-action: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .scissors-handle:hover:not(.is-disabled):not(.dragging) {
      opacity: 0.85;
    }

    .scissors-handle.dragging {
      cursor: grabbing;
      z-index: 10000;
      box-shadow: none;
    }

    /* 拖入上方绘图区：略右移，减轻挡住高线右侧的「高」字 */
    .scissors-handle.dragging.dragging-over-plot {
      transform: translate(36px, 0) scale(8) rotate(-90deg);
      transform-origin: center center;
      opacity: 0.88;
    }

    .scissors-handle.is-disabled {
      opacity: 0.45;
      cursor: not-allowed;
      pointer-events: none;
    }

    .para-piece {
      fill: #fbbf24;
      stroke: #d97706;
      stroke-width: 2;
    }

    .para-piece-group {
      cursor: grab;
    }

    .para-piece-group.is-dragging {
      cursor: grabbing;
    }

    .para-piece.para-piece--selected {
      stroke: #92400e;
      stroke-width: 2.5;
    }

    /* 块上的高线装饰不抢拖动命中（polygon 在下层接收事件） */
    .para-piece-group .user-stroke,
    .para-piece-group .right-angle-marker,
    .para-piece-group .height-label-item {
      pointer-events: none;
    }

    .geo-labels-layer {
      pointer-events: none;
    }

    .left-piece-drag-arrows {
      pointer-events: none;
    }

    /* 挂在 svg 根上，箭尾用全局坐标，不随左块 translate 移动 */
    .left-piece-drag-arrows-overlay {
      pointer-events: none;
    }

    .left-drag-arrow-line {
      stroke: #dc2626;
      stroke-width: 2.5;
      stroke-linecap: round;
    }

    .left-drag-arrow-head {
      fill: #dc2626;
    }

    .geo-label {
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      font-size: 18px;
      fill: #334155;
      user-select: none;
    }

  </style>
</head>

<body>
  <div class="wrap">
    <div class="plot-wrap" id="plotWrap" aria-label="绘图区域">
      <svg id="drawCanvas" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
        <g id="paraLayer">
          <polygon id="paraWhole" class="para-yellow"
            points="97,290 433,290 523,110 187,110" />
        </g>
        <!-- 用户绘制的红色虚线（在上层） -->
        <g id="userDraw" class="user-draw-layer"></g>
        <g id="geoLabelsLayer" class="geo-labels-layer"></g>
      </svg>
    </div>
    <div class="cut-toolbar">
      <button type="button" class="scissors-handle is-disabled" id="scissorsHandle"
        title="先画红色高线；每条高线可剪一次，拖到该线附近松手即沿该线剪开"
        aria-disabled="true"
        aria-label="剪刀：拖到高线附近松手剪开">✂</button>
      <button type="button" class="btn-reset" id="btnReset" title="恢复完整图形并重新使用剪刀">重置</button>
    </div>
  </div>
  <script>
    (function () {
      const NS = 'http://www.w3.org/2000/svg'
      const svg = document.getElementById('drawCanvas')
      const plotWrap = document.getElementById('plotWrap')
      const userDraw = document.getElementById('userDraw')
      const geoLabelsLayer = document.getElementById('geoLabelsLayer')
      const paraLayer = document.getElementById('paraLayer')
      const scissorsHandle = document.getElementById('scissorsHandle')
      const btnReset = document.getElementById('btnReset')
      /** 初始完整平行四边形（与 HTML 中 paraWhole 一致） */
      const PARA_WHOLE_POINTS = '97,290 433,290 523,110 187,110'
      /**
       * 每条成功画出的「高」一条记录；图中有几条未剪的高线，剪刀就可再剪几次。
       */
      let heightSegments = []
      /** 剪开后的多块：{ verts, g, userDx, userDy, baseTx, baseTy } */
      let polyPieces = []
      let isCut = false
      let pieceDrag = null
      let drawing = false
      let currentPath = null
      let pathD = ''
      /** 一次拖拽的起点 / 终点（用于松手后把「高」修正为直线） */
      let startPt = null
      let lastPt = null
      const MIN_STROKE_LEN = 3
      /** 剪开后左右块水平错开，中间留缝（viewBox 单位） */
      const SPLIT_GAP = 14
      /** 与下方 polygon 顶点顺序一致，用于竖线与边求交、限制高不超出形内 */
      const PARA_VERTICES = [
        { x: 97, y: 290 },
        { x: 433, y: 290 },
        { x: 523, y: 110 },
        { x: 187, y: 110 }
      ]
      /**
       * 竖直「高」与平行四边形相交的 x 范围（viewBox）：
       * 含从顶边到右侧斜边的区段；上界略小于 523，避免与右上顶点重合时竖直段与分割多边形退化。
       */
      const CUT_LINE_X_MIN = 97
      const CUT_LINE_X_MAX = 522.5
      /** 底边 y（与 PARA_VERTICES 底边一致） */
      const BOTTOM_EDGE_Y = PARA_VERTICES[0].y
      /** 「底」在底边中点下方 */
      const BOTTOM_LABEL_Y = BOTTOM_EDGE_Y + 22
      const BOTTOM_LABEL_X = (PARA_VERTICES[0].x + PARA_VERTICES[1].x) / 2
      /** 「高」相对高线向右偏移（viewBox 单位，text-anchor:start） */
      const HEIGHT_LABEL_OFFSET_X = 32
      function clampCutLineX (x) {
        return Math.min(Math.max(x, CUT_LINE_X_MIN), CUT_LINE_X_MAX)
      }

      /** 右侧斜边 BR(433,290) → TR(523,110) 上，给定 x 处的 y */
      function rightEdgeYAtX (x) {
        const x0 = 433
        const x1 = 523
        if (x < x0 - 1e-9 || x > x1 + 1e-9) return null
        const t = (x - x0) / (x1 - x0)
        return 290 + t * (110 - 290)
      }
      /** 左上顶点（与 PARA_VERTICES[3] 一致），起点靠近时吸附到此点 */
      const VERTEX_TOP_LEFT = PARA_VERTICES[3]
      const SNAP_VERTEX_RADIUS = 32
      /** 判断「起点、终点落在左、右斜边」时的吸附容差（viewBox） */
      const SLANTED_EDGE_SNAP_PX = 30
      /** 左斜边 TL(3)→BL(0)；右斜边 BR(1)→TR(2) */
      const LEFT_SLANT_A = PARA_VERTICES[3]
      const LEFT_SLANT_B = PARA_VERTICES[0]
      const RIGHT_SLANT_A = PARA_VERTICES[1]
      const RIGHT_SLANT_B = PARA_VERTICES[2]

      function distPointToSegment (px, py, ax, ay, bx, by) {
        const dx = bx - ax
        const dy = by - ay
        const len2 = dx * dx + dy * dy
        if (len2 < 1e-12) return Math.hypot(px - ax, py - ay)
        let t = ((px - ax) * dx + (py - ay) * dy) / len2
        t = Math.min(1, Math.max(0, t))
        const qx = ax + t * dx
        const qy = ay + t * dy
        return Math.hypot(px - qx, py - qy)
      }

      function pointNearSlantedEdge (p, ax, ay, bx, by, thresh) {
        return distPointToSegment(p.x, p.y, ax, ay, bx, by) <= thresh
      }

      /** 左、右斜边中点（水平连线为两腰「中位线」） */
      function slantEdgeMidpoints () {
        const lx = (LEFT_SLANT_A.x + LEFT_SLANT_B.x) / 2
        const ly = (LEFT_SLANT_A.y + LEFT_SLANT_B.y) / 2
        const rx = (RIGHT_SLANT_A.x + RIGHT_SLANT_B.x) / 2
        const ry = (RIGHT_SLANT_A.y + RIGHT_SLANT_B.y) / 2
        return { lx: lx, ly: ly, rx: rx, ry: ry }
      }

      /**
       * 高线起点或终点靠近左/右斜边中点时，竖直高的 x 修正到该腰中点的 x。
       * @returns {number|null} 命中则返回已夹紧的 x，否则 null
       */
      function trySnapVerticalXToSlantEdgeMid (startPt, lastPt) {
        const m = slantEdgeMidpoints()
        const R = SNAP_VERTEX_RADIUS
        let bestX = null
        let bestD = Infinity
        const pts = [startPt, lastPt]
        for (let i = 0; i < pts.length; i++) {
          const pt = pts[i]
          const dL = Math.hypot(pt.x - m.lx, pt.y - m.ly)
          const dR = Math.hypot(pt.x - m.rx, pt.y - m.ry)
          if (dL <= R && dL < bestD) {
            bestD = dL
            bestX = m.lx
          }
          if (dR <= R && dR < bestD) {
            bestD = dR
            bestX = m.rx
          }
        }
        if (bestX == null) return null
        return Math.min(
          Math.max(bestX, CUT_LINE_X_MIN),
          CUT_LINE_X_MAX
        )
      }

      /** 竖直线 x = x0 与平行四边形边界的交点 y，取最小/最大即夹在上下边之间的范围 */
      function verticalSpanInParallelogram (x0) {
        const ys = []
        const n = PARA_VERTICES.length
        for (let i = 0; i < n; i++) {
          const ax = PARA_VERTICES[i].x
          const ay = PARA_VERTICES[i].y
          const bx = PARA_VERTICES[(i + 1) % n].x
          const by = PARA_VERTICES[(i + 1) % n].y
          const minx = Math.min(ax, bx)
          const maxx = Math.max(ax, bx)
          if (Math.abs(ax - bx) < 1e-9) {
            if (Math.abs(x0 - ax) <= 1e-9) {
              ys.push(ay, by)
            }
            continue
          }
          if (Math.abs(ay - by) < 1e-9) {
            if (x0 >= minx - 1e-9 && x0 <= maxx + 1e-9) ys.push(ay)
            continue
          }
          const t = (x0 - ax) / (bx - ax)
          if (t >= -1e-9 && t <= 1 + 1e-9) {
            ys.push(ay + t * (by - ay))
          }
        }
        if (ys.length < 2) return null
        return {
          yMin: Math.min.apply(null, ys),
          yMax: Math.max.apply(null, ys)
        }
      }

      /** 竖直线 x=x0 与任意多边形边的交点，用于竖直范围 */
      function verticalSpanInPolygon (verts, x0) {
        const ys = []
        const n = verts.length
        for (let i = 0; i < n; i++) {
          const ax = verts[i].x
          const ay = verts[i].y
          const bx = verts[(i + 1) % n].x
          const by = verts[(i + 1) % n].y
          const minx = Math.min(ax, bx)
          const maxx = Math.max(ax, bx)
          if (Math.abs(ax - bx) < 1e-9) {
            if (Math.abs(x0 - ax) <= 1e-9) {
              ys.push(ay, by)
            }
            continue
          }
          if (Math.abs(ay - by) < 1e-9) {
            if (x0 >= minx - 1e-9 && x0 <= maxx + 1e-9) ys.push(ay)
            continue
          }
          const t = (x0 - ax) / (bx - ax)
          if (t >= -1e-9 && t <= 1 + 1e-9) {
            ys.push(ay + t * (by - ay))
          }
        }
        if (ys.length < 2) return null
        return {
          yMin: Math.min.apply(null, ys),
          yMax: Math.max.apply(null, ys)
        }
      }

      function cloneVerts (verts) {
        return verts.map(function (p) {
          return { x: p.x, y: p.y }
        })
      }

      function pointsToAttr (verts) {
        return verts
          .map(function (p) {
            return p.x + ',' + p.y
          })
          .join(' ')
      }

      function dedupeConsecutiveVerts (verts) {
        const out = []
        const EPS = 1e-3
        for (let i = 0; i < verts.length; i++) {
          const p = verts[i]
          if (
            out.length > 0 &&
            Math.abs(p.x - out[out.length - 1].x) < EPS &&
            Math.abs(p.y - out[out.length - 1].y) < EPS
          ) {
            continue
          }
          out.push(p)
        }
        if (
          out.length > 1 &&
          Math.abs(out[0].x - out[out.length - 1].x) < EPS &&
          Math.abs(out[0].y - out[out.length - 1].y) < EPS
        ) {
          out.pop()
        }
        return out
      }

      /** 用竖直线 x=cx 将凸多边形裁成左（x<=cx）/ 右（x>=cx）两半 */
      function clipPolygonHalfPlane (verts, cx, keepLeft) {
        const EPS = 1e-9
        const out = []
        const n = verts.length
        if (n < 2) return []
        function inside (p) {
          return keepLeft ? p.x <= cx + EPS : p.x >= cx - EPS
        }
        function cross (S, E) {
          const dx = E.x - S.x
          if (Math.abs(dx) < 1e-12) return null
          const t = (cx - S.x) / dx
          if (t < -EPS || t > 1 + EPS) return null
          return { x: cx, y: S.y + t * (E.y - S.y) }
        }
        let prev = verts[n - 1]
        let prevIn = inside(prev)
        for (let i = 0; i < n; i++) {
          const cur = verts[i]
          const curIn = inside(cur)
          if (curIn) {
            if (!prevIn) {
              const inter = cross(prev, cur)
              if (inter) out.push(inter)
            }
            out.push({ x: cur.x, y: cur.y })
          } else if (prevIn) {
            const inter = cross(prev, cur)
            if (inter) out.push(inter)
          }
          prev = cur
          prevIn = curIn
        }
        return dedupeConsecutiveVerts(out)
      }

      /** 用水平线 y=hy 裁凸多边形：keepBottom 为 true 时保留 y≥hy 一侧 */
      function clipPolygonHalfPlaneHorizontal (verts, hy, keepBottom) {
        const EPS = 1e-9
        const out = []
        const n = verts.length
        if (n < 2) return []
        function inside (p) {
          return keepBottom ? p.y >= hy - EPS : p.y <= hy + EPS
        }
        function cross (S, E) {
          const dy = E.y - S.y
          if (Math.abs(dy) < 1e-12) return null
          const t = (hy - S.y) / dy
          if (t < -EPS || t > 1 + EPS) return null
          return { x: S.x + t * (E.x - S.x), y: hy }
        }
        let prev = verts[n - 1]
        let prevIn = inside(prev)
        for (let i = 0; i < n; i++) {
          const cur = verts[i]
          const curIn = inside(cur)
          if (curIn) {
            if (!prevIn) {
              const inter = cross(prev, cur)
              if (inter) out.push(inter)
            }
            out.push({ x: cur.x, y: cur.y })
          } else if (prevIn) {
            const inter = cross(prev, cur)
            if (inter) out.push(inter)
          }
          prev = cur
          prevIn = curIn
        }
        return dedupeConsecutiveVerts(out)
      }

      function polygonSignedArea (verts) {
        let a = 0
        const n = verts.length
        for (let i = 0; i < n; i++) {
          const j = (i + 1) % n
          a += verts[i].x * verts[j].y - verts[j].x * verts[i].y
        }
        return a / 2
      }

      function centroidX (verts) {
        let sx = 0
        for (let i = 0; i < verts.length; i++) {
          sx += verts[i].x
        }
        return verts.length ? sx / verts.length : 0
      }

      function centroidY (verts) {
        let sy = 0
        for (let i = 0; i < verts.length; i++) {
          sy += verts[i].y
        }
        return verts.length ? sy / verts.length : 0
      }

      function sortPiecesLeftToRight () {
        polyPieces.sort(function (a, b) {
          return centroidX(a.verts) - centroidX(b.verts)
        })
        for (let i = 0; i < polyPieces.length; i++) {
          polyPieces[i].g.setAttribute('data-piece-index', String(i))
        }
      }

      function sortPiecesTopToBottom () {
        polyPieces.sort(function (a, b) {
          return centroidY(a.verts) - centroidY(b.verts)
        })
        for (let i = 0; i < polyPieces.length; i++) {
          polyPieces[i].g.setAttribute('data-piece-index', String(i))
        }
      }

      /** 顶边 y（与 PARA_VERTICES 上边 TL–TR 一致） */
      const TOP_EDGE_Y = PARA_VERTICES[3].y

      /** 仅底边垂足处：直角标缺口朝向形内（向上） */
      function rightAnglePathBottomAt (fx) {
        const s = 11
        const fy = 290
        return 'M ' + (fx + s) + ' ' + fy + ' L ' + (fx + s) + ' ' + (fy - s) + ' L ' + fx + ' ' + (fy - s)
      }

      /** 顶边与竖直高的交点处：直角标缺口朝向形内（向下） */
      function rightAnglePathTopAt (fx) {
        const s = 11
        const fy = TOP_EDGE_Y
        return (
          'M ' +
          (fx + s) +
          ' ' +
          fy +
          ' L ' +
          (fx + s) +
          ' ' +
          (fy + s) +
          ' L ' +
          fx +
          ' ' +
          (fy + s)
        )
      }

      /**
       * 底边垂足处、或「顶边→右侧斜边」时在顶边垂足处画直角标。
       */
      function appendRightAngleMarkers (xMid, yLo, yHi) {
        let raEl = null
        let raTopEl = null
        if (yLo <= 290 && yHi >= 290 && xMid >= 97 && xMid <= 433) {
          const fx = Math.min(Math.max(xMid, 97), 433)
          const p = document.createElementNS(NS, 'path')
          p.setAttribute('class', 'right-angle-marker')
          p.setAttribute('data-seg-x', String(xMid))
          p.setAttribute('d', rightAnglePathBottomAt(fx))
          userDraw.appendChild(p)
          raEl = p
        }
        if (
          xMid > 433 &&
          xMid <= CUT_LINE_X_MAX &&
          Math.min(yLo, yHi) <= TOP_EDGE_Y + 2 &&
          Math.max(yLo, yHi) >= TOP_EDGE_Y - 2
        ) {
          const fx = Math.min(Math.max(xMid, 187), 523)
          const p = document.createElementNS(NS, 'path')
          p.setAttribute('class', 'right-angle-marker')
          p.setAttribute('data-seg-x', String(xMid))
          p.setAttribute('d', rightAnglePathTopAt(fx))
          userDraw.appendChild(p)
          raTopEl = p
        }
        return { raEl: raEl, raTopEl: raTopEl }
      }

      function addHeightLabelItem (parent, x, yLo, yHi) {
        if (!parent) return null
        const yMid = (yLo + yHi) / 2
        const text = document.createElementNS(NS, 'text')
        text.setAttribute('class', 'geo-label height-label-item')
        text.setAttribute('data-seg-x', String(x))
        text.setAttribute('x', String(x + HEIGHT_LABEL_OFFSET_X))
        text.setAttribute('y', String(yMid))
        text.setAttribute('text-anchor', 'start')
        text.setAttribute('dominant-baseline', 'middle')
        text.textContent = '高'
        parent.appendChild(text)
        return text
      }

      function ensureBottomLabel () {
        if (document.getElementById('labelBottom') || !geoLabelsLayer) return
        const text = document.createElementNS(NS, 'text')
        text.setAttribute('id', 'labelBottom')
        text.setAttribute('class', 'geo-label')
        text.setAttribute('x', String(BOTTOM_LABEL_X))
        text.setAttribute('y', String(BOTTOM_LABEL_Y))
        text.setAttribute('text-anchor', 'middle')
        text.setAttribute('dominant-baseline', 'hanging')
        text.textContent = '底'
        geoLabelsLayer.appendChild(text)
      }

      function clearGeoLabelsLayer () {
        if (!geoLabelsLayer) return
        while (geoLabelsLayer.firstChild) {
          geoLabelsLayer.removeChild(geoLabelsLayer.firstChild)
        }
      }

      function svgDxPerClientPx () {
        const vb = svg.viewBox.baseVal
        const w = svg.getBoundingClientRect().width
        if (w < 1e-6) return 1
        return vb.width / w
      }

      function svgDyPerClientPx () {
        const vb = svg.viewBox.baseVal
        const h = svg.getBoundingClientRect().height
        if (h < 1e-6) return 1
        return vb.height / h
      }

      function getPieceTransformX (pieceIndex) {
        const n = polyPieces.length
        if (n === 0 || pieceIndex < 0 || pieceIndex >= n) return 0
        const p = polyPieces[pieceIndex]
        const bx = p.baseTx != null ? p.baseTx : 0
        return bx + (p.userDx || 0)
      }

      function applyAllPieceTransforms () {
        const n = polyPieces.length
        if (n === 0) return
        for (let i = 0; i < n; i++) {
          const p = polyPieces[i]
          const tx = (p.baseTx != null ? p.baseTx : 0) + (p.userDx || 0)
          const ty = (p.baseTy != null ? p.baseTy : 0) + (p.userDy || 0)
          p.g.setAttribute('transform', 'translate(' + tx + ', ' + ty + ')')
        }
      }

      /** 左块多边形局部坐标下的水平中心（不含 group transform），用于箭头尾 */
      function getLeftPieceBoundingCenterXLocal () {
        if (polyPieces.length === 0) {
          return (PARA_VERTICES[0].x + PARA_VERTICES[1].x) / 2
        }
        const v = polyPieces[0].verts
        let minx = Infinity
        let maxx = -Infinity
        for (let i = 0; i < v.length; i++) {
          minx = Math.min(minx, v[i].x)
          maxx = Math.max(maxx, v[i].x)
        }
        return (minx + maxx) / 2
      }

      /** 最右块水平中心（不含 transform），用于多块时右侧箭头锚点 */
      function getRightPieceBoundingCenterXLocal () {
        if (polyPieces.length === 0) {
          return (PARA_VERTICES[1].x + PARA_VERTICES[2].x) / 2
        }
        const v = polyPieces[polyPieces.length - 1].verts
        let minx = Infinity
        let maxx = -Infinity
        for (let i = 0; i < v.length; i++) {
          minx = Math.min(minx, v[i].x)
          maxx = Math.max(maxx, v[i].x)
        }
        return (minx + maxx) / 2
      }

      function removeLeftDragArrows () {
        const g = svg.getElementById('leftPieceArrowsOverlay')
        if (g && g.parentNode) {
          g.parentNode.removeChild(g)
        }
      }

      function getLeftPieceArrowCenterX () {
        return getLeftPieceBoundingCenterXLocal() + getPieceTransformX(0)
      }

      /** 箭头杆：长度 = 基准 + 有符号位移×系数；向右（dSvg>0）变长，向左（dSvg<0）变短，方向始终朝 +x */
      const ARROW_HEAD_INNER_X = 6
      const ARROW_SHAFT_MIN = 12
      const ARROW_SHAFT_MAX = 400
      const ARROW_SHAFT_FLOOR = 4
      const ARROW_SHAFT_PER_DELTA = 0.9
      /** 判定「先向左 / 先向右」的位移门限（viewBox）；先向左则本段手势不画箭头 */
      const ARROW_FIRST_MOVE_EPS = 2

      function computeLeftArrowShaft (signedDelta) {
        const d = typeof signedDelta === 'number' ? signedDelta : 0
        const raw = ARROW_SHAFT_MIN + d * ARROW_SHAFT_PER_DELTA
        const shaftLen = Math.min(
          ARROW_SHAFT_MAX,
          Math.max(ARROW_SHAFT_FLOOR, raw)
        )
        return {
          x1: ARROW_HEAD_INNER_X - shaftLen,
          x2: ARROW_HEAD_INNER_X
        }
      }

      /**
       * 箭尾固定在全局 SVG 坐标（按下时记录），不随块移动。
       * signedDelta：水平位移 dSvg（viewBox）；向左拖最右块时传入镜像后的正值，杆长与左块对称。
       * mirror：true 表示箭头朝左（最右块向左拖）。
       */
      function createLeftDragArrows (signedDelta, mirror) {
        removeLeftDragArrows()
        if (pieceDrag == null || pieceDrag.tailFixedGlobalX == null) return
        const tailX = pieceDrag.tailFixedGlobalX
        const ys = [135, 200, 265]
        const se = computeLeftArrowShaft(
          typeof signedDelta === 'number' ? signedDelta : 0
        )
        const lineLen = se.x2 - se.x1
        const root = document.createElementNS(NS, 'g')
        root.setAttribute('id', 'leftPieceArrowsOverlay')
        root.setAttribute(
          'class',
          'left-piece-drag-arrows left-piece-drag-arrows-overlay'
        )
        root.setAttribute('pointer-events', 'none')
        const mir = mirror === true
        ys.forEach(function (y) {
          const unit = document.createElementNS(NS, 'g')
          unit.setAttribute('class', 'left-drag-arrow-unit')
          unit.setAttribute(
            'transform',
            'translate(' + tailX + ', ' + y + ')'
          )
          const line = document.createElementNS(NS, 'line')
          line.setAttribute('class', 'left-drag-arrow-line')
          const head = document.createElementNS(NS, 'path')
          head.setAttribute('class', 'left-drag-arrow-head')
          if (mir) {
            line.setAttribute('x1', '0')
            line.setAttribute('y1', '0')
            line.setAttribute('x2', String(-lineLen))
            line.setAttribute('y2', '0')
            head.setAttribute('transform', 'translate(' + -lineLen + ', 0)')
            head.setAttribute('d', 'M 0 -5 L -10 0 L 0 5 Z')
          } else {
            line.setAttribute('x1', '0')
            line.setAttribute('y1', '0')
            line.setAttribute('x2', String(lineLen))
            line.setAttribute('y2', '0')
            head.setAttribute('transform', 'translate(' + lineLen + ', 0)')
            head.setAttribute('d', 'M 0 -5 L 10 0 L 0 5 Z')
          }
          unit.appendChild(line)
          unit.appendChild(head)
          root.appendChild(unit)
        })
        svg.insertBefore(root, userDraw)
      }

      function updateLeftDragArrowGeometry (signedDelta, mirror) {
        const root = svg.getElementById('leftPieceArrowsOverlay')
        if (!root || pieceDrag == null || pieceDrag.tailFixedGlobalX == null) {
          return
        }
        const tailX = pieceDrag.tailFixedGlobalX
        const ys = [135, 200, 265]
        const se = computeLeftArrowShaft(signedDelta)
        const lineLen = se.x2 - se.x1
        const mir = mirror === true
        const units = root.querySelectorAll('.left-drag-arrow-unit')
        for (let i = 0; i < units.length; i++) {
          units[i].setAttribute(
            'transform',
            'translate(' + tailX + ', ' + ys[i] + ')'
          )
          const line = units[i].querySelector('.left-drag-arrow-line')
          const head = units[i].querySelector('.left-drag-arrow-head')
          if (line) {
            if (mir) {
              line.setAttribute('x2', String(-lineLen))
            } else {
              line.setAttribute('x2', String(lineLen))
            }
          }
          if (head) {
            if (mir) {
              head.setAttribute('transform', 'translate(' + -lineLen + ', 0)')
              head.setAttribute('d', 'M 0 -5 L -10 0 L 0 5 Z')
            } else {
              head.setAttribute('transform', 'translate(' + lineLen + ', 0)')
              head.setAttribute('d', 'M 0 -5 L 10 0 L 0 5 Z')
            }
          }
        }
      }

      function clearPieceSelection () {
        if (!paraLayer) return
        const polys = paraLayer.querySelectorAll('.para-piece')
        for (let i = 0; i < polys.length; i++) {
          polys[i].classList.remove('para-piece--selected')
        }
      }

      function selectPiecePolygon (g) {
        clearPieceSelection()
        const poly = g.querySelector('.para-piece')
        if (poly) poly.classList.add('para-piece--selected')
      }

      function onPiecePointerDown (e) {
        if (!isCut) return
        if (e.pointerType === 'mouse' && e.button !== 0) return
        const g = e.currentTarget
        if (!g || g.tagName !== 'g') return
        e.preventDefault()
        e.stopPropagation()
        const idx = parseInt(g.getAttribute('data-piece-index'), 10)
        if (isNaN(idx) || idx < 0 || idx >= polyPieces.length) return
        const originDx = polyPieces[idx].userDx || 0
        const originDy = polyPieces[idx].userDy || 0
        const pd = {
          pieceIndex: idx,
          originClientX: e.clientX,
          originClientY: e.clientY,
          originDx: originDx,
          originDy: originDy,
          g: g
        }
        const nPieces = polyPieces.length
        const lastIdx = nPieces - 1
        const multiPiece = nPieces > 2
        if (idx === 0) {
          pd.lastClientX = e.clientX
          pd.arrowFirstMove = 'undecided'
          pd.arrowMirror = false
          const se0 = computeLeftArrowShaft(0)
          pd.tailFixedGlobalX =
            getLeftPieceBoundingCenterXLocal() + se0.x1 + getPieceTransformX(0)
        } else if (multiPiece && idx === lastIdx) {
          pd.lastClientX = e.clientX
          pd.arrowFirstMove = 'undecided'
          pd.arrowMirror = true
          const se0 = computeLeftArrowShaft(0)
          pd.tailFixedGlobalX =
            getRightPieceBoundingCenterXLocal() -
            se0.x1 +
            getPieceTransformX(idx)
        }
        pieceDrag = pd
        g.classList.add('is-dragging')
        selectPiecePolygon(g)
        if (paraLayer && g.parentNode === paraLayer) {
          paraLayer.appendChild(g)
        }
        try {
          g.setPointerCapture(e.pointerId)
        } catch (err) { /* ignore */ }
      }

      function onPiecePointerMove (e) {
        if (!pieceDrag) return
        e.preventDefault()
        const scaleX = svgDxPerClientPx()
        const scaleY = svgDyPerClientPx()
        const dClient = e.clientX - pieceDrag.originClientX
        const dSvg = dClient * scaleX
        const next = pieceDrag.originDx + dSvg
        const idx = pieceDrag.pieceIndex
        if (idx >= 0 && idx < polyPieces.length) {
          polyPieces[idx].userDx = next
          const dClientY = e.clientY - pieceDrag.originClientY
          const dSvgY = dClientY * scaleY
          polyPieces[idx].userDy = pieceDrag.originDy + dSvgY
        }
        const nP = polyPieces.length
        const lastI = nP - 1
        const multi = nP > 2
        if (idx === 0) {
          pieceDrag.lastClientX = e.clientX
          if (pieceDrag.arrowFirstMove === 'undecided') {
            if (dSvg > ARROW_FIRST_MOVE_EPS) {
              pieceDrag.arrowFirstMove = 'right'
            } else if (dSvg < -ARROW_FIRST_MOVE_EPS) {
              pieceDrag.arrowFirstMove = 'left'
            }
          }
          if (pieceDrag.arrowFirstMove === 'left') {
            removeLeftDragArrows()
          } else if (pieceDrag.arrowFirstMove === 'right') {
            if (!svg.getElementById('leftPieceArrowsOverlay')) {
              createLeftDragArrows(dSvg, false)
            } else {
              updateLeftDragArrowGeometry(dSvg, false)
            }
          }
        } else if (multi && idx === lastI) {
          pieceDrag.lastClientX = e.clientX
          if (pieceDrag.arrowFirstMove === 'undecided') {
            if (dSvg < -ARROW_FIRST_MOVE_EPS) {
              pieceDrag.arrowFirstMove = 'right'
            } else if (dSvg > ARROW_FIRST_MOVE_EPS) {
              pieceDrag.arrowFirstMove = 'left'
            }
          }
          if (pieceDrag.arrowFirstMove === 'left') {
            removeLeftDragArrows()
          } else if (pieceDrag.arrowFirstMove === 'right') {
            const mirrorDelta = -dSvg
            if (!svg.getElementById('leftPieceArrowsOverlay')) {
              createLeftDragArrows(mirrorDelta, true)
            } else {
              updateLeftDragArrowGeometry(mirrorDelta, true)
            }
          }
        }
        applyAllPieceTransforms()
      }

      function onPiecePointerUp (e) {
        if (!pieceDrag) return
        const g = pieceDrag.g
        removeLeftDragArrows()
        pieceDrag = null
        g.classList.remove('is-dragging')
        try {
          if (e.pointerId != null) g.releasePointerCapture(e.pointerId)
        } catch (err) { /* ignore */ }
      }

      function resetDemo () {
        while (userDraw.firstChild) {
          userDraw.removeChild(userDraw.firstChild)
        }
        while (paraLayer.firstChild) {
          paraLayer.removeChild(paraLayer.firstChild)
        }
        const whole = document.createElementNS(NS, 'polygon')
        whole.setAttribute('id', 'paraWhole')
        whole.setAttribute('class', 'para-yellow')
        whole.setAttribute('points', PARA_WHOLE_POINTS)
        paraLayer.appendChild(whole)

        heightSegments = []
        polyPieces = []
        isCut = false
        pieceDrag = null
        drawing = false
        currentPath = null
        pathD = ''
        startPt = null
        lastPt = null

        scissorsDragging = false
        scissorsDragMoved = false
        resetScissorsHandleStyles()
        svg.classList.remove('is-cut')

        clearGeoLabelsLayer()
        ensureBottomLabel()
        updateScissorsEnabled()
      }

      function toSvgPoint (e) {
        const pt = svg.createSVGPoint()
        const x = e.clientX != null ? e.clientX : (e.touches && e.touches[0] ? e.touches[0].clientX : 0)
        const y = e.clientY != null ? e.clientY : (e.touches && e.touches[0] ? e.touches[0].clientY : 0)
        pt.x = x
        pt.y = y
        return pt.matrixTransform(svg.getScreenCTM().inverse())
      }

      function toSvgPointXY (clientX, clientY) {
        const pt = svg.createSVGPoint()
        pt.x = clientX
        pt.y = clientY
        return pt.matrixTransform(svg.getScreenCTM().inverse())
      }

      /** 松手位置与竖直「高」足够近（viewBox 单位）则触发剪开 */
      const NEAR_HEIGHT_LINE_X = 26
      const NEAR_HEIGHT_LINE_Y_PAD = 14

      /**
       * 在未剪的高线中，取与松手点最近的一条（须落在该线的 x/y 容差内）。
       */
      function findHeightSegmentAt (clientX, clientY) {
        const p = toSvgPointXY(clientX, clientY)
        let best = null
        let bestMetric = Infinity
        for (let i = 0; i < heightSegments.length; i++) {
          const s = heightSegments[i]
          if (s.cut) continue
          if (s.kind === 'slantMidHorizontal') {
            const hy = s.y
            const xLo = Math.min(s.xLo, s.xHi)
            const xHi = Math.max(s.xLo, s.xHi)
            if (p.x < xLo - NEAR_HEIGHT_LINE_X || p.x > xHi + NEAR_HEIGHT_LINE_X) {
              continue
            }
            if (Math.abs(p.y - hy) > NEAR_HEIGHT_LINE_Y_PAD * 2) continue
            const dist = Math.abs(p.y - hy)
            if (dist < bestMetric) {
              bestMetric = dist
              best = s
            }
            continue
          }
          if (s.x == null || isNaN(s.x)) continue
          if (Math.abs(p.x - s.x) > NEAR_HEIGHT_LINE_X) continue
          if (
            p.y < s.yLo - NEAR_HEIGHT_LINE_Y_PAD ||
            p.y > s.yHi + NEAR_HEIGHT_LINE_Y_PAD
          ) {
            continue
          }
          const dx = Math.abs(p.x - s.x)
          if (dx < bestMetric) {
            bestMetric = dx
            best = s
          }
        }
        return best
      }

      function updateScissorsEnabled () {
        const hasUncut = heightSegments.some(function (s) {
          return !s.cut
        })
        if (hasUncut) {
          scissorsHandle.classList.remove('is-disabled')
          scissorsHandle.removeAttribute('aria-disabled')
        } else {
          scissorsHandle.classList.add('is-disabled')
          scissorsHandle.setAttribute('aria-disabled', 'true')
        }
      }

      let scissorsDragging = false
      let scissorsDragMoved = false
      let scissorsOffsetX = 0
      let scissorsOffsetY = 0

      function resetScissorsHandleStyles () {
        scissorsHandle.style.position = ''
        scissorsHandle.style.left = ''
        scissorsHandle.style.top = ''
        scissorsHandle.style.width = ''
        scissorsHandle.style.height = ''
        scissorsHandle.classList.remove('dragging', 'dragging-over-plot')
      }

      function isClientInPlotWrap (clientX, clientY) {
        if (!plotWrap) return false
        const r = plotWrap.getBoundingClientRect()
        return (
          clientX >= r.left &&
          clientX <= r.right &&
          clientY >= r.top &&
          clientY <= r.bottom
        )
      }

      function updateScissorsOverPlotState (clientX, clientY) {
        if (!scissorsDragging) return
        if (isClientInPlotWrap(clientX, clientY)) {
          scissorsHandle.classList.add('dragging-over-plot')
        } else {
          scissorsHandle.classList.remove('dragging-over-plot')
        }
      }

      function onScissorsPointerDown (e) {
        if (scissorsHandle.classList.contains('is-disabled')) return
        if (e.pointerType === 'mouse' && e.button !== 0) return
        e.preventDefault()
        e.stopPropagation()
        scissorsDragging = true
        scissorsDragMoved = false
        const r = scissorsHandle.getBoundingClientRect()
        scissorsOffsetX = e.clientX - r.left
        scissorsOffsetY = e.clientY - r.top
        scissorsHandle.style.position = 'fixed'
        scissorsHandle.style.width = r.width + 'px'
        scissorsHandle.style.height = r.height + 'px'
        scissorsHandle.style.left = (e.clientX - scissorsOffsetX) + 'px'
        scissorsHandle.style.top = (e.clientY - scissorsOffsetY) + 'px'
        scissorsHandle.classList.add('dragging')
        updateScissorsOverPlotState(e.clientX, e.clientY)
        try {
          scissorsHandle.setPointerCapture(e.pointerId)
        } catch (err) { /* ignore */ }
      }

      function onScissorsPointerMove (e) {
        if (!scissorsDragging) return
        e.preventDefault()
        scissorsDragMoved = true
        scissorsHandle.style.left = (e.clientX - scissorsOffsetX) + 'px'
        scissorsHandle.style.top = (e.clientY - scissorsOffsetY) + 'px'
        updateScissorsOverPlotState(e.clientX, e.clientY)
      }

      function onScissorsPointerUp (e) {
        if (!scissorsDragging) return
        e.preventDefault()
        const moved = scissorsDragMoved
        const ok =
          moved && findHeightSegmentAt(e.clientX, e.clientY) != null
        scissorsDragging = false
        scissorsDragMoved = false
        resetScissorsHandleStyles()
        try {
          if (e.pointerId != null) scissorsHandle.releasePointerCapture(e.pointerId)
        } catch (err) { /* ignore */ }
        if (ok) {
          runScissorsCutAnimation(e.clientX, e.clientY)
        }
      }

      function beginStroke (e) {
        if (isCut) return
        if (scissorsDragging) return
        if (e.pointerType === 'mouse' && e.button !== 0) return
        e.preventDefault()
        drawing = true
        try {
          svg.setPointerCapture(e.pointerId)
        } catch (err) { /* ignore */ }
        const p = toSvgPoint(e)
        startPt = { x: p.x, y: p.y }
        lastPt = { x: p.x, y: p.y }
        pathD = 'M ' + p.x + ' ' + p.y
        currentPath = document.createElementNS('http://www.w3.org/2000/svg', 'path')
        currentPath.setAttribute('class', 'user-stroke')
        currentPath.setAttribute('d', pathD)
        userDraw.appendChild(currentPath)
      }

      function continueStroke (e) {
        if (scissorsDragging) return
        if (!drawing || !currentPath) return
        e.preventDefault()
        const p = toSvgPoint(e)
        lastPt = { x: p.x, y: p.y }
        pathD += ' L ' + p.x + ' ' + p.y
        currentPath.setAttribute('d', pathD)
      }

      /**
       * 将手绘修正为直线：
       * - 起点、终点分别落在左斜边与右斜边（或互换）→ 水平线连接两斜边中点；
       * - 否则按「高」：竖直线并限制在形内。
       */
      function snapHeightToStraightLine () {
        if (!currentPath || !startPt || !lastPt) return
        const len = Math.hypot(lastPt.x - startPt.x, lastPt.y - startPt.y)
        if (len < MIN_STROKE_LEN) {
          try {
            userDraw.removeChild(currentPath)
          } catch (err) { /* ignore */ }
          return
        }

        const sOnLeft = pointNearSlantedEdge(
          startPt,
          LEFT_SLANT_A.x,
          LEFT_SLANT_A.y,
          LEFT_SLANT_B.x,
          LEFT_SLANT_B.y,
          SLANTED_EDGE_SNAP_PX
        )
        const sOnRight = pointNearSlantedEdge(
          startPt,
          RIGHT_SLANT_A.x,
          RIGHT_SLANT_A.y,
          RIGHT_SLANT_B.x,
          RIGHT_SLANT_B.y,
          SLANTED_EDGE_SNAP_PX
        )
        const eOnLeft = pointNearSlantedEdge(
          lastPt,
          LEFT_SLANT_A.x,
          LEFT_SLANT_A.y,
          LEFT_SLANT_B.x,
          LEFT_SLANT_B.y,
          SLANTED_EDGE_SNAP_PX
        )
        const eOnRight = pointNearSlantedEdge(
          lastPt,
          RIGHT_SLANT_A.x,
          RIGHT_SLANT_A.y,
          RIGHT_SLANT_B.x,
          RIGHT_SLANT_B.y,
          SLANTED_EDGE_SNAP_PX
        )
        if (
          (sOnLeft && eOnRight) ||
          (sOnRight && eOnLeft)
        ) {
          const m = slantEdgeMidpoints()
          const d =
            'M ' +
            m.lx +
            ' ' +
            m.ly +
            ' L ' +
            m.rx +
            ' ' +
            m.ry
          currentPath.setAttribute('d', d)
          currentPath.removeAttribute('data-seg-x')
          currentPath.setAttribute('data-seg-y', String(m.ly))
          heightSegments.push({
            kind: 'slantMidHorizontal',
            y: m.ly,
            xLo: m.lx,
            xHi: m.rx,
            yLo: m.ly,
            yHi: m.ry,
            cut: false,
            pathEl: currentPath,
            raEl: null,
            raTopEl: null,
            labelEl: null
          })
          updateScissorsEnabled()
          return
        }

        const distStartToTopLeft = Math.hypot(
          startPt.x - VERTEX_TOP_LEFT.x,
          startPt.y - VERTEX_TOP_LEFT.y
        )
        if (distStartToTopLeft <= SNAP_VERTEX_RADIUS) {
          const xMid = VERTEX_TOP_LEFT.x
          const span = verticalSpanInParallelogram(xMid)
          if (!span) {
            try {
              userDraw.removeChild(currentPath)
            } catch (err) { /* ignore */ }
            return
          }
          const yStart = VERTEX_TOP_LEFT.y
          let yEnd = Math.min(
            Math.max(lastPt.y, yStart + MIN_STROKE_LEN),
            span.yMax
          )
          yEnd = Math.max(yEnd, span.yMin)
          if (yEnd <= yStart + 1e-9 || yEnd > span.yMax + 1e-9) {
            try {
              userDraw.removeChild(currentPath)
            } catch (err) { /* ignore */ }
            return
          }
          const d = 'M ' + xMid + ' ' + yStart + ' L ' + xMid + ' ' + yEnd
          currentPath.setAttribute('d', d)
          currentPath.setAttribute('data-seg-x', String(xMid))
          const yLo = Math.min(yStart, yEnd)
          const yHi = Math.max(yStart, yEnd)
          const ram = appendRightAngleMarkers(xMid, yLo, yHi)
          const labelEl = addHeightLabelItem(geoLabelsLayer, xMid, yLo, yHi)
          heightSegments.push({
            x: xMid,
            yLo: yLo,
            yHi: yHi,
            cut: false,
            pathEl: currentPath,
            raEl: ram.raEl,
            raTopEl: ram.raTopEl,
            labelEl: labelEl
          })
          updateScissorsEnabled()
          return
        }

        const xMidRaw = (startPt.x + lastPt.x) / 2
        let xMid = Math.min(
          Math.max(xMidRaw, CUT_LINE_X_MIN),
          CUT_LINE_X_MAX
        )
        const xMidSnapped = trySnapVerticalXToSlantEdgeMid(startPt, lastPt)
        if (xMidSnapped != null) {
          xMid = xMidSnapped
        }
        const span = verticalSpanInParallelogram(xMid)
        if (!span) {
          try {
            userDraw.removeChild(currentPath)
          } catch (err) { /* ignore */ }
          return
        }
        let yLo = Math.min(startPt.y, lastPt.y)
        let yHi = Math.max(startPt.y, lastPt.y)
        const a = Math.max(yLo, span.yMin)
        const b = Math.min(yHi, span.yMax)
        if (a > b + 1e-9) {
          try {
            userDraw.removeChild(currentPath)
          } catch (err) { /* ignore */ }
          return
        }
        const d = 'M ' + xMid + ' ' + a + ' L ' + xMid + ' ' + b
        currentPath.setAttribute('d', d)
        currentPath.setAttribute('data-seg-x', String(xMid))
        const ram = appendRightAngleMarkers(xMid, a, b)
        const labelEl = addHeightLabelItem(geoLabelsLayer, xMid, a, b)
        heightSegments.push({
          x: xMid,
          yLo: a,
          yHi: b,
          cut: false,
          pathEl: currentPath,
          raEl: ram.raEl,
          raTopEl: ram.raTopEl,
          labelEl: labelEl
        })
        updateScissorsEnabled()
      }

      function makePieceObject (verts) {
        const g = document.createElementNS(NS, 'g')
        g.setAttribute('class', 'para-piece-group')
        const poly = document.createElementNS(NS, 'polygon')
        poly.setAttribute('class', 'para-piece')
        poly.setAttribute('points', pointsToAttr(verts))
        g.appendChild(poly)
        return {
          g: g,
          verts: cloneVerts(verts),
          userDx: 0,
          userDy: 0,
          baseTx: 0,
          baseTy: 0
        }
      }

      /** 高线装饰在块上的 x（与 data-seg-x 一致），用于再次剪开时迁移到左/右子块 */
      function getDecorationSegX (el) {
        if (!el || !el.getAttribute) return null
        const ds = el.getAttribute('data-seg-x')
        if (ds != null && ds !== '') {
          const v = parseFloat(ds)
          if (!isNaN(v)) return v
        }
        if (el.tagName === 'path') {
          const d = el.getAttribute('d') || ''
          const m = d.match(/^\s*M\s*([\d.-]+)/)
          if (m) return parseFloat(m[1])
        }
        if (el.tagName === 'text') {
          const tx = parseFloat(el.getAttribute('x') || '0')
          return tx - HEIGHT_LABEL_OFFSET_X
        }
        return null
      }

      function getDecorationSegY (el) {
        if (!el || !el.getAttribute) return null
        const ds = el.getAttribute('data-seg-y')
        if (ds != null && ds !== '') {
          const v = parseFloat(ds)
          if (!isNaN(v)) return v
        }
        if (el.tagName === 'path') {
          const d = el.getAttribute('d') || ''
          let m = d.match(
            /^\s*M\s*([\d.-]+)\s*([\d.-]+)\s*L\s*([\d.-]+)\s*([\d.-]+)/
          )
          if (m) {
            return (parseFloat(m[2]) + parseFloat(m[4])) / 2
          }
          m = d.match(/^\s*M\s*([\d.-]+)\s*([\d.-]+)/)
          if (m) return parseFloat(m[2])
        }
        if (el.tagName === 'text') {
          return parseFloat(el.getAttribute('y') || '0')
        }
        return null
      }

      /**
       * 再次竖直剪开时，把旧块里已剪过的高线、直角标、「高」字挪到左或右新块（避免随旧组删除）。
       */
      function redistributePieceDecorations (oldG, leftG, rightG, cx) {
        const EPS = 1.5
        const nodes = []
        let c = oldG.firstChild
        while (c) {
          const next = c.nextSibling
          if (
            c.nodeType === 1 &&
            c.classList &&
            c.classList.contains('para-piece')
          ) {
            c = next
            continue
          }
          if (c.nodeType === 1) nodes.push(c)
          c = next
        }
        for (let i = 0; i < nodes.length; i++) {
          const node = nodes[i]
          const sx = getDecorationSegX(node)
          if (sx == null || isNaN(sx)) continue
          oldG.removeChild(node)
          if (sx < cx - EPS) {
            leftG.appendChild(node)
          } else {
            rightG.appendChild(node)
          }
        }
      }

      /**
       * 水平剪开时，按装饰物大致 y 分到上/下块（data-seg-y 或路径/文字推断）。
       */
      function redistributePieceDecorationsHorizontal (oldG, topG, botG, hy) {
        const EPS = 1.5
        const nodes = []
        let c = oldG.firstChild
        while (c) {
          const next = c.nextSibling
          if (
            c.nodeType === 1 &&
            c.classList &&
            c.classList.contains('para-piece')
          ) {
            c = next
            continue
          }
          if (c.nodeType === 1) nodes.push(c)
          c = next
        }
        for (let i = 0; i < nodes.length; i++) {
          const node = nodes[i]
          let sy = getDecorationSegY(node)
          if (sy == null || isNaN(sy)) {
            const sx = getDecorationSegX(node)
            if (sx != null && !isNaN(sx)) {
              for (let j = 0; j < heightSegments.length; j++) {
                const s = heightSegments[j]
                if (s.cut || s.x == null) continue
                if (Math.abs(s.x - sx) < 1 && s.yLo != null && s.yHi != null) {
                  sy = (s.yLo + s.yHi) / 2
                  break
                }
              }
            }
          }
          if (sy == null || isNaN(sy)) continue
          oldG.removeChild(node)
          if (sy < hy - EPS) {
            topG.appendChild(node)
          } else {
            botG.appendChild(node)
          }
        }
      }

      function attachPieceListeners (g) {
        g.addEventListener('pointerdown', onPiecePointerDown)
        g.addEventListener('pointermove', onPiecePointerMove)
        g.addEventListener('pointerup', onPiecePointerUp)
        g.addEventListener('pointercancel', onPiecePointerUp)
      }

      function findPieceIndexForVerticalCut (cx) {
        const EPS = 1e-2
        for (let i = 0; i < polyPieces.length; i++) {
          const verts = polyPieces[i].verts
          let minx = Infinity
          let maxx = -Infinity
          for (let j = 0; j < verts.length; j++) {
            minx = Math.min(minx, verts[j].x)
            maxx = Math.max(maxx, verts[j].x)
          }
          if (cx <= minx + EPS || cx >= maxx - EPS) continue
          const span = verticalSpanInPolygon(verts, cx)
          if (span && span.yMax - span.yMin > 1e-4) return i
        }
        return -1
      }

      function findPieceIndexForHorizontalCut (hy) {
        const EPS = 1e-2
        const areaMin = 2
        for (let i = 0; i < polyPieces.length; i++) {
          const verts = polyPieces[i].verts
          let miny = Infinity
          let maxy = -Infinity
          for (let j = 0; j < verts.length; j++) {
            miny = Math.min(miny, verts[j].y)
            maxy = Math.max(maxy, verts[j].y)
          }
          if (hy <= miny + EPS || hy >= maxy - EPS) continue
          const topV = clipPolygonHalfPlaneHorizontal(verts, hy, false)
          const botV = clipPolygonHalfPlaneHorizontal(verts, hy, true)
          if (
            topV.length < 3 ||
            botV.length < 3 ||
            Math.abs(polygonSignedArea(topV)) < areaMin ||
            Math.abs(polygonSignedArea(botV)) < areaMin
          ) {
            continue
          }
          return i
        }
        return -1
      }

      function getSourceVertsForCut (cx) {
        const whole = document.getElementById('paraWhole')
        if (whole) {
          let minx = Infinity
          let maxx = -Infinity
          for (let i = 0; i < PARA_VERTICES.length; i++) {
            minx = Math.min(minx, PARA_VERTICES[i].x)
            maxx = Math.max(maxx, PARA_VERTICES[i].x)
          }
          const EPS = 1e-2
          if (cx <= minx + EPS || cx >= maxx - EPS) return null
          const span = verticalSpanInParallelogram(cx)
          if (!span || span.yMax - span.yMin < 1e-4) return null
          return {
            verts: PARA_VERTICES,
            pieceIndex: -1,
            fromWhole: true
          }
        }
        const idx = findPieceIndexForVerticalCut(cx)
        if (idx < 0) return null
        return {
          verts: polyPieces[idx].verts,
          pieceIndex: idx,
          fromWhole: false
        }
      }

      function getSourceVertsForHorizontalCut (hy) {
        const whole = document.getElementById('paraWhole')
        const EPS = 1e-2
        if (whole) {
          let miny = Infinity
          let maxy = -Infinity
          for (let i = 0; i < PARA_VERTICES.length; i++) {
            miny = Math.min(miny, PARA_VERTICES[i].y)
            maxy = Math.max(maxy, PARA_VERTICES[i].y)
          }
          if (hy <= miny + EPS || hy >= maxy - EPS) return null
          return {
            verts: PARA_VERTICES,
            pieceIndex: -1,
            fromWhole: true
          }
        }
        const idx = findPieceIndexForHorizontalCut(hy)
        if (idx < 0) return null
        return {
          verts: polyPieces[idx].verts,
          pieceIndex: idx,
          fromWhole: false
        }
      }

      /**
       * 沿当前高线剪开一块；多条高线可依次剪开（每条至多剪一次）。
       */
      function applyVerticalSplit (seg) {
        if (seg.kind === 'slantMidHorizontal') return
        const cx = clampCutLineX(seg.x)
        const src = getSourceVertsForCut(cx)
        if (!src) return

        const verts = src.verts
        const leftV = clipPolygonHalfPlane(verts, cx, true)
        const rightV = clipPolygonHalfPlane(verts, cx, false)
        const areaMin = 2
        if (
          leftV.length < 3 ||
          rightV.length < 3 ||
          Math.abs(polygonSignedArea(leftV)) < areaMin ||
          Math.abs(polygonSignedArea(rightV)) < areaMin
        ) {
          return
        }

        if (seg.pathEl && seg.pathEl.parentNode) {
          seg.pathEl.parentNode.removeChild(seg.pathEl)
        }
        if (seg.raEl && seg.raEl.parentNode) {
          seg.raEl.parentNode.removeChild(seg.raEl)
        }
        if (seg.raTopEl && seg.raTopEl.parentNode) {
          seg.raTopEl.parentNode.removeChild(seg.raTopEl)
        }
        if (seg.labelEl && seg.labelEl.parentNode) {
          seg.labelEl.parentNode.removeChild(seg.labelEl)
        }

        const leftP = makePieceObject(leftV)
        const rightP = makePieceObject(rightV)
        const h = SPLIT_GAP / 2
        if (src.fromWhole) {
          leftP.baseTx = -h
          leftP.baseTy = 0
          rightP.baseTx = h
          rightP.baseTy = 0
          const w = document.getElementById('paraWhole')
          if (w) w.remove()
          polyPieces = [leftP, rightP]
        } else {
          const old = polyPieces[src.pieceIndex]
          const otx = old.baseTx != null ? old.baseTx : 0
          const oty = old.baseTy != null ? old.baseTy : 0
          leftP.baseTx = otx - h
          leftP.baseTy = oty
          rightP.baseTx = otx + h
          rightP.baseTy = oty
          const idx = src.pieceIndex
          const oldG = polyPieces[idx].g
          redistributePieceDecorations(oldG, leftP.g, rightP.g, cx)
          oldG.remove()
          polyPieces.splice(idx, 1, leftP, rightP)
        }

        paraLayer.appendChild(leftP.g)
        paraLayer.appendChild(rightP.g)
        attachPieceListeners(leftP.g)
        attachPieceListeners(rightP.g)

        sortPiecesLeftToRight()

        const gRight =
          centroidX(rightV) >= centroidX(leftV) ? rightP.g : leftP.g
        const hiPath = document.createElementNS(NS, 'path')
        hiPath.setAttribute('class', 'user-stroke')
        hiPath.setAttribute('data-seg-x', String(seg.x))
        hiPath.setAttribute(
          'data-seg-y',
          String((seg.yLo + seg.yHi) / 2)
        )
        hiPath.setAttribute(
          'd',
          'M ' + seg.x + ' ' + seg.yLo + ' L ' + seg.x + ' ' + seg.yHi
        )
        gRight.appendChild(hiPath)
        if (
          seg.yLo <= 290 &&
          seg.yHi >= 290 &&
          seg.x >= 97 &&
          seg.x <= 433
        ) {
          const fx = Math.min(Math.max(seg.x, 97), 433)
          const ra = document.createElementNS(NS, 'path')
          ra.setAttribute('class', 'right-angle-marker')
          ra.setAttribute('data-seg-x', String(seg.x))
          ra.setAttribute('d', rightAnglePathBottomAt(fx))
          gRight.appendChild(ra)
        }
        if (
          seg.x > 433 &&
          seg.x <= CUT_LINE_X_MAX &&
          Math.min(seg.yLo, seg.yHi) <= TOP_EDGE_Y + 2 &&
          Math.max(seg.yLo, seg.yHi) >= TOP_EDGE_Y - 2
        ) {
          const fx = Math.min(Math.max(seg.x, 187), 523)
          const raTop = document.createElementNS(NS, 'path')
          raTop.setAttribute('class', 'right-angle-marker')
          raTop.setAttribute('data-seg-x', String(seg.x))
          raTop.setAttribute('d', rightAnglePathTopAt(fx))
          gRight.appendChild(raTop)
        }
        addHeightLabelItem(gRight, seg.x, seg.yLo, seg.yHi)

        seg.cut = true
        isCut = polyPieces.length >= 2
        svg.classList.add('is-cut')
        applyAllPieceTransforms()
        updateScissorsEnabled()
      }

      /**
       * 沿两腰中点水平线剪开（与竖直剪开共用 baseTx/baseTy 累加方式）。
       */
      function applyHorizontalSplit (seg) {
        if (seg.kind !== 'slantMidHorizontal') return
        const hy = seg.y
        const src = getSourceVertsForHorizontalCut(hy)
        if (!src) return

        const verts = src.verts
        const topV = clipPolygonHalfPlaneHorizontal(verts, hy, false)
        const botV = clipPolygonHalfPlaneHorizontal(verts, hy, true)
        const areaMin = 2
        if (
          topV.length < 3 ||
          botV.length < 3 ||
          Math.abs(polygonSignedArea(topV)) < areaMin ||
          Math.abs(polygonSignedArea(botV)) < areaMin
        ) {
          return
        }

        if (seg.pathEl && seg.pathEl.parentNode) {
          seg.pathEl.parentNode.removeChild(seg.pathEl)
        }
        if (seg.raEl && seg.raEl.parentNode) {
          seg.raEl.parentNode.removeChild(seg.raEl)
        }
        if (seg.raTopEl && seg.raTopEl.parentNode) {
          seg.raTopEl.parentNode.removeChild(seg.raTopEl)
        }
        if (seg.labelEl && seg.labelEl.parentNode) {
          seg.labelEl.parentNode.removeChild(seg.labelEl)
        }

        const topP = makePieceObject(topV)
        const botP = makePieceObject(botV)
        const h = SPLIT_GAP / 2

        if (src.fromWhole) {
          topP.baseTx = 0
          topP.baseTy = -h
          botP.baseTx = 0
          botP.baseTy = h
          const w = document.getElementById('paraWhole')
          if (w) w.remove()
          polyPieces = [topP, botP]
        } else {
          const old = polyPieces[src.pieceIndex]
          const otx = old.baseTx != null ? old.baseTx : 0
          const oty = old.baseTy != null ? old.baseTy : 0
          topP.baseTx = otx
          topP.baseTy = oty - h
          botP.baseTx = otx
          botP.baseTy = oty + h
          const idx = src.pieceIndex
          const oldG = polyPieces[idx].g
          redistributePieceDecorationsHorizontal(oldG, topP.g, botP.g, hy)
          oldG.remove()
          polyPieces.splice(idx, 1, topP, botP)
        }

        paraLayer.appendChild(topP.g)
        paraLayer.appendChild(botP.g)
        attachPieceListeners(topP.g)
        attachPieceListeners(botP.g)

        sortPiecesTopToBottom()

        const topCent = centroidY(topV)
        const botCent = centroidY(botV)
        const gTop = topCent <= botCent ? topP.g : botP.g
        const hiPath = document.createElementNS(NS, 'path')
        hiPath.setAttribute('class', 'user-stroke')
        hiPath.setAttribute('data-seg-y', String(hy))
        hiPath.setAttribute(
          'data-seg-x',
          String((seg.xLo + seg.xHi) / 2)
        )
        hiPath.setAttribute(
          'd',
          'M ' +
            seg.xLo +
            ' ' +
            hy +
            ' L ' +
            seg.xHi +
            ' ' +
            hy
        )
        gTop.appendChild(hiPath)

        seg.cut = true
        isCut = polyPieces.length >= 2
        svg.classList.add('is-cut')
        applyAllPieceTransforms()
        updateScissorsEnabled()
      }

      /** 触发剪开（不再播放画布上的大剪刀动画） */
      function runScissorsCutAnimation (clientX, clientY) {
        const seg = findHeightSegmentAt(clientX, clientY)
        if (!seg) return
        if (seg.kind === 'slantMidHorizontal') {
          applyHorizontalSplit(seg)
        } else {
          applyVerticalSplit(seg)
        }
      }

      scissorsHandle.addEventListener('pointerdown', onScissorsPointerDown)
      scissorsHandle.addEventListener('pointermove', onScissorsPointerMove)
      scissorsHandle.addEventListener('pointerup', onScissorsPointerUp)
      scissorsHandle.addEventListener('pointercancel', onScissorsPointerUp)

      btnReset.addEventListener('click', function () {
        resetDemo()
      })

      function endStroke (e) {
        if (scissorsDragging) return
        if (!drawing) return
        snapHeightToStraightLine()
        drawing = false
        currentPath = null
        startPt = null
        lastPt = null
        try {
          if (e.pointerId != null) svg.releasePointerCapture(e.pointerId)
        } catch (err) { /* ignore */ }
      }

      svg.addEventListener('pointerdown', beginStroke)
      svg.addEventListener('pointermove', continueStroke)
      svg.addEventListener('pointerup', endStroke)
      svg.addEventListener('pointercancel', endStroke)

      svg.addEventListener('pointerdown', function (e) {
        if (!isCut) return
        const t = e.target
        if (t && typeof t.closest === 'function' && t.closest('.para-piece-group')) return
        clearPieceSelection()
      })

      ensureBottomLabel()
      updateScissorsEnabled()
    })()
  </script>
</body>
