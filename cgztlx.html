        cmp.y = Math.max(COMPASS_Y_MIN, Math.min(cssH - mar, cy0));
        cmp.angle = ang;
        cmp.spread = sp;
        const tips2 = compassTipsWorld(cmp);
        guideLineMarks = [
          {
            x: tips2.L.x,
            pivotX: tips2.L.x,
            pivotY: tips2.L.y,
            gy: gy,
          },
          {
            x: tips2.R.x,
            pivotX: tips2.L.x,
            pivotY: tips2.L.y,
            gy: gy,
          },
        ];
        return gy;
      }

      function drawCompass(ctx, s) {
        const spread = Math.max(
          COMPASS_MIN_SPREAD,
          Math.min(COMPASS_MAX_SPREAD, s.spread != null ? s.spread : 0.38)
        );
        const ang = s.angle || 0;
        const L = COMPASS_LEG_LEN;
        const lx1 = Math.sin(-spread) * L;
        const ly1 = Math.cos(-spread) * L;
        const rx1 = Math.sin(spread) * L;
        const ry1 = Math.cos(spread) * L;

        /** 木腿 / 钢腿外观与几何左右对调（tips.L/R 与吸附仍对应原几何侧） */
        const wvx = rx1;
        const wvy = ry1;
        const svx = lx1;
        const svy = ly1;
        const wux = rx1 / L;
        const wuy = ry1 / L;
        const wpx = -wuy;
        const wpy = wux;
        const sux = lx1 / L;
        const suy = ly1 / L;
        const spx = -suy;
        const spy = sux;

        ctx.save();
        ctx.translate(s.x, s.y);
        ctx.rotate(ang);

        const tipL = 0.97;
        const shMx = rx1 * tipL;
        const shMy = ry1 * tipL + 2;
        const shWx = lx1 * tipL;
        const shWy = ly1 * tipL + 2;
        ctx.strokeStyle = "rgba(0,0,0,0.1)";
        ctx.lineWidth = 7;
        ctx.lineCap = "butt";
        ctx.lineJoin = "miter";
        ctx.beginPath();
        ctx.moveTo(0, 2);
        ctx.lineTo(shMx, shMy);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, 2);
        ctx.lineTo(shWx, shWy);
        ctx.stroke();

        const woodEnd = 0.84;
        const wex = wvx * woodEnd;
        const wey = wvy * woodEnd;
        ctx.lineWidth = 9;
        ctx.strokeStyle = "#8b6644";
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(wex, wey);
        ctx.stroke();
        ctx.lineWidth = 3;
        ctx.strokeStyle = "#d4a574";
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(wvx * 0.82, wvy * 0.82);
        ctx.stroke();

        const la = Math.atan2(wvx, wvy);
        ctx.save();
        ctx.translate(wvx * 0.89, wvy * 0.89);
        ctx.rotate(la);
        ctx.fillStyle = "#9a9ea6";
        ctx.strokeStyle = "#5a5e68";
        ctx.lineWidth = 1;
        ctx.fillRect(-4.5, -4, 9, 10);
        ctx.strokeRect(-4.5, -4, 9, 10);
        ctx.restore();

        const tWood0 = 0.9;
        const tWood1 = 0.965;
        const hw0 = 3.8;
        const hw1 = 0.85;
        ctx.fillStyle = "#b88250";
        ctx.strokeStyle = "#6a4a30";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(wvx * tWood0 + wpx * hw0, wvy * tWood0 + wpy * hw0);
        ctx.lineTo(wvx * tWood0 - wpx * hw0, wvy * tWood0 - wpy * hw0);
        ctx.lineTo(wvx * tWood1 - wpx * hw1, wvy * tWood1 - wpy * hw1);
        ctx.lineTo(wvx * tWood1 + wpx * hw1, wvy * tWood1 + wpy * hw1);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = "#141418";
        ctx.beginPath();
        ctx.moveTo(wvx, wvy);
        ctx.lineTo(wvx * tWood1 - wpx * hw1, wvy * tWood1 - wpy * hw1);
        ctx.lineTo(wvx * tWood1 + wpx * hw1, wvy * tWood1 + wpy * hw1);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "#2a2c32";
        ctx.beginPath();
        ctx.moveTo(wvx, wvy);
        ctx.lineTo(wvx - wux * 5.5 - wpx * 0.55, wvy - wuy * 5.5 - wpy * 0.55);
        ctx.lineTo(wvx - wux * 5.5 + wpx * 0.55, wvy - wuy * 5.5 + wpy * 0.55);
        ctx.closePath();
        ctx.fill();

        const steelEnd = 0.88;
        const sex = svx * steelEnd;
        const sey = svy * steelEnd;
        ctx.lineWidth = 5;
        ctx.strokeStyle = "#7a8088";
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(sex, sey);
        ctx.stroke();
        ctx.strokeStyle = "#d0d6de";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(svx * 0.86, svy * 0.86);
        ctx.stroke();

        const tn0 = 0.9;
        const tn1 = 0.972;
        const nhw0 = 3.2;
        const nhw1 = 0.35;
        ctx.fillStyle = "#6a6e78";
        ctx.strokeStyle = "#3a3d45";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(svx * tn0 + spx * nhw0, svy * tn0 + spy * nhw0);
        ctx.lineTo(svx * tn0 - spx * nhw0, svy * tn0 - spy * nhw0);
        ctx.lineTo(svx * tn1 - spx * nhw1, svy * tn1 - spy * nhw1);
        ctx.lineTo(svx * tn1 + spx * nhw1, svy * tn1 + spy * nhw1);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#2c2e34";
        ctx.beginPath();
        ctx.moveTo(svx, svy);
        ctx.lineTo(svx * tn1 - spx * nhw1, svy * tn1 - spy * nhw1);
        ctx.lineTo(svx * tn1 + spx * nhw1, svy * tn1 + spy * nhw1);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = "#c8ccd4";
        ctx.lineWidth = 0.9;
        ctx.beginPath();
        ctx.moveTo(svx * 0.9 + spx * 1.1, svy * 0.9 + spy * 1.1);
        ctx.lineTo(svx * tn1 * 0.98 + spx * 0.25, svy * tn1 * 0.98 + spy * 0.25);
        ctx.stroke();
        ctx.fillStyle = "#0e0e12";
        ctx.beginPath();
        ctx.moveTo(svx, svy);
        ctx.lineTo(svx - sux * 4.2 - spx * 0.28, svy - suy * 4.2 - spy * 0.28);
        ctx.lineTo(svx - sux * 4.2 + spx * 0.28, svy - suy * 4.2 + spy * 0.28);
        ctx.closePath();
        ctx.fill();

        const g = ctx.createRadialGradient(-3, -6, 1, 0, -2, COMPASS_HINGE_R);
        g.addColorStop(0, "#f2e6b8");
        g.addColorStop(0.45, "#d4b456");
        g.addColorStop(1, "#7d6220");
        ctx.beginPath();
        ctx.arc(0, -2, COMPASS_HINGE_R * 0.52, 0, Math.PI * 2);
        ctx.fillStyle = g;
        ctx.fill();
        ctx.strokeStyle = "#4a3810";
        ctx.lineWidth = 1.1;
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(0, -2, COMPASS_HINGE_R * 0.72, Math.PI * 0.88, Math.PI * 0.12, true);
        ctx.strokeStyle = "#2a1a06";
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0, -6);
        ctx.lineTo(0, -COMPASS_HINGE_R * 1.25);
        ctx.lineWidth = 4.5;
        ctx.strokeStyle = "#5c4528";
        ctx.lineCap = "round";
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(0, -COMPASS_HINGE_R * 1.32, 5.5, 0, Math.PI * 2);
        ctx.fillStyle = "#6a5030";
        ctx.fill();
        ctx.strokeStyle = "#3d2810";
        ctx.lineWidth = 1;
        ctx.stroke();

        ctx.restore();
      }

      function bboxFor(shape) {
        if (shape.type === "ruler") {
          const b = rulerAabb(shape);
          return { w: b.maxX - b.minX, h: b.maxY - b.minY };
        }
        if (shape.type === "dart") {
          return { w: DART.bbW, h: DART.bbH };
        }
        if (shape.type === "square") {
          return { w: SQUARE_S, h: SQUARE_S };
        }
        if (shape.type === "parallelogram") {
          return { w: PARA_SKEW + PARA_W, h: PARA_H };
        }
        return { w: 0, h: 0 };
      }

      /** 参考线左侧与多边形底边下方共用顺序标记 ①②③ */
      const GUIDE_LINE_ORDER_LABELS = ["①", "②", "③"];
      const POLY_SHAPE_ORDER_LABELS = GUIDE_LINE_ORDER_LABELS;
      /** 一次添加三种四边形时，图形之间的水平间隙（像素） */
      const PALETTE_THREE_SHAPES_GAP_PX = 150;
      /** 横排图形竖向基准相对画布垂直中线的上移量（略微抬高初始位置） */
      const PALETTE_THREE_SHAPES_CENTER_UP_PX = 110;
      const SHAPE_ORDER_LABEL_GAP_BELOW_BBOX_PX = 12;
      /** 正方形贴边后底侧常有「3厘米」等标注，编号再下移以免重合 */
      const SHAPE_ORDER_LABEL_SQUARE_EXTRA_DOWN_PX = 30;
      /** 编号字形大致占位高度（textBaseline top），用于其下方汇总文案起点 */
      const SHAPE_ORDER_GLYPH_BODY_PX = 24;
      /** 四条边均有标尺标注时，编号下方的汇总说明字号（与 POLY_EDGE_LENGTH_HINT_FONT_PX 一致放大） */
      const SHAPE_POLY_SUMMARY_FONT =
        "600 " +
        String(POLY_EDGE_LENGTH_HINT_FONT_PX) +
        "px system-ui, 'Segoe UI', sans-serif";
      const SHAPE_POLY_SUMMARY_LINE_GAP_PX = 6;
      /** 汇总文案逐行下移时的近似行高（与字号匹配） */
      const SHAPE_POLY_SUMMARY_LINE_HEIGHT_PX = 22;
      /** 凹四边形四条边均贴尺标注后显示 */
      const SHAPE_DART_FULL_EDGE_SUMMARY = "1+2+3+4=10(厘米)";
      /** 正方形四条边均贴尺标注后显示 */
      const SHAPE_SQUARE_FULL_EDGE_SUMMARY = "3+3+3+3=12(厘米)";
      /** 平行四边形四条边均贴尺标注后显示（多行） */
      const SHAPE_PARA_FULL_EDGE_SUMMARY_LINES = [
        "2厘米4毫米+2厘米4毫米=4厘米8毫米",
        "4厘米+4厘米=8厘米",
        "4厘米8毫米+8厘米=12厘米8毫米",
      ];

      function polyPersistTagForShapeType(shapeType) {
        if (shapeType === "dart") return "dart";
        if (shapeType === "square") return "square";
        if (shapeType === "parallelogram") return "para";
        return null;
      }

      /** 与 persistedPolyEdgeHintKeys 一致：四条边均已贴尺并记下标注 */
      function shapeHasAllFourPolyEdgeHints(s) {
        const tag = polyPersistTagForShapeType(s.type);
        if (!tag) return false;
        for (let ei = 0; ei < 4; ei++) {
          if (
            !persistedPolyEdgeHintKeys.has(
              tag + ":" + String(s.id) + ":" + String(ei)
            )
          ) {
            return false;
          }
        }
        return true;
      }

      function drawCenterOutlinedSummaryLines(ctx, cx, yTop, lines) {
        ctx.save();
        ctx.font = SHAPE_POLY_SUMMARY_FONT;
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        ctx.strokeStyle = "rgba(255,255,255,0.92)";
        ctx.lineWidth = 3.5;
        ctx.lineJoin = "round";
        ctx.fillStyle = "#4a3728";
        let y = yTop;
        for (let i = 0; i < lines.length; i++) {
          ctx.strokeText(lines[i], cx, y);
          ctx.fillText(lines[i], cx, y);
          y +=
            SHAPE_POLY_SUMMARY_LINE_GAP_PX + SHAPE_POLY_SUMMARY_LINE_HEIGHT_PX;
        }
        ctx.restore();
      }

      function hitTest(cssX, cssY) {
        for (let i = shapes.length - 1; i >= 0; i--) {
          const s = shapes[i];
          if (s.type === "ruler") {
            if (rulerHit(s, cssX, cssY)) {
              return s.id;
            }
            continue;
          }
          if (s.type === "compass") {
            if (compassHitRegion(s, cssX, cssY)) {
              return s.id;
            }
            continue;
          }
          const { w, h } = bboxFor(s);
          if (
            cssX >= s.x &&
            cssY >= s.y &&
            cssX <= s.x + w &&
            cssY <= s.y + h
          ) {
            const lx = cssX - s.x;
            const ly = cssY - s.y;
            sctx.beginPath();
            if (s.type === "dart") {
              dartPath(sctx);
            } else if (s.type === "square") {
              squarePath(sctx, SQUARE_S);
            } else {
              parallelogramPath(sctx, PARA_W, PARA_H, PARA_SKEW);
            }
            if (sctx.isPointInPath(lx, ly)) {
              return s.id;
            }
          }
        }
        return null;
      }

      /** 参考线上的基准标记：自 y=gy 仅向上的短竖线（不向下方伸出） */
      function drawGuideRefTickUp(ctx, x, gy) {
        ctx.strokeStyle = "#285080";
        ctx.lineWidth = 2.25;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(x, gy);
        ctx.lineTo(x, gy - GUIDE_REF_TICK_LEN_PX);
        ctx.stroke();
      }

      function redraw() {
        applyCompassPoseFromSweepAnim();
        const ctx = canvas.getContext("2d");
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, cssW, cssH);
        ctx.strokeStyle = GRID;
        ctx.lineWidth = 1;
        const step = 32;
        for (let x = 0; x <= cssW; x += step) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, cssH);
          ctx.stroke();
        }
        for (let y = 0; y <= cssH; y += step) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(cssW, y);
          ctx.stroke();
        }

        if (bottomGuideLineShown) {
          const guideYs = getAllGuideLineYs();
          ctx.save();
          ctx.strokeStyle = "#3d5a8a";
          ctx.lineWidth = 2.5;
          for (let yi = 0; yi < guideYs.length; yi++) {
            const gyl = guideYs[yi];
            ctx.beginPath();
            ctx.moveTo(GUIDE_LINE_XL, gyl);
            ctx.lineTo(guideLineSegRightX(), gyl);
            ctx.stroke();
            for (let di = 0; di < guideLineRefDots.length; di++) {
              const rd = guideLineRefDots[di];
              const refGy = rd.gy != null ? rd.gy : guideImplicitFootGy();
              if (Math.abs(refGy - gyl) < 1.5) {
                drawGuideRefTickUp(ctx, rd.x, gyl);
              }
            }
          }
          ctx.restore();

          const nGuideLines = guideYs.length;
          const nGuideLabels = Math.min(GUIDE_LINE_ORDER_LABELS.length, nGuideLines);
          if (nGuideLabels > 0) {
            ctx.save();
            ctx.font = "600 16px system-ui, 'Segoe UI', sans-serif";
            ctx.textAlign = "right";
            ctx.textBaseline = "middle";
            const labelXLeft = GUIDE_LINE_LABEL_ANCHOR_X;
            for (let bi = 0; bi < nGuideLabels; bi++) {
              const gi = bi;
              const gyl = guideYs[gi];
              const t = GUIDE_LINE_ORDER_LABELS[bi];
              ctx.strokeStyle = "rgba(255,255,255,0.92)";
              ctx.lineWidth = 3;
              ctx.lineJoin = "round";
              ctx.fillStyle = "#1a4d72";
              ctx.strokeText(t, labelXLeft, gyl);
              ctx.fillText(t, labelXLeft, gyl);
            }
            ctx.restore();
          }

          if (guideAlignVerticalDashActive) {
            const glDash = GUIDE_LINE_XL;
            const grDash = guideLineSegRightX();
            const lenDash = grDash - glDash;
            if (lenDash > 1) {
              const dashX = glDash + lenDash / 8;
              const yTop = guideYs[0];
              const yBot = guideYs[guideYs.length - 1];
              const padY = 20;
              ctx.save();
              ctx.strokeStyle = "rgba(61, 90, 138, 0.82)";
              ctx.lineWidth = 1.5;
              ctx.setLineDash([6, 5]);
              ctx.lineCap = "square";
              ctx.beginPath();
              ctx.moveTo(dashX, Math.max(0, yTop - padY));
              ctx.lineTo(dashX, Math.min(cssH, yBot + padY));
              ctx.stroke();
              ctx.restore();
            }
          }
        }

        for (const s of shapes) {
          ctx.save();
          if (s.type === "ruler") {
            drawRulerStroke(ctx, s);
          } else if (s.type === "compass") {
            drawCompass(ctx, s);
          } else if (s.type === "dart") {
            ctx.translate(s.x, s.y);
            drawDartStroke(ctx);
          } else if (s.type === "square") {
            ctx.translate(s.x, s.y);
            drawSquareStroke(ctx, SQUARE_S);
          } else if (s.type === "parallelogram") {
            ctx.translate(s.x, s.y);
            drawParallelogramStroke(ctx, PARA_W, PARA_H, PARA_SKEW);
          }
          ctx.restore();
        }

        const polyShapesOrdered = [];
        for (let si = 0; si < shapes.length; si++) {
          const s = shapes[si];
          if (
            s.type === "dart" ||
            s.type === "square" ||
            s.type === "parallelogram"
          ) {
            polyShapesOrdered.push(s);
          }
        }
        const nShapeLabels = Math.min(
          POLY_SHAPE_ORDER_LABELS.length,
          polyShapesOrdered.length
        );
        if (polyShapesOrdered.length > 0) {
          ctx.save();
          ctx.font = "600 17px system-ui, 'Segoe UI', sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "top";
          ctx.strokeStyle = "rgba(255,255,255,0.92)";
          ctx.lineWidth = 3;
          ctx.lineJoin = "round";
          ctx.fillStyle = "#4a3728";
          for (let li = 0; li < polyShapesOrdered.length; li++) {
            const s = polyShapesOrdered[li];
            const bb = bboxFor(s);
            const cx = s.x + bb.w * 0.5;
            let gap = SHAPE_ORDER_LABEL_GAP_BELOW_BBOX_PX;
            if (s.type === "square") {
              gap += SHAPE_ORDER_LABEL_SQUARE_EXTRA_DOWN_PX;
            }
            const yBelow = s.y + bb.h + gap;
            const showGlyph = li < nShapeLabels;
            if (showGlyph) {
              const t = POLY_SHAPE_ORDER_LABELS[li];
              ctx.strokeText(t, cx, yBelow);
              ctx.fillText(t, cx, yBelow);
            }
            if (shapeHasAllFourPolyEdgeHints(s)) {
              let ySum = yBelow;
              if (showGlyph) {
                ySum += SHAPE_ORDER_GLYPH_BODY_PX;
              }
              if (s.type === "dart") {
                drawCenterOutlinedSummaryLines(ctx, cx, ySum, [
                  SHAPE_DART_FULL_EDGE_SUMMARY,
                ]);
              } else if (s.type === "square") {
                drawCenterOutlinedSummaryLines(ctx, cx, ySum, [
                  SHAPE_SQUARE_FULL_EDGE_SUMMARY,
                ]);
              } else if (s.type === "parallelogram") {
                drawCenterOutlinedSummaryLines(
                  ctx,
                  cx,
                  ySum,
                  SHAPE_PARA_FULL_EDGE_SUMMARY_LINES
                );
              }
            }
          }
          ctx.restore();
        }

        if (bottomGuideLineShown && guideLineMarks.length > 0) {
          ctx.save();
          for (let mi = 0; mi < guideLineMarks.length; mi++) {
            const m = guideLineMarks[mi];
            const x = guideMarkFootX(m);
            const gy = guideMarkFootY(m);
            let onRef = false;
            for (let ri = 0; ri < guideLineRefDots.length; ri++) {
              const rd = guideLineRefDots[ri];
              const refGy = rd.gy != null ? rd.gy : guideImplicitFootGy();
              if (Math.abs(refGy - gy) > 1.5) continue;
              if (
                Math.abs(x - rd.x) <= GUIDE_REF_MARK_COINCIDE
              ) {
                onRef = true;
                break;
              }
            }
            if (onRef) {
              drawGuideRefTickUp(ctx, x, gy);
            } else {
              const px = m.pivotX;
              const py = m.pivotY;
              const R = Math.hypot(x - px, gy - py);
              ctx.fillStyle = "#285080";
              ctx.strokeStyle = "#285080";
              ctx.lineWidth = 2;
              if (R >= 5) {
                const baseAng = Math.atan2(gy - py, x - px);
                let span = GUIDE_MARK_ARC_LENGTH_PX / (2 * R);
                const spanMax = Math.PI * 0.42;
                if (span > spanMax) {
                  span = spanMax;
                }
                ctx.beginPath();
                ctx.arc(px, py, R, baseAng - span, baseAng + span, false);
                ctx.stroke();
              }
              ctx.beginPath();
              ctx.arc(x, gy, 3.8, 0, Math.PI * 2);
              ctx.fill();
            }
          }
          ctx.restore();
        }

        drawGuideSweepAnimOverlay(ctx);

        prunePersistedPolyEdgeHints();
        const lengthHints = buildPersistedLengthHintsForDraw();
        let giHints = [];
        for (let gi = 0; gi < guideRulerSnapHints.length; gi++) {
          giHints.push(
            layoutGuideRulerSnapHintForDraw(guideRulerSnapHints[gi])
          );
        }
        const allLengthHints = lengthHints.concat(giHints);
        if (allLengthHints.length > 0) {
          drawLengthHints(ctx, allLengthHints);
        }
      }

      function resize() {
        dpr = window.devicePixelRatio || 1;
        cssW = wrap.clientWidth;
        cssH = wrap.clientHeight;
        canvas.width = Math.max(1, Math.floor(cssW * dpr));
        canvas.height = Math.max(1, Math.floor(cssH * dpr));
        canvas.style.width = cssW + "px";
        canvas.style.height = cssH + "px";
        redraw();
      }

      function cssPointFromEvent(e) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: e.clientX - rect.left,
          y: e.clientY - rect.top,
        };
      }

      /** 将凹四边形 / 正方形 / 平行四边形横排放入画布：左、中、右，竖向略偏上，间隙见 PALETTE_THREE_SHAPES_GAP_PX */
      function addThreePolygonsRowToCanvas() {
        pushUndoSnapshot();
        const cw = cssW > 0 ? cssW : wrap.clientWidth;
        const ch = cssH > 0 ? cssH : wrap.clientHeight;
        const w0 = DART.bbW;
        const w1 = SQUARE_S;
        const w2 = PARA_SKEW + PARA_W;
        const gap = PALETTE_THREE_SHAPES_GAP_PX;
        const totalW = w0 + gap + w1 + gap + w2;
        let left = (cw - totalW) / 2;
        if (left < 6) {
          left = 6;
        }
        const cy = ch / 2 - PALETTE_THREE_SHAPES_CENTER_UP_PX;
        const h0 = DART.bbH;
        const h1 = SQUARE_S;
        const h2 = PARA_H;

        function placePoly(type, x, y, bw, bh) {
          const nx = Math.max(0, Math.min(cw - bw, x));
          const ny = Math.max(0, Math.min(ch - bh, y));
          shapes.push({ id: nextId++, type: type, x: nx, y: ny });
        }

        placePoly("dart", left, cy - h0 / 2, w0, h0);
        placePoly("square", left + w0 + gap, cy - h1 / 2, w1, h1);
        placePoly(
          "parallelogram",
          left + w0 + gap + w1 + gap,
          cy - h2 / 2,
          w2,
          h2
        );
        redraw();
      }

      function setCanvasCursorFromHover(px, py) {
        lastHoverCss.x = px;
        lastHoverCss.y = py;
        if (placeCompassMode) {
          canvas.style.cursor = "crosshair";
          return;
        }
        for (let i = shapes.length - 1; i >= 0; i--) {
          const s = shapes[i];
          if (s.type !== "compass") continue;
          const r = compassHitRegion(s, px, py);
          if (r === "L" || r === "R" || r === "body") {
            canvas.style.cursor = "grab";
            return;
          }
        }
        if (
          bottomGuideLineShown &&
          hitTest(px, py) == null &&
          hitBottomGuideLineBand(px, py)
        ) {
          canvas.style.cursor = "pointer";
          return;
        }
        canvas.style.cursor = hitTest(px, py) != null ? "grab" : "default";
      }

      function canvasHasCompassShape() {
        for (let i = 0; i < shapes.length; i++) {
          if (shapes[i].type === "compass") {
            return true;
          }
        }
        return false;
      }

      /** 与拖动圆规时相同的画布边界，取 roughly 中央 */
      function defaultCompassPlacementCss() {
        const cw = cssW > 0 ? cssW : wrap.clientWidth;
        const ch = cssH > 0 ? cssH : wrap.clientHeight;
        const margin = COMPASS_LEG_LEN + COMPASS_HINGE_R;
        return {
          x: Math.max(margin * 0.15, Math.min(cw - margin * 0.15, cw / 2)),
          y: Math.max(
            COMPASS_Y_MIN,
            Math.min(
              ch - margin * 0.15,
              ch / 2 - COMPASS_PALETTE_PLACE_UP_OFFSET_PX
            )
          ),
        };
      }

      function addCompassAtCss(px, py) {
        shapes.push({
          id: nextId++,
          type: "compass",
          x: px,
          y: py,
          spread: 0.35,
          angle: 0,
        });
        if (!bottomGuideLineShown) {
          bottomGuideLineShown = true;
        }
      }

      canvas.addEventListener("pointerdown", function (e) {
        if (e.button !== 0) return;
        const p = cssPointFromEvent(e);
        let id = hitTest(p.x, p.y);
        const paletteCompassEl = document.getElementById("paletteCompass");
        if (placeCompassMode) {
          pushUndoSnapshot();
          if (id == null) {
            addCompassAtCss(p.x, p.y);
            placeCompassMode = false;
            if (paletteCompassEl) {
              paletteCompassEl.classList.remove("active");
            }
            redraw();
            return;
          }
          placeCompassMode = false;
          if (paletteCompassEl) {
            paletteCompassEl.classList.remove("active");
          }
        }
        if (
          bottomGuideLineShown &&
          id == null &&
          !placeCompassMode &&
          hitBottomGuideLineBand(p.x, p.y)
        ) {
          const hitGy = hitGuideLineBandAt(p.x, p.y);
          if (hitGy == null) {
            return;
          }
          const gl = GUIDE_LINE_XL;
          const gr = guideLineSegRightX();
          const x = Math.max(gl, Math.min(gr, p.x));
          let lineIdx = -1;
          for (let di = 0; di < guideLineRefDots.length; di++) {
            const rd = guideLineRefDots[di];
            const dotGy = rd.gy != null ? rd.gy : guideImplicitFootGy();
            if (Math.abs(dotGy - hitGy) < 2) {
              lineIdx = di;
              break;
            }
          }
          if (lineIdx >= 0) {
            return;
          }
          pushUndoSnapshot();
          guideLineRefDots.push({ x: x, gy: hitGy });
          redraw();
          return;
        }
        if (id == null) return;
        const s = shapes.find(function (sh) {
          return sh.id === id;
        });
        if (!s) return;
        pushUndoSnapshot();
        dragShapeId = id;
        dragOffsetX = p.x - s.x;
        dragOffsetY = p.y - s.y;
        if (s.type === "ruler") {
          rulerTap = { x0: p.x, y0: p.y, moved: false };
          compassLegDrag = null;
          compassTap = null;
        } else if (s.type === "compass") {
          rulerTap = null;
          const leg = compassHitRegion(s, p.x, p.y);
          compassLegDrag = leg === "L" || leg === "R" ? leg : null;
          compassTap =
            compassLegDrag == null
              ? { x0: p.x, y0: p.y, moved: false }
              : null;
          if (compassLegDrag != null) {
            s.edgeSnapStraightenPending = false;
          }
        } else {
          rulerTap = null;
          compassLegDrag = null;
          compassTap = null;
        }
        canvas.setPointerCapture(e.pointerId);
        canvas.style.cursor = compassLegDrag != null ? "grabbing" : "grabbing";
      });

      canvas.addEventListener("pointermove", function (e) {
        const p = cssPointFromEvent(e);
        if (dragShapeId != null) {
          const s = shapes.find(function (sh) {
            return sh.id === dragShapeId;
          });
          if (!s) return;
          if (
            s.type === "compass" &&
            (compassLegDrag === "L" || compassLegDrag === "R")
          ) {
            compassUpdateSpreadFromPointer(s, p.x, p.y, compassLegDrag);
            redraw();
            return;
          }
          if (s.type === "ruler") {
            if (rulerTap != null) {
              const dist = Math.hypot(p.x - rulerTap.x0, p.y - rulerTap.y0);
              if (!rulerTap.moved && dist <= RULER_TAP_DRAG_THRESH) {
                return;
              }
              rulerTap.moved = true;
            }
            s.x = p.x - dragOffsetX;
            s.y = p.y - dragOffsetY;
            redraw();
            return;
          }
          if (s.type === "compass") {
            if (compassLegDrag == null && compassTap != null) {
              const dist = Math.hypot(
                p.x - compassTap.x0,
                p.y - compassTap.y0
              );
              if (!compassTap.moved && dist <= RULER_TAP_DRAG_THRESH) {
                return;
              }
              compassTap.moved = true;
            }
            let nx = p.x - dragOffsetX;
            let ny = p.y - dragOffsetY;
            const margin = COMPASS_LEG_LEN + COMPASS_HINGE_R;
            nx = Math.max(margin * 0.15, Math.min(cssW - margin * 0.15, nx));
            ny = Math.max(COMPASS_Y_MIN, Math.min(cssH - margin * 0.15, ny));
            s.x = nx;
            s.y = ny;
            maybeStraightenCompassUprightIfLeftPolyEdge(s);
            redraw();
            return;
          }
          const { w, h } = bboxFor(s);
          let nx = p.x - dragOffsetX;
          let ny = p.y - dragOffsetY;
          nx = Math.max(0, Math.min(cssW - w, nx));
          ny = Math.max(0, Math.min(cssH - h, ny));
          s.x = nx;
          s.y = ny;
          redraw();
          return;
        }
        setCanvasCursorFromHover(p.x, p.y);
      });

      function endDrag(e) {
        if (dragShapeId == null) return;
        const sid = dragShapeId;
        const s = shapes.find(function (sh) {
          return sh.id === sid;
        });
        dragShapeId = null;
        try {
          canvas.releasePointerCapture(e.pointerId);
        } catch (_) {}
        let needRedraw = false;
        const pEnd = cssPointFromEvent(e);
        if (s && s.type === "ruler" && rulerTap != null && rulerTap.moved) {
          if (trySnapRulerToPolyEdge(s, pEnd.x, pEnd.y)) {
            needRedraw = true;
          } else if (trySnapRulerToGuideLine(s)) {
            needRedraw = true;
          }
        }
        const compassBodyDragged =
          s &&
          s.type === "compass" &&
          compassTap != null &&
          compassTap.moved &&
          compassLegDrag == null;
        rulerTap = null;
        compassTap = null;
        compassLegDrag = null;
        if (s && s.type === "compass") {
          const fromState = {
            x: s.x,
            y: s.y,
            angle: s.angle,
            spread: s.spread,
          };
          const tipsBeforeSnap = compassTipsWorld(s);
          const snapGy = trySnapCompassToBottomGuide(s);
          if (snapGy !== false) {
            s.edgeSnapStraightenPending = false;
            const toState = {
              x: s.x,
              y: s.y,
              angle: s.angle,
              spread: s.spread,
            };
            const tipsAfterSnap = compassTipsWorld(s);
            s.x = fromState.x;
            s.y = fromState.y;
            s.angle = fromState.angle;
            s.spread = fromState.spread;
            beginGuideSweepAnimation(
              tipsBeforeSnap,
              tipsAfterSnap,
              s.id,
              fromState,
              toState,
              snapGy
            );
            needRedraw = true;
          } else if (
            compassBodyDragged &&
            trySnapCompassToNearestPolyEdgeByPointer(s, pEnd.x, pEnd.y)
          ) {
            needRedraw = true;
          }
        }
        if (needRedraw) {
          redraw();
        }
        setCanvasCursorFromHover(pEnd.x, pEnd.y);
      }

      canvas.addEventListener("pointerup", endDrag);
      canvas.addEventListener("pointercancel", endDrag);

      function toggleRulerFromPalette() {
        pushUndoSnapshot();
        let hasRuler = false;
        for (let i = 0; i < shapes.length; i++) {
          if (shapes[i].type === "ruler") {
            hasRuler = true;
            break;
          }
        }
        if (hasRuler) {
          for (let i = shapes.length - 1; i >= 0; i--) {
            if (shapes[i].type !== "ruler") continue;
            if (dragShapeId === shapes[i].id) {
              dragShapeId = null;
            }
            shapes.splice(i, 1);
          }
        } else {
          const cw = cssW > 0 ? cssW : wrap.clientWidth;
          const ch = cssH > 0 ? cssH : wrap.clientHeight;
          const bottomMargin = 18;
          const cy = Math.max(
            RULER_H / 2 + 6,
            Math.min(ch - RULER_H / 2 - 6, ch - bottomMargin - RULER_H / 2)
          );
          const r = {
            id: nextId++,
            type: "ruler",
            x: cw / 2,
            y: cy,
            angle: RULER_ANGLE_H,
          };
          shapes.push(r);
        }
        redraw();
      }

      document.querySelectorAll(".palette-item[data-shape]").forEach(function (el) {
        const kind = el.getAttribute("data-shape");
        if (kind !== "ruler") {
          return;
        }
        el.addEventListener("click", function () {
          toggleRulerFromPalette();
        });
        el.addEventListener("keydown", function (e) {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            toggleRulerFromPalette();
          }
        });
      });

      (function initPaletteAddShapes() {
        const el = document.getElementById("paletteAddShapes");
        if (!el) return;
        function activate(e) {
          if (e) e.preventDefault();
          addThreePolygonsRowToCanvas();
        }
        el.addEventListener("click", activate);
        el.addEventListener("keydown", function (e) {
          if (e.key === "Enter" || e.key === " ") {
            activate(e);
          }
        });
      })();

      (function initPaletteCompass() {
        const el = document.getElementById("paletteCompass");
        if (!el) return;
        function activatePaletteCompass() {
          pushUndoSnapshot();
          if (!canvasHasCompassShape()) {
            const c = defaultCompassPlacementCss();
            addCompassAtCss(c.x, c.y);
            if (compassPaletteButtonClicks === 0) {
              compassPaletteButtonClicks = 1;
            }
            placeCompassMode = false;
            el.classList.remove("active");
            setCanvasCursorFromHover(lastHoverCss.x, lastHoverCss.y);
            redraw();
            return;
          }
          compassPaletteButtonClicks++;
          if (compassPaletteButtonClicks === 1) {
            placeCompassMode = true;
            el.classList.add("active");
          } else {
            placeCompassMode = false;
            el.classList.remove("active");
            bottomGuideLineShown = true;
            if (compassPaletteButtonClicks <= 3 && compassPaletteButtonClicks >= 2) {
              if (extraGuideLineOffsetsPx.length < 2) {
                extraGuideLineOffsetsPx.push(EXTRA_GUIDE_STEP_PX);
              }
            }
          }
          setCanvasCursorFromHover(lastHoverCss.x, lastHoverCss.y);
          redraw();
        }
        el.addEventListener("click", function (e) {
          e.preventDefault();
          activatePaletteCompass();
        });
        el.addEventListener("keydown", function (e) {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            activatePaletteCompass();
          }
        });
      })();

      (function initPaletteAlignGuides() {
        const el = document.getElementById("paletteAlignGuides");
        if (!el) return;
        function activate(e) {
          if (e) e.preventDefault();
          alignGuideLinePointsToOneEighth();
        }
        el.addEventListener("click", activate);
        el.addEventListener("keydown", function (e) {
          if (e.key === "Enter" || e.key === " ") {
            activate(e);
          }
        });
      })();

      function clearCanvas() {
        pushUndoSnapshot();
        shapes.length = 0;
        nextId = 1;
        persistedPolyEdgeHintKeys.clear();
        dragShapeId = null;
        dragOffsetX = 0;
        dragOffsetY = 0;
        rulerTap = null;
        compassTap = null;
        compassLegDrag = null;
        placeCompassMode = false;
        bottomGuideLineShown = false;
        compassPaletteButtonClicks = 0;
        extraGuideLineOffsetsPx.length = 0;
        guideAlignVerticalDashActive = false;
        guideRulerSnapHints.length = 0;
        guideLineMarks.length = 0;
        guideLineRefDots.length = 0;
        cancelGuideSweepAnimation();
        const ce = document.getElementById("paletteCompass");
        if (ce) ce.classList.remove("active");
        setCanvasCursorFromHover(lastHoverCss.x, lastHoverCss.y);
        redraw();
      }

      (function initPaletteUndo() {
        const el = document.getElementById("paletteUndo");
        if (!el) return;
        function activate(e) {
          if (e) e.preventDefault();
          performUndo();
        }
        el.addEventListener("click", activate);
        el.addEventListener("keydown", function (e) {
          if (e.key === "Enter" || e.key === " ") {
            activate(e);
          }
        });
        updatePaletteUndoButton();
      })();

      (function initPaletteClear() {
        const el = document.getElementById("paletteClear");
        if (!el) return;
        el.addEventListener("click", function (e) {
          e.preventDefault();
          clearCanvas();
        });
        el.addEventListener("keydown", function (e) {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            clearCanvas();
          }
        });
      })();

      window.addEventListener("resize", resize);
      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(resize);
      } else {
        requestAnimationFrame(resize);
      }
    })();
  </script>
</body>
</html>
