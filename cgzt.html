<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GG</title>
  <style>
    * {
      box-sizing: border-box;
    }
    html, body {
      margin: 0;
      height: 100%;
      font-family: system-ui, sans-serif;
      background: #fdf8e8;
      color: #1a1a1e;
    }
    .page {
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 100vh;
      padding: 12px;
      gap: 8px;
      background: #fdf8e8;
    }
    .canvas-wrap {
      flex: 1;
      min-height: 200px;
      display: flex;
      align-items: stretch;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #e0e0e0;
      background: #ffffff;
    }
    #mainCanvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }
    .bottom-bar {
      flex-shrink: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      align-items: center;
      gap: 8px 12px;
      min-height: 0;
      padding: 6px 10px 6px 12px;
    }
    .controls {
      grid-column: 2;
      justify-self: center;
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 12px;
    }
    .page-attribution {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 1.05rem;
      color: #5a5045;
      letter-spacing: 0.05em;
      line-height: 1.45;
      user-select: none;
    }
    .page-attribution--left {
      grid-column: 1;
      justify-self: start;
      align-self: center;
      align-items: flex-start;
    }
    .page-attribution--right {
      grid-column: 3;
      justify-self: end;
      align-self: center;
      align-items: flex-end;
    }
    @media (max-width: 720px) {
      .bottom-bar {
        grid-template-columns: 1fr;
        justify-items: stretch;
      }
      .controls {
        grid-column: 1;
        justify-self: center;
        width: 100%;
      }
      .page-attribution--left {
        grid-column: 1;
        justify-self: start;
        align-items: flex-start;
      }
      .page-attribution--right {
        grid-column: 1;
        justify-self: end;
        align-items: flex-end;
      }
    }
    .palette-item {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 76px;
      height: 76px;
      border: 1px solid #d0d0d0;
      border-radius: 5px;
      background: #fff;
      cursor: grab;
      user-select: none;
      -webkit-user-drag: element;
    }
    .palette-item:active {
      cursor: grabbing;
    }
    .palette-item--label {
      font-size: 1rem;
      font-weight: normal;
      color: #4a3728;
      letter-spacing: 0.12em;
      cursor: pointer;
    }
    .palette-item--compass.active {
      outline: 2px solid #4a6fa5;
      outline-offset: 2px;
    }
    .palette-item--redline {
      font-size: 0.98rem;
      color: #b71c1c;
      letter-spacing: 0.08em;
      cursor: pointer;
    }
    .palette-item--redline.active {
      outline: 2px solid #c62828;
      outline-offset: 2px;
    }
    .palette-item--clear,
    .palette-item--undo {
      letter-spacing: 0.12em;
      -webkit-user-drag: none;
    }
    .palette-item--click-add {
      cursor: pointer;
      user-select: none;
      -webkit-user-drag: none;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="canvas-wrap">
      <canvas id="mainCanvas" width="800" height="600"></canvas>
    </div>
    <div class="bottom-bar">
      <footer class="page-attribution page-attribution--left" aria-label="学校署名">
        <span>石实实验学校原创设计</span>
      </footer>
      <div class="controls" aria-label="控件区域">
        <div
          class="palette-item palette-item--click-add"
        role="button"
        tabindex="0"
        data-shape="triangle"
        title="点击在画布中央添加直角三角形；画布上可拖动"
        aria-label="直角三角形"
      ></div>
      <div
        class="palette-item palette-item--click-add"
        role="button"
        tabindex="0"
        data-shape="leaf"
        title="点击在画布中央添加叶形；画布上可拖动"
        aria-label="叶形"
      ></div>
      <div
        class="palette-item palette-item--label"
        data-shape="ruler"
        role="button"
        tabindex="0"
        title="点击在画布中央显示直尺，再点击隐藏；轻点直尺切换角度，拖动可移动；拖到水平参考线附近松手且尺面近似水平：自动摆正，刻度 0 对齐该线上最靠左的点（须已有手动基准点或圆规脚印），尺身略低于参考线以免遮住线；拖到三角形或叶形边附近松手则贴边吸附"
        aria-label="直尺"
      >直尺</div>
      <div
        class="palette-item palette-item--label palette-item--compass"
        id="paletteCompass"
        role="button"
        tabindex="0"
        title="先点此进入放置模式，再在画布空白处点击放置圆规；画布上轻点圆规铰链或腿身可循环角度（与直尺相同三向），拖动移动，拖动腿尖张合；下方实线辅助线：首次两脚靠近松手吸附并记下两点，之后须将左脚尖移到上一右脚标记附近再松手，左脚落在该点、记下新右脚点（可继续得到第四、五点…）；贴近三角形边时也会自动对齐；首次放置后出现该辅助线"
        aria-label="圆规"
      >圆规</div>
      <div
        class="palette-item palette-item--label palette-item--redline"
        id="paletteRedLine"
        role="button"
        tabindex="0"
        title="点击进入绘制模式，在画布空白处按住拖动绘制红色线条；松手后根据与轮廓的平均距离选取最近的三角形、叶形或直尺，并将线条替换为该图形外缘完整一圈。点击仍带吸附标记的红线可化曲为直（长度与贴合周长相同），并水平居中移到该图形正下方"
        aria-label="红线"
      >红线</div>
      <div
        class="palette-item palette-item--label palette-item--click-add"
        id="paletteLetters"
        role="button"
        tabindex="0"
        title="点击批量标注：参考线圆规标记下方依次为 A、B、C、(A)…；三角形左下顶点左侧 A、右上右侧 B、左上左侧 C；可在画布上拖动字母"
        aria-label="标字母"
      >标字母</div>
      <div
        class="palette-item palette-item--label palette-item--undo"
        id="paletteUndo"
        role="button"
        tabindex="0"
        title="撤销上一步操作（最多保留约 50 步）"
        aria-label="撤销"
      >撤销</div>
      <div
        class="palette-item palette-item--label palette-item--clear"
        id="paletteClear"
        role="button"
        tabindex="0"
        title="清空画布：移除三角形、叶形、直尺、圆规、红线、批量标注字母及辅助线标记"
        aria-label="清除"
      >清除</div>
      </div>
      <footer class="page-attribution page-attribution--right" aria-label="班级与教师">
        <span>301班 小于AI老师</span>
      </footer>
    </div>
  </div>
  <script>
    (function () {
      const canvas = document.getElementById("mainCanvas");
      const wrap = canvas.parentElement;
      const STROKE = "#1a1a1e";
      const GRID = "#e8e8e8";

      /** 直角在左上，三边长 3:4:5（左侧竖边 3k、顶边 4k、斜边 5k） */
      const TRI_K = 60;
      const TRI_LEG_LEFT = 3 * TRI_K;
      const TRI_LEG_TOP = 4 * TRI_K;
      /** 叶形在 0–100 归一化坐标内绘制；外接框按比例放大，使 leafOutlineVertsLocal 折线周长≈13cm（与直尺 TRI_K 一致） */
      const LEAF_PERIM_TARGET_CM = 13;
      /** 与 leafOutlineVertsLocal 相同采样下，外接 200×207.5 时的折线周长（px） */
      const LEAF_REF_OUTLINE_PERIM_PX = 598.7611050070632;
      const LEAF_DIM_SCALE =
        (LEAF_PERIM_TARGET_CM * TRI_K) / LEAF_REF_OUTLINE_PERIM_PX;
      const LEAF_W = 200 * LEAF_DIM_SCALE;
      const LEAF_H = 207.5 * LEAF_DIM_SCALE;
      /** 从调色板添加三角形/叶形时，相对竖直方向居中再略向上偏移（px） */
      const PALETTE_SHAPE_INITIAL_OFFSET_UP = 36;
      const LABEL_W = 48;
      const LABEL_H = 54;
      /** 参考线圆规标记点下方字母周期：A → B → C → (A) → … */
      const GUIDE_MARK_LETTER_CYCLE = ["A", "B", "C", "(A)"];
      const TRI_VERTEX_LABEL_GAP = 12;
      /** 标记点在参考线上的 y，字母框顶部下移（px） */
      const GUIDE_MARK_LABEL_BELOW_GAP = 12;

      /** 画布上 1 cm 的像素长度，与三角形直角边 3k、4k、斜边 5k（k=60）一致，可用直尺读出 3、4、5 cm */
      const PX_PER_CM = TRI_K;
      const RULER_MAX_CM = 15;
      const RULER_SCALE_W = RULER_MAX_CM * PX_PER_CM;
      const RULER_MARGIN_X = 12;
      const RULER_W = RULER_SCALE_W + 2 * RULER_MARGIN_X;
      const RULER_H = 56;
      const RULER_FILL = "#f8f0e0";
      const RULER_BROWN = "#4a3728";
      const RULER_RADIUS = 8;
      const RULER_OUTER_BORDER = "#c4b8aa";
      /** 直尺旋转：水平、竖直、与 3:4:5 三角形斜边同向（左下→右上） */
      const RULER_ANGLE_H = 0;
      const RULER_ANGLE_V = Math.PI / 2;
      const RULER_ANGLE_HYP = Math.atan2(-TRI_LEG_LEFT, TRI_LEG_TOP);
      const RULER_ANGLES = [RULER_ANGLE_H, RULER_ANGLE_V, RULER_ANGLE_HYP];
      /** 直尺：位移小于此值视为点击旋转，大于则视为拖动 */
      const RULER_TAP_DRAG_THRESH = 8;
      /** 直尺刻度边与三角形边：平行阈值与最大间距（像素） */
      const RULER_EDGE_SNAP_DIST = 14;
      const RULER_EDGE_PARALLEL_COS = Math.cos((12 * Math.PI) / 180);
      /** 刻度带在尺面局部坐标中的 y（与 0 刻度对齐，贴边吸附用） */
      const RULER_SCALE_LINE_Y = 14;
      /** 拖动直尺松手时，指针靠近三角形 / 叶形边的吸附距离（像素） */
      const RULER_TRI_SNAP_DIST = 26;
      /** 吸附后刻度带与图形边之间的空隙（像素） */
      const RULER_TRI_EDGE_GAP = 16;
      /** 直尺贴近底部参考线时的竖直吸附容差（像素，与参考页 cgztlx 一致） */
      const RULER_GUIDE_SNAP_DIST = 16;
      /** 吸附参考线后尺顶与参考线之间的间隙，避免尺身遮住参考线 */
      const RULER_GUIDE_SNAP_LINE_CLEARANCE_PX = 2;

      const COMPASS_LEG_LEN = 218;
      const COMPASS_HINGE_R = 16;
      /** 铰链 y 下限（可为负），圆规可从画布上边缘移出 */
      const COMPASS_Y_MIN = -(COMPASS_LEG_LEN + COMPASS_HINGE_R + 36);
      const COMPASS_LEG_HIT_R = 20;
      const COMPASS_PIVOT_HIT_R = 22;
      const COMPASS_MIN_SPREAD = 0.12;
      const COMPASS_MAX_SPREAD = 0.82;
      const COMPASS_GUIDE_Y_RATIO = 0.82;
      /** 两脚 y 与辅助线差小于此值（像素）时松手可吸附到辅助线 */
      const COMPASS_GUIDE_SNAP_Y = 30;
      /** 链式吸附：当前左脚尖距「上一右脚标记」的最大距离（像素） */
      const COMPASS_GUIDE_CHAIN_HIT = 44;
      /** 左脚尖距参考线固定基准点（蓝点）在此距离内时，松手吸附到该点 */
      const COMPASS_GUIDE_REF_SNAP = 42;
      /** 腿尖到三角形边的距离小于此值且铰链接近解时，松手吸附到该边两端 */
      const COMPASS_EDGE_SNAP_TIP = 34;
      const COMPASS_EDGE_SNAP_HINGE_MAX = 68;
      /** 拖动圆规枢轴松手时，指针靠近轮廓边的吸附距离（像素） */
      const COMPASS_POLY_EDGE_POINTER_SNAP = 28;

      /** 吸附参考线扫弧动画时长（圆规绕左脚尖转动右脚画弧） */
      const SWEEP_ANIM_DURATION_MS = 920;
      /** 虚线扫弧圆心角相对几何 sweep 的缩放（<1 缩短弧长，不影响吸附终点） */
      const SWEEP_ARC_ANGLE_SCALE = 0.48;

      const REDLINE_STROKE_WIDTH = 3;
      const REDLINE_COLOR = "#c62828";
      const REDLINE_SAMPLE_STEP = 3;
      /** 点击贴合红线：与折线的最大距离（像素） */
      const REDLINE_HIT_DIST = 12;
      /** 画红线时指针与叶形轮廓距离小于此值则吸附到轮廓上（边画边贴） */
      const REDLINE_LEAF_LIVE_SNAP_DIST = 50;
      /** 化直后放在图形底边下方的间距 */
      const REDLINE_BELOW_GAP = 10;

      let dpr = 1;
      let cssW = 0;
      let cssH = 0;

      /**
       * @type {{
       *   id: number;
       *   type: string;
       *   x: number;
       *   y: number;
       *   angle?: number;
       * }[]}
       */
      const shapes = [];
      let nextId = 1;

      /** 已用直尺贴边标过的三角形边 `三角形id-边索引(0顶/1左/2斜)`，移走直尺后仍显示，随三角形移动更新位置 */
      const persistedEdgeHintKeys = new Set();

      let dragShapeId = null;
      let dragOffsetX = 0;
      let dragOffsetY = 0;
      /** @type {{ x0: number, y0: number, moved: boolean } | null} */
      let rulerTap = null;
      /** 圆规铰链/腿身轻点旋转（阈值同直尺），拖动则平移 */
      /** @type {{ x0: number, y0: number, moved: boolean } | null} */
      let compassTap = null;
      let placeCompassMode = false;
      let drawRedLineMode = false;
      /** @type {{ points: { x: number; y: number }[]; pointerId: number } | null} */
      let redLineStroke = null;
      let bottomGuideLineShown = false;
      /** 直尺贴近过底部参考线后，居中「12cm」保持显示（移开直尺仍保留） */
      let guideLine12cmLabelPersisted = false;
      /** 叶形周长红线化直后：拖动直尺松手时若贴近该红线段则记下叶 id，叶形下持续显示「13厘米」 */
      const persistedLeaf13cmLabelIds = new Set();
      /** 吸附到辅助线的标记：x 为脚上一点的参考线 x；pivot 为该次吸附时左脚尖（左腿）世界坐标，作圆弧圆心 */
      /** @type {{ x: number; pivotX: number; pivotY: number }[]} */
      let guideLineMarks = [];
      /** 用户在底部参考线上点击放置的基准点（仅 x）；整条参考线至多手动添加一处，之后再点不增加（绘制成向上短竖线） */
      /** @type {{ x: number }[]} */
      let guideLineRefDots = [];
      /** 圆规吸附参考线时：绕左脚枢轴刚体转动；扫弧为劣弧，端点「参考线上方 → 下方」，canvas 按最短劣弧方向绘制 */
      /** @type {{
       *   pivotX: number;
       *   pivotY: number;
       *   r: number;
       *   a0: number;
       *   deltaA: number;
       *   overlayArcDelta?: number;
       *   refRightAngle: number;
       *   sweepArcStart: number;
       *   sweepArcDeltaMinor: number;
       *   sweepArcAnticlockwise: boolean;
       *   t0: number;
       *   duration: number;
       *   raf: number;
       *   compassId?: number;
       *   fromSt?: { x: number; y: number; angle: number; spread: number };
       *   toSt?: { x: number; y: number; angle: number; spread: number };
       * } | null} */
      let guideSweepAnim = null;
      /** 用户点在参考线上时与圆规脚标记的 x 差小于此值（px）时，用同一样式的短竖线标记 */
      const GUIDE_REF_MARK_COINCIDE = 9;
      /** 参考线基准短竖线：自参考线向上画，长度（px），不向参考线下方延伸 */
      const GUIDE_REF_TICK_LEN_PX = 12;
      /** 参考线上「点旁弧」的目标弧长（像素），半径变化时调整圆心角保持弧长相近 */
      const GUIDE_MARK_ARC_LENGTH_PX = 30;
      /** 三角形三边与参考线上各段的对应示意（弧/箭头）描边，其余参考线元素保持原色 */
      const GUIDE_MAPPING_CURVE_COLOR = "#8dc9f4";
      /** @type {"L" | "R" | null} */
      let compassLegDrag = null;
      let lastHoverCss = { x: 0, y: 0 };

      const UNDO_STACK_MAX = 50;
      /** @type {object[]} */
      const undoStack = [];
      let undoMute = false;

      function captureCanvasStateForUndo() {
        return {
          shapes: JSON.parse(JSON.stringify(shapes)),
          nextId: nextId,
          persistedEdgeHintKeys: Array.from(persistedEdgeHintKeys),
          guideLine12cmLabelPersisted: guideLine12cmLabelPersisted,
          persistedLeaf13cmLabelIds: Array.from(persistedLeaf13cmLabelIds),
          guideLineMarks: JSON.parse(JSON.stringify(guideLineMarks)),
          guideLineRefDots: JSON.parse(JSON.stringify(guideLineRefDots)),
          bottomGuideLineShown: bottomGuideLineShown,
          placeCompassMode: placeCompassMode,
          drawRedLineMode: drawRedLineMode,
        };
      }

      function recordUndoBeforeChange() {
        if (undoMute) return;
        undoStack.push(captureCanvasStateForUndo());
        while (undoStack.length > UNDO_STACK_MAX) {
          undoStack.shift();
        }
      }

      function applyUndoSnapshot(snap) {
        undoMute = true;
        try {
          const restored = JSON.parse(JSON.stringify(snap.shapes));
          shapes.length = 0;
          for (let i = 0; i < restored.length; i++) {
            shapes.push(restored[i]);
          }
          nextId = snap.nextId;
          persistedEdgeHintKeys.clear();
          for (let hi = 0; hi < snap.persistedEdgeHintKeys.length; hi++) {
            persistedEdgeHintKeys.add(snap.persistedEdgeHintKeys[hi]);
          }
          guideLine12cmLabelPersisted = snap.guideLine12cmLabelPersisted;
          persistedLeaf13cmLabelIds.clear();
          for (let li = 0; li < snap.persistedLeaf13cmLabelIds.length; li++) {
            persistedLeaf13cmLabelIds.add(snap.persistedLeaf13cmLabelIds[li]);
          }
          guideLineMarks = JSON.parse(JSON.stringify(snap.guideLineMarks));
          guideLineRefDots = JSON.parse(JSON.stringify(snap.guideLineRefDots));
          bottomGuideLineShown = snap.bottomGuideLineShown;
          placeCompassMode = snap.placeCompassMode;
          drawRedLineMode = snap.drawRedLineMode;
          dragShapeId = null;
          dragOffsetX = 0;
          dragOffsetY = 0;
          rulerTap = null;
          compassTap = null;
          compassLegDrag = null;
          redLineStroke = null;
          if (guideSweepAnim != null && guideSweepAnim.raf) {
            cancelAnimationFrame(guideSweepAnim.raf);
          }
          guideSweepAnim = null;
          const ce = document.getElementById("paletteCompass");
          if (ce) ce.classList.toggle("active", placeCompassMode);
          const rle = document.getElementById("paletteRedLine");
          if (rle) rle.classList.toggle("active", drawRedLineMode);
          setCanvasCursorFromHover(lastHoverCss.x, lastHoverCss.y);
          redraw();
        } finally {
          undoMute = false;
        }
      }

      function undoLastChange() {
        if (undoStack.length === 0) {
          return;
        }
        const snap = undoStack.pop();
        applyUndoSnapshot(snap);
      }

      const scratch = document.createElement("canvas");
      const sctx = scratch.getContext("2d");

      function trianglePath(ctx, topLen, leftLen) {
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(topLen, 0);
        ctx.lineTo(0, leftLen);
        ctx.closePath();
      }

      /**
       * 叶形轮廓：与参考图一致的 0–100 坐标系（左上为原点，y 向下）。
       * 关键点：底尖 (10,95) → 左肩 (20,30) → 顶 (50,7) → 右上 (90,6) →
       * 最右 (96,40) → 腰凹 (88,55) → (85,75) → 回底尖。
       */
      function leafPath(ctx, w, h) {
        const s = Math.min(w / 100, h / 100);
        const ox = (w - 100 * s) / 2;
        const oy = (h - 100 * s) / 2;
        const X = function (x) {
          return ox + x * s;
        };
        const Y = function (y) {
          return oy + y * s;
        };
        ctx.beginPath();
        ctx.moveTo(X(10), Y(95));
        ctx.bezierCurveTo(X(4), Y(86), X(12), Y(50), X(20), Y(30));
        ctx.bezierCurveTo(X(30), Y(16), X(40), Y(5), X(50), Y(7));
        ctx.bezierCurveTo(X(62), Y(6), X(76), Y(5), X(90), Y(6));
        ctx.bezierCurveTo(X(90), Y(16), X(94), Y(28), X(96), Y(40));
        ctx.bezierCurveTo(X(97), Y(47), X(92), Y(52), X(88), Y(55));
        ctx.bezierCurveTo(X(86), Y(62), X(86), Y(69), X(85), Y(75));
        ctx.bezierCurveTo(X(68), Y(91), X(38), Y(99), X(10), Y(95));
        ctx.closePath();
      }

      function drawTriangleStroke(ctx, topLen, leftLen) {
        trianglePath(ctx, topLen, leftLen);
        ctx.strokeStyle = STROKE;
        ctx.lineWidth = 2.5;
        ctx.lineJoin = "miter";
        ctx.miterLimit = 3;
        ctx.stroke();
      }

      function drawLeafStroke(ctx, w, h) {
        leafPath(ctx, w, h);
        ctx.strokeStyle = STROKE;
        ctx.lineWidth = 2.5;
        ctx.lineJoin = "miter";
        ctx.miterLimit = 3;
        ctx.stroke();
      }

      function drawLabelStroke(ctx, s) {
        const letter = s.letter || "?";
        const boxW = labelDisplayWidthForLetter(letter);
        ctx.save();
        ctx.translate(s.x, s.y);
        const fs =
          letter.length <= 1
            ? 32
            : Math.max(18, Math.min(32, Math.floor(160 / letter.length)));
        ctx.font = "700 " + fs + "px system-ui, sans-serif";
        ctx.fillStyle = STROKE;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(letter, boxW / 2, LABEL_H / 2);
        ctx.restore();
      }

      function labelDisplayWidthForLetter(letter) {
        const L = letter != null ? String(letter) : "?";
        if (L.length <= 1) return LABEL_W;
        return Math.max(LABEL_W, Math.ceil(L.length * 14));
      }

      function rulerAabb(s) {
        const a = s.angle || 0;
        const c = Math.cos(a);
        const si = Math.sin(a);
        const hw = RULER_W / 2;
        const hh = RULER_H / 2;
        const corners = [
          [-hw, -hh],
          [hw, -hh],
          [hw, hh],
          [-hw, hh],
        ];
        let minX = Infinity;
        let maxX = -Infinity;
        let minY = Infinity;
        let maxY = -Infinity;
        for (let i = 0; i < corners.length; i++) {
          const dx = corners[i][0];
          const dy = corners[i][1];
          const wx = s.x + dx * c - dy * si;
          const wy = s.y + dx * si + dy * c;
          minX = Math.min(minX, wx);
          maxX = Math.max(maxX, wx);
          minY = Math.min(minY, wy);
          maxY = Math.max(maxY, wy);
        }
        return { minX: minX, minY: minY, maxX: maxX, maxY: maxY };
      }

      /** 直尺 AABB 与水平参考线 y=gy 的竖直间距（线在带内为 0） */
      function verticalDistRulerAabbToLine(b, gy) {
        if (gy < b.minY) return b.minY - gy;
        if (gy > b.maxY) return gy - b.maxY;
        return 0;
      }

      /** 直尺贴近底部参考线：与参考线 x 段重叠、尺面近似水平、竖直距离在容差内 */
      function rulerCloseToBottomGuideLine(s) {
        const b = rulerAabb(s);
        const gl = 10;
        const gr = cssW - 10;
        if (b.maxX < gl || b.minX > gr) return false;
        const ang = s.angle || 0;
        if (Math.abs(Math.sin(ang)) > 0.35) return false;
        const gy = bottomGuideLineY();
        return verticalDistRulerAabbToLine(b, gy) <= RULER_GUIDE_SNAP_DIST;
      }

      /** 直尺贴近水平线段（叶形下化直红线）：x 与线段重叠、尺近似水平、竖直距离在容差内 */
      function rulerCloseToHorizontalSegment(s, p0, p1, padX) {
        const px = padX != null ? padX : 8;
        if (Math.abs(p0.y - p1.y) > 2.5) return false;
        const yLine = (p0.y + p1.y) * 0.5;
        const xL = Math.min(p0.x, p1.x);
        const xR = Math.max(p0.x, p1.x);
        const b = rulerAabb(s);
        if (b.maxX < xL - px || b.minX > xR + px) return false;
        const ang = s.angle || 0;
        if (Math.abs(Math.sin(ang)) > 0.35) return false;
        return verticalDistRulerAabbToLine(b, yLine) <= RULER_EDGE_SNAP_DIST;
      }

      function rulerWorldToLocalRotated(s, px, py) {
        const dx = px - s.x;
        const dy = py - s.y;
        const a = -(s.angle || 0);
        const c = Math.cos(a);
        const si = Math.sin(a);
        return {
          lx: dx * c - dy * si + RULER_W / 2,
          ly: dx * si + dy * c + RULER_H / 2,
        };
      }

      function rulerLocalToWorld(s, lx, ly) {
        const th = s.angle || 0;
        const u = lx - RULER_W / 2;
        const v = ly - RULER_H / 2;
        const dx = u * Math.cos(th) - v * Math.sin(th);
        const dy = u * Math.sin(th) + v * Math.cos(th);
        return { x: s.x + dx, y: s.y + dy };
      }

      function rulerHitAny(s, px, py) {
        const b = rulerAabb(s);
        if (px < b.minX || px > b.maxX || py < b.minY || py > b.maxY) {
          return false;
        }
        const loc = rulerWorldToLocalRotated(s, px, py);
        return (
          loc.lx >= 0 &&
          loc.lx <= RULER_W &&
          loc.ly >= 0 &&
          loc.ly <= RULER_H
        );
      }

      function rulerHit(s, px, py) {
        return rulerHitAny(s, px, py);
      }

      function cycleRulerAngle(s) {
        const cur = s.angle || 0;
        let idx = 0;
        for (let j = 0; j < RULER_ANGLES.length; j++) {
          if (Math.abs(cur - RULER_ANGLES[j]) < 1e-5) {
            idx = j;
            break;
          }
        }
        idx = (idx + 1) % RULER_ANGLES.length;
        s.angle = RULER_ANGLES[idx];
      }

      /** 与直尺相同：水平、竖直、与 3:4:5 斜边同向 */
      function cycleCompassAngle(s) {
        cycleRulerAngle(s);
      }

      function distPointSeg(px, py, ax, ay, bx, by) {
        const abx = bx - ax;
        const aby = by - ay;
        const apx = px - ax;
        const apy = py - ay;
        const ab2 = abx * abx + aby * aby;
        let t = ab2 < 1e-10 ? 0 : (apx * abx + apy * aby) / ab2;
        t = Math.max(0, Math.min(1, t));
        const qx = ax + t * abx;
        const qy = ay + t * aby;
        return Math.hypot(px - qx, py - qy);
      }

      /** 线段采样点是否落在直尺矩形内（用于贴边后判断是否盖住边线） */
      function segmentCoveredByRuler(ruler, ax, ay, bx, by) {
        const steps = 12;
        for (let i = 0; i <= steps; i++) {
          const t = i / steps;
          const px = ax + (bx - ax) * t;
          const py = ay + (by - ay) * t;
          if (rulerHit(ruler, px, py)) {
            return true;
          }
        }
        return false;
      }

      function segSegMinApprox(ax, ay, bx, by, cx, cy, dx, dy) {
        return Math.min(
          distPointSeg(ax, ay, cx, cy, dx, dy),
          distPointSeg(bx, by, cx, cy, dx, dy),
          distPointSeg(cx, cy, ax, ay, bx, by),
          distPointSeg(dx, dy, ax, ay, bx, by)
        );
      }

      function nearlyParallel(ax, ay, bx, by, cx, cy, dx, dy) {
        let ux = bx - ax;
        let uy = by - ay;
        let vx = dx - cx;
        let vy = dy - cy;
        const lu = Math.hypot(ux, uy);
        const lv = Math.hypot(vx, vy);
        if (lu < 1e-6 || lv < 1e-6) return false;
        ux /= lu;
        uy /= lu;
        vx /= lv;
        vy /= lv;
        return Math.abs(ux * vx + uy * vy) >= RULER_EDGE_PARALLEL_COS;
      }

      function triangleEdgesWorld(t) {
        const x = t.x;
        const y = t.y;
        return [
          { ax: x, ay: y, bx: x + TRI_LEG_TOP, by: y, cmPx: TRI_LEG_TOP },
          { ax: x, ay: y, bx: x, by: y + TRI_LEG_LEFT, cmPx: TRI_LEG_LEFT },
          {
            ax: x + TRI_LEG_TOP,
            ay: y,
            bx: x,
            by: y + TRI_LEG_LEFT,
            cmPx: Math.hypot(TRI_LEG_TOP, TRI_LEG_LEFT),
          },
        ];
      }

      /**
       * 尺应摆在边的哪一侧：边中点附近 probe + containsFn 判定内外；并列时用形心参考点。
       */
      function rulerPolyOutwardNormal(
        ax,
        ay,
        bx,
        by,
        angle,
        containsWorldFn,
        gcX,
        gcY
      ) {
        const mx = (ax + bx) * 0.5;
        const my = (ay + by) * 0.5;
        const sn = Math.sin(angle);
        let nx = -sn;
        let ny = Math.cos(angle);
        const probe = 14;
        const inPlus = containsWorldFn(mx + nx * probe, my + ny * probe);
        const inMinus = containsWorldFn(mx - nx * probe, my - ny * probe);
        if (inPlus !== inMinus) {
          return inPlus ? { nx: -nx, ny: -ny } : { nx: nx, ny: ny };
        }
        const tcx = gcX - mx;
        const tcy = gcY - my;
        if (nx * tcx + ny * tcy > 0) {
          return { nx: -nx, ny: -ny };
        }
        return { nx: nx, ny: ny };
      }

      function triangleContainsWorld(wx, wy, t) {
        const lx = wx - t.x;
        const ly = wy - t.y;
        sctx.beginPath();
        trianglePath(sctx, TRI_LEG_TOP, TRI_LEG_LEFT);
        return sctx.isPointInPath(lx, ly);
      }

      function leafContainsWorld(wx, wy, leaf) {
        const lx = wx - leaf.x;
        const ly = wy - leaf.y;
        sctx.beginPath();
        leafPath(sctx, LEAF_W, LEAF_H);
        return sctx.isPointInPath(lx, ly);
      }

      /**
       * 松开直尺拖动后：指针靠近三角形或叶形边时自动旋转并对齐 0 刻度端；三角形边记入长度标注。
       */
      function trySnapRulerToNearestShapeEdge(ruler, px, py) {
        const mxLoc = (RULER_W - RULER_SCALE_W) / 2;
        const ly0 = RULER_SCALE_LINE_Y;
        let best = null;
        let bestD = 1e9;

        for (let idx = 0; idx < shapes.length; idx++) {
          const sh = shapes[idx];
          if (sh.type === "triangle") {
            const edges = triangleEdgesWorld(sh);
            for (let ei = 0; ei < edges.length; ei++) {
              const e = edges[ei];
              const dist = distPointSeg(px, py, e.ax, e.ay, e.bx, e.by);
              if (dist < bestD) {
                bestD = dist;
                best = { shape: sh, kind: "tri", ei: ei, e: e };
              }
            }
          } else if (sh.type === "leaf") {
            const verts = leafOutlineVertsWorld(sh);
            if (!verts || verts.length < 3) continue;
            for (let ei = 0; ei < verts.length; ei++) {
              const a = verts[ei];
              const b = verts[(ei + 1) % verts.length];
              const dist = distPointSeg(px, py, a.x, a.y, b.x, b.y);
              if (dist < bestD) {
                bestD = dist;
                best = {
                  shape: sh,
                  kind: "leaf",
                  ei: ei,
                  e: { ax: a.x, ay: a.y, bx: b.x, by: b.y },
                };
              }
            }
          }
        }

        if (best == null || bestD > RULER_TRI_SNAP_DIST) {
          return false;
        }

        const e = best.e;
        const Ax = e.ax;
        const Ay = e.ay;
        const Bx = e.bx;
        const By = e.by;
        const dA = Math.hypot(px - Ax, py - Ay);
        const dB = Math.hypot(px - Bx, py - By);
        const zeroAtA = dA <= dB;
        const angle = zeroAtA
          ? Math.atan2(By - Ay, Bx - Ax)
          : Math.atan2(Ay - By, Ax - Bx);
        const ZX = zeroAtA ? Ax : Bx;
        const ZY = zeroAtA ? Ay : By;
        const u0 = mxLoc - RULER_W / 2;
        const v0 = ly0 - RULER_H / 2;
        const c = Math.cos(angle);
        const sn = Math.sin(angle);
        ruler.angle = angle;
        ruler.x = ZX - (u0 * c - v0 * sn);
        ruler.y = ZY - (u0 * sn + v0 * c);

        const targetShape = best.shape;
        let outward;
        if (best.kind === "tri") {
          outward = rulerPolyOutwardNormal(
            Ax,
            Ay,
            Bx,
            By,
            angle,
            function (wx, wy) {
              return triangleContainsWorld(wx, wy, targetShape);
            },
            targetShape.x + TRI_LEG_TOP / 3,
            targetShape.y + TRI_LEG_LEFT / 3
          );
        } else {
          outward = rulerPolyOutwardNormal(
            Ax,
            Ay,
            Bx,
            By,
            angle,
            function (wx, wy) {
              return leafContainsWorld(wx, wy, targetShape);
            },
            targetShape.x + LEAF_W / 2,
            targetShape.y + LEAF_H / 2
          );
        }

        ruler.x += outward.nx * RULER_TRI_EDGE_GAP;
        ruler.y += outward.ny * RULER_TRI_EDGE_GAP;

        if (segmentCoveredByRuler(ruler, Ax, Ay, Bx, By)) {
          ruler.x -= 2 * outward.nx * RULER_TRI_EDGE_GAP;
          ruler.y -= 2 * outward.ny * RULER_TRI_EDGE_GAP;
        }

        if (best.kind === "tri") {
          persistedEdgeHintKeys.add(
            String(targetShape.id) + "-" + String(best.ei)
          );
        }
        return true;
      }

      function layoutHintForTriangleEdge(t, ei) {
        const edges = triangleEdgesWorld(t);
        const e = edges[ei];
        const mx = (e.ax + e.bx) / 2;
        const my = (e.ay + e.by) / 2;
        const gx = t.x + TRI_LEG_TOP / 3;
        const gy = t.y + TRI_LEG_LEFT / 3;
        const ex = e.bx - e.ax;
        const ey = e.by - e.ay;
        const el = Math.hypot(ex, ey) || 1;
        let nx = -ey / el;
        let ny = ex / el;
        if ((gx - mx) * nx + (gy - my) * ny > 0) {
          nx = -nx;
          ny = -ny;
        }
        const cm = Math.round(e.cmPx / PX_PER_CM);
        return {
          ox: mx + nx * 18,
          oy: my + ny * 18,
          ang: Math.atan2(ey, ex),
          text: String(cm) + "厘米",
        };
      }

      function tryAddRulerTriangleAlignmentHints() {
        const rulers = shapes.filter(function (s) {
          return s.type === "ruler";
        });
        const tris = shapes.filter(function (s) {
          return s.type === "triangle";
        });
        for (let ri = 0; ri < rulers.length; ri++) {
          const r = rulers[ri];
          const p0 = rulerLocalToWorld(r, 0, 0);
          const p1 = rulerLocalToWorld(r, RULER_W, 0);
          for (let ti = 0; ti < tris.length; ti++) {
            const t = tris[ti];
            const edges = triangleEdgesWorld(t);
            for (let ei = 0; ei < edges.length; ei++) {
              const e = edges[ei];
              if (
                !nearlyParallel(
                  p0.x,
                  p0.y,
                  p1.x,
                  p1.y,
                  e.ax,
                  e.ay,
                  e.bx,
                  e.by
                )
              ) {
                continue;
              }
              const d = segSegMinApprox(
                p0.x,
                p0.y,
                p1.x,
                p1.y,
                e.ax,
                e.ay,
                e.bx,
                e.by
              );
              if (d > RULER_EDGE_SNAP_DIST) continue;
              persistedEdgeHintKeys.add(String(t.id) + "-" + ei);
            }
          }
        }
      }

      function prunePersistedEdgeHints() {
        const triIds = new Set();
        for (let i = 0; i < shapes.length; i++) {
          if (shapes[i].type === "triangle") {
            triIds.add(shapes[i].id);
          }
        }
        const keys = Array.from(persistedEdgeHintKeys);
        for (let i = 0; i < keys.length; i++) {
          const tid = parseInt(keys[i].split("-")[0], 10);
          if (!triIds.has(tid)) {
            persistedEdgeHintKeys.delete(keys[i]);
          }
        }
      }

      function buildPersistedLengthHintsForDraw() {
        const list = [];
        persistedEdgeHintKeys.forEach(function (key) {
          const parts = key.split("-");
          const tid = parseInt(parts[0], 10);
          const ei = parseInt(parts[1], 10);
          const t = shapes.find(function (s) {
            return s.id === tid && s.type === "triangle";
          });
          if (!t) return;
          list.push(layoutHintForTriangleEdge(t, ei));
        });
        return list;
      }

      function drawLengthHints(ctx, hints) {
        for (let i = 0; i < hints.length; i++) {
          const h = hints[i];
          ctx.save();
          ctx.translate(h.ox, h.oy);
          let ang = h.ang;
          if (ang > Math.PI / 2 || ang < -Math.PI / 2) {
            ang += Math.PI;
          }
          ctx.rotate(ang);
          ctx.font = "600 18px system-ui, sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.strokeStyle = "rgba(255,255,255,0.95)";
          ctx.fillStyle = "#1a4d72";
          ctx.lineWidth = 4;
          ctx.lineJoin = "round";
          ctx.miterLimit = 2;
          ctx.strokeText(h.text, 0, 0);
          ctx.fillText(h.text, 0, 0);
          ctx.restore();
        }
      }

      function triangleHasAllThreeEdgeHints(tid) {
        const p = String(tid) + "-";
        return (
          persistedEdgeHintKeys.has(p + "0") &&
          persistedEdgeHintKeys.has(p + "1") &&
          persistedEdgeHintKeys.has(p + "2")
        );
      }

      /**
       * 参考线上按圆规脚印排序后的前若干 x 定义线段中点；按标记条数逐步画箭头（不一次画全）：
       * ≥2 条：斜边 → 最左段（直线箭头）；≥3：再加顶边 → 中段（内侧弧）；≥4：再加左竖边 → 最右段（外侧弧）。
       * 标记顺序建议：先斜边、再顶边、最后左侧直角边。
       */
      function drawCompassGuideMappingArrows(ctx, tri, gy, marks) {
        if (!marks || marks.length < 2) return;
        const xsAll = guideMarksSortedFootXs(marks);
        if (xsAll.length < 2) return;
        const reveal =
          xsAll.length >= 4 ? 3 : xsAll.length >= 3 ? 2 : 1;
        const xs = xsAll;
        const tipY = gy - 2;
        const x0 = tri.x;
        const y0 = tri.y;
        /** 顶边中点 ei=0，左竖边中点 ei=1，斜边中点 ei=2 */
        const midTop = { x: x0 + TRI_LEG_TOP * 0.5, y: y0 };
        const midLeft = { x: x0, y: y0 + TRI_LEG_LEFT * 0.5 };
        const midHyp = {
          x: x0 + TRI_LEG_TOP * 0.5,
          y: y0 + TRI_LEG_LEFT * 0.5,
        };
        const endHyp = { x: (xs[0] + xs[1]) * 0.5, y: tipY };
        const endTop =
          reveal >= 2
            ? { x: (xs[1] + xs[2]) * 0.5, y: tipY }
            : null;
        const endLeft =
          reveal >= 3
            ? { x: (xs[2] + xs[3]) * 0.5, y: tipY }
            : null;
        /** 内弧（顶边）与左竖边外弧分开计算，避免两弧因比例绑定而交叉 */
        const H_inner = Math.max(78, TRI_LEG_TOP * 0.34, TRI_LEG_LEFT * 0.38);
        const gapPeak = Math.max(92, TRI_LEG_LEFT * 0.48, TRI_LEG_TOP * 0.22);
        const H_outer = Math.max(
          H_inner + gapPeak,
          TRI_LEG_TOP * 0.56,
          TRI_LEG_LEFT * 0.64,
          168
        );
        /** 左竖边专用：略抬峰值；控制点用更高 y，且末段再下落 */
        const H_outerDraw = H_outer + 34;
        const stroke = GUIDE_MAPPING_CURVE_COLOR;
        const lineW = 2.25;

        function drawCubicArrow(sx, sy, c1x, c1y, c2x, c2y, ex, ey) {
          ctx.beginPath();
          ctx.moveTo(sx, sy);
          ctx.bezierCurveTo(c1x, c1y, c2x, c2y, ex, ey);
          ctx.stroke();
          const tdx = 3 * (ex - c2x);
          const tdy = 3 * (ey - c2y);
          const ang = Math.atan2(tdy, tdx);
          const ah = 9;
          const aw = 5;
          ctx.beginPath();
          ctx.moveTo(ex, ey);
          ctx.lineTo(
            ex - ah * Math.cos(ang) + aw * Math.sin(ang),
            ey - ah * Math.sin(ang) - aw * Math.cos(ang)
          );
          ctx.lineTo(
            ex - ah * Math.cos(ang) - aw * Math.sin(ang),
            ey - ah * Math.sin(ang) + aw * Math.cos(ang)
          );
          ctx.closePath();
          ctx.fill();
        }

        function drawLineArrow(sx, sy, ex, ey) {
          ctx.beginPath();
          ctx.moveTo(sx, sy);
          ctx.lineTo(ex, ey);
          ctx.stroke();
          const ang = Math.atan2(ey - sy, ex - sx);
          const ah = 8;
          const aw = 4.5;
          ctx.beginPath();
          ctx.moveTo(ex, ey);
          ctx.lineTo(
            ex - ah * Math.cos(ang) + aw * Math.sin(ang),
            ey - ah * Math.sin(ang) - aw * Math.cos(ang)
          );
          ctx.lineTo(
            ex - ah * Math.cos(ang) - aw * Math.sin(ang),
            ey - ah * Math.sin(ang) + aw * Math.cos(ang)
          );
          ctx.closePath();
          ctx.fill();
        }

        ctx.save();
        ctx.strokeStyle = stroke;
        ctx.fillStyle = stroke;
        ctx.lineWidth = lineW;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        /** 1）斜边 → 最左段 */
        if (reveal >= 1) {
          drawLineArrow(midHyp.x, midHyp.y, endHyp.x, endHyp.y);
        }
        /** 2）顶边 → 中段（内侧弧） */
        if (reveal >= 2 && endTop != null) {
          drawCubicArrow(
            midTop.x,
            midTop.y,
            midTop.x,
            y0 - H_inner,
            endTop.x,
            y0 - H_inner * 0.96,
            endTop.x,
            endTop.y
          );
        }
        /** 3）左竖边 → 最右段（外侧大包络弧） */
        if (reveal >= 3 && endLeft != null) {
          drawCubicArrow(
            midLeft.x,
            midLeft.y,
            x0 - Math.max(112, TRI_LEG_LEFT * 0.58),
            y0 - H_outerDraw * 0.68,
            endLeft.x * 0.87 + midLeft.x * 0.13 - 22,
            y0 - H_outerDraw * 0.97,
            endLeft.x,
            endLeft.y
          );
        }

        ctx.restore();
      }

      function drawTrianglePerimeterFormulas(ctx) {
        for (let i = 0; i < shapes.length; i++) {
          const t = shapes[i];
          if (t.type !== "triangle") continue;
          if (!triangleHasAllThreeEdgeHints(t.id)) continue;
          const cx = t.x + TRI_LEG_TOP / 2;
          const by = t.y + TRI_LEG_LEFT + 20;
          ctx.save();
          ctx.font = "600 24px system-ui, sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "top";
          ctx.strokeStyle = "rgba(255,255,255,0.92)";
          ctx.fillStyle = "#3d2a18";
          ctx.lineWidth = 4;
          ctx.lineJoin = "round";
          const text = "3+4+5=12（厘米）";
          ctx.strokeText(text, cx, by);
          ctx.fillText(text, cx, by);
          ctx.restore();
        }
      }

      /**
       * 在局部坐标 (0,0)–(w,h) 内绘制直尺；w 与 h 为整块外观尺寸（含左右留白）。
       */
      function drawRulerFace(ctx, w, h, pxPerCm, maxCm) {
        const rr = Math.min(RULER_RADIUS, h / 3, w / 25);
        const scaleW = maxCm * pxPerCm;
        const mx = (w - scaleW) / 2;
        const iy = 2;

        ctx.beginPath();
        if (typeof ctx.roundRect === "function") {
          ctx.roundRect(0.5, 0.5, w - 1, h - 1, rr);
        } else {
          ctx.rect(0.5, 0.5, w - 1, h - 1);
        }
        ctx.fillStyle = RULER_FILL;
        ctx.fill();
        ctx.strokeStyle = RULER_OUTER_BORDER;
        ctx.lineWidth = 1;
        ctx.stroke();

        const tickTop = iy + 4;
        const majorH = Math.min(18, h * 0.34);
        const midH = majorH * 0.62;
        const minorH = majorH * 0.35;
        const mmStep = pxPerCm / 10;
        const totalMm = Math.round(maxCm * 10);

        ctx.strokeStyle = RULER_BROWN;
        ctx.lineWidth = 1;
        ctx.beginPath();
        for (let i = 0; i <= totalMm; i++) {
          const x = mx + i * mmStep;
          if (x > mx + scaleW + 0.001) break;
          let th = minorH;
          if (i % 10 === 0) th = majorH;
          else if (i % 5 === 0) th = midH;
          ctx.moveTo(x, tickTop);
          ctx.lineTo(x, tickTop + th);
        }
        ctx.stroke();

        ctx.fillStyle = RULER_BROWN;
        ctx.font =
          "600 " + Math.max(9, Math.min(13, h * 0.22)) + "px system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        const numY = h - Math.max(11, h * 0.24);
        for (let cm = 0; cm <= maxCm; cm++) {
          const x = mx + cm * pxPerCm;
          if (x > mx + scaleW + 0.5) break;
          ctx.fillText(String(cm), x, numY);
        }
      }

      function drawRulerStroke(ctx, s) {
        ctx.save();
        ctx.translate(s.x, s.y);
        ctx.rotate(s.angle || 0);
        ctx.translate(-RULER_W / 2, -RULER_H / 2);
        drawRulerFace(ctx, RULER_W, RULER_H, PX_PER_CM, RULER_MAX_CM);
        ctx.restore();
      }

      function compassLocalVectorFromWorld(s, wx, wy) {
        const th = s.angle || 0;
        const dx = wx - s.x;
        const dy = wy - s.y;
        return {
          lx: dx * Math.cos(-th) - dy * Math.sin(-th),
          ly: dx * Math.sin(-th) + dy * Math.cos(-th),
        };
      }

      function compassFootLocal(s, side) {
        const sp = Math.max(
          COMPASS_MIN_SPREAD,
          Math.min(COMPASS_MAX_SPREAD, s.spread != null ? s.spread : 0.38)
        );
        const L = COMPASS_LEG_LEN;
        if (side === "L") {
          return { lx: Math.sin(-sp) * L, ly: Math.cos(-sp) * L };
        }
        return { lx: Math.sin(sp) * L, ly: Math.cos(sp) * L };
      }

      function compassLocalToWorld(s, lx, ly) {
        const th = s.angle || 0;
        return {
          x: s.x + lx * Math.cos(th) - ly * Math.sin(th),
          y: s.y + lx * Math.sin(th) + ly * Math.cos(th),
        };
      }

      function compassHitRegion(s, px, py) {
        const fL = compassFootLocal(s, "L");
        const fR = compassFootLocal(s, "R");
        const wL = compassLocalToWorld(s, fL.lx, fL.ly);
        const wR = compassLocalToWorld(s, fR.lx, fR.ly);
        if (Math.hypot(px - wL.x, py - wL.y) <= COMPASS_LEG_HIT_R) {
          return "L";
        }
        if (Math.hypot(px - wR.x, py - wR.y) <= COMPASS_LEG_HIT_R) {
          return "R";
        }
        if (Math.hypot(px - s.x, py - s.y) <= COMPASS_PIVOT_HIT_R) {
          return "body";
        }
        const dL = distPointSeg(px, py, s.x, s.y, wL.x, wL.y);
        const dR = distPointSeg(px, py, s.x, s.y, wR.x, wR.y);
        if (dL <= 10 || dR <= 10) {
          return "body";
        }
        return null;
      }

      function compassUpdateSpreadFromPointer(s, px, py, side) {
        const v = compassLocalVectorFromWorld(s, px, py);
        const a = Math.atan2(v.lx, v.ly);
        if (side === "L") {
          s.spread = Math.max(
            COMPASS_MIN_SPREAD,
            Math.min(COMPASS_MAX_SPREAD, -a)
          );
        } else {
          s.spread = Math.max(
            COMPASS_MIN_SPREAD,
            Math.min(COMPASS_MAX_SPREAD, a)
          );
        }
      }

      function triangleVertsWorld(tri) {
        return [
          { x: tri.x, y: tri.y },
          { x: tri.x + TRI_LEG_TOP, y: tri.y },
          { x: tri.x, y: tri.y + TRI_LEG_LEFT },
        ];
      }

      /**
       * 两脚尖均贴近三角形「上面水平直角边」V0–V1 时，绘制上对调木腿/钢腿外观（移开即恢复）。
       */
      function compassTipsNearTriangleTopHorizontalEdge(cmp) {
        const tips = compassTipsWorld(cmp);
        const tol = COMPASS_EDGE_SNAP_TIP;
        for (let i = 0; i < shapes.length; i++) {
          const tri = shapes[i];
          if (tri.type !== "triangle") continue;
          const V = triangleVertsWorld(tri);
          const ax = V[0].x;
          const ay = V[0].y;
          const bx = V[1].x;
          const by = V[1].y;
          const dL = distPointSeg(tips.L.x, tips.L.y, ax, ay, bx, by);
          const dR = distPointSeg(tips.R.x, tips.R.y, ax, ay, bx, by);
          if (dL <= tol && dR <= tol) {
            return true;
          }
        }
        return false;
      }

      function cubicBezierPoint(ax, ay, bx, by, cx, cy, dx, dy, t) {
        const omt = 1 - t;
        const omt2 = omt * omt;
        const t2 = t * t;
        return {
          x:
            omt2 * omt * ax +
            3 * omt2 * t * bx +
            3 * omt * t2 * cx +
            t2 * t * dx,
          y:
            omt2 * omt * ay +
            3 * omt2 * t * by +
            3 * omt * t2 * cy +
            t2 * t * dy,
        };
      }

      function leafOutlineVertsLocal(w, h) {
        const s = Math.min(w / 100, h / 100);
        const ox = (w - 100 * s) / 2;
        const oy = (h - 100 * s) / 2;
        function X(x) {
          return ox + x * s;
        }
        function Y(y) {
          return oy + y * s;
        }
        const segs = [
          [10, 95, 4, 86, 12, 50, 20, 30],
          [20, 30, 30, 16, 40, 5, 50, 7],
          [50, 7, 62, 6, 76, 5, 90, 6],
          [90, 6, 90, 16, 94, 28, 96, 40],
          [96, 40, 97, 47, 92, 52, 88, 55],
          [88, 55, 86, 62, 86, 69, 85, 75],
          [85, 75, 68, 91, 38, 99, 10, 95],
        ];
        const out = [];
        const stepsPerSeg = 28;
        for (let si = 0; si < segs.length; si++) {
          const g = segs[si];
          const ax = X(g[0]);
          const ay = Y(g[1]);
          const bx = X(g[2]);
          const by = Y(g[3]);
          const cx = X(g[4]);
          const cy = Y(g[5]);
          const dx = X(g[6]);
          const dy = Y(g[7]);
          for (let k = 0; k <= stepsPerSeg; k++) {
            const t = stepsPerSeg <= 0 ? 0 : k / stepsPerSeg;
            const pt = cubicBezierPoint(ax, ay, bx, by, cx, cy, dx, dy, t);
            if (out.length > 0) {
              const last = out[out.length - 1];
              if (
                Math.hypot(pt.x - last.x, pt.y - last.y) < 0.35
              ) {
                continue;
              }
            }
            out.push(pt);
          }
        }
        return out;
      }

      function leafOutlineVertsWorld(leaf) {
        const loc = leafOutlineVertsLocal(LEAF_W, LEAF_H);
        const out = [];
        for (let i = 0; i < loc.length; i++) {
          out.push({ x: leaf.x + loc[i].x, y: leaf.y + loc[i].y });
        }
        return out;
      }

      function rulerOutlineVertsWorld(r) {
        const pts = [];
        const corners = [
          [0, 0],
          [RULER_W, 0],
          [RULER_W, RULER_H],
          [0, RULER_H],
        ];
        for (let i = 0; i < corners.length; i++) {
          const w = rulerLocalToWorld(r, corners[i][0], corners[i][1]);
          pts.push({ x: w.x, y: w.y });
        }
        return pts;
      }

      function shapeOutlineVertsWorld(s) {
        if (s.type === "triangle") {
          return triangleVertsWorld(s);
        }
        if (s.type === "leaf") {
          return leafOutlineVertsWorld(s);
        }
        if (s.type === "label") {
          const lw = labelDisplayWidthForLetter(s.letter);
          return [
            { x: s.x, y: s.y },
            { x: s.x + lw, y: s.y },
            { x: s.x + lw, y: s.y + LABEL_H },
            { x: s.x, y: s.y + LABEL_H },
          ];
        }
        if (s.type === "ruler") {
          return rulerOutlineVertsWorld(s);
        }
        return null;
      }

      function polylineClosedLength(verts) {
        let L = 0;
        const n = verts.length;
        for (let i = 0; i < n; i++) {
          const a = verts[i];
          const b = verts[(i + 1) % n];
          L += Math.hypot(b.x - a.x, b.y - a.y);
        }
        return L;
      }

      function closestOnClosedPolyline(px, py, verts) {
        const n = verts.length;
        let bestX = px;
        let bestY = py;
        let bestD = 1e9;
        let bestS = 0;
        let acc = 0;
        for (let i = 0; i < n; i++) {
          const ax = verts[i].x;
          const ay = verts[i].y;
          const bx = verts[(i + 1) % n].x;
          const by = verts[(i + 1) % n].y;
          const abx = bx - ax;
          const aby = by - ay;
          const apx = px - ax;
          const apy = py - ay;
          const ab2 = abx * abx + aby * aby;
          let t = ab2 < 1e-10 ? 0 : (apx * abx + apy * aby) / ab2;
          t = Math.max(0, Math.min(1, t));
          const qx = ax + t * abx;
          const qy = ay + t * aby;
          const d = Math.hypot(px - qx, py - qy);
          const segLen = Math.sqrt(ab2);
          const sHere = acc + t * segLen;
          if (d < bestD) {
            bestD = d;
            bestX = qx;
            bestY = qy;
            bestS = sHere;
          }
          acc += segLen;
        }
        return { x: bestX, y: bestY, s: bestS, total: acc };
      }

      /**
       * 画红线时：指针在叶形轮廓附近则吸附到轮廓上（边画边贴；仅叶形，三角形仍松手后整圈贴合）。
       * @returns {{ x: number, y: number }}
       */
      function snapRedLinePointToLeafOutlineIfClose(px, py) {
        let bestD = 1e9;
        let bestX = px;
        let bestY = py;
        for (let i = 0; i < shapes.length; i++) {
          const sh = shapes[i];
          if (sh.type !== "leaf") continue;
          const verts = leafOutlineVertsWorld(sh);
          if (!verts || verts.length < 3) continue;
          const c = closestOnClosedPolyline(px, py, verts);
          const d = Math.hypot(px - c.x, py - c.y);
          if (d < bestD) {
            bestD = d;
            bestX = c.x;
            bestY = c.y;
          }
        }
        if (bestD <= REDLINE_LEAF_LIVE_SNAP_DIST) {
          return { x: bestX, y: bestY };
        }
        return { x: px, y: py };
      }

      function wrapTau(tau, total) {
        let t = tau % total;
        if (t < 0) t += total;
        return t;
      }

      function pointAtTau(verts, tau, totalLen) {
        const n = verts.length;
        let acc = 0;
        const t = wrapTau(tau, totalLen);
        for (let i = 0; i < n; i++) {
          const ax = verts[i].x;
          const ay = verts[i].y;
          const bx = verts[(i + 1) % n].x;
          const by = verts[(i + 1) % n].y;
          const sl = Math.hypot(bx - ax, by - ay);
          if (acc + sl >= t - 1e-6) {
            const u = sl < 1e-10 ? 0 : (t - acc) / sl;
            return {
              x: ax + u * (bx - ax),
              y: ay + u * (by - ay),
            };
          }
          acc += sl;
        }
        return { x: verts[0].x, y: verts[0].y };
      }

      /**
       * 沿闭合外轮廓整周等弧长采样，首尾闭合。
       */
      function fullPerimeterPolyline(verts, stepPx) {
        const total = polylineClosedLength(verts);
        if (total < 1e-6) return [];
        const out = [];
        let d = 0;
        while (d < total - 1e-9) {
          out.push(pointAtTau(verts, d, total));
          d += stepPx;
        }
        if (out.length === 0) {
          out.push(pointAtTau(verts, 0, total));
        }
        out.push({ x: out[0].x, y: out[0].y });
        return out;
      }

      function meanStrokeDistToOutline(pts, verts) {
        let sum = 0;
        for (let i = 0; i < pts.length; i++) {
          const c = closestOnClosedPolyline(pts[i].x, pts[i].y, verts);
          sum += Math.hypot(pts[i].x - c.x, pts[i].y - c.y);
        }
        return sum / pts.length;
      }

      function snapRedlineToNearestShape(rl) {
        const pts = rl.points;
        if (pts.length < 2) return;
        let best = null;
        let bestId = null;
        let bestScore = 1e9;
        for (let i = 0; i < shapes.length; i++) {
          const sh = shapes[i];
          if (sh.type === "redline" || sh.type === "compass") continue;
          const verts = shapeOutlineVertsWorld(sh);
          if (!verts || verts.length < 3) continue;
          const sc = meanStrokeDistToOutline(pts, verts);
          if (sc < bestScore) {
            bestScore = sc;
            best = verts;
            bestId = sh.id;
          }
        }
        if (best) {
          rl.points = fullPerimeterPolyline(best, REDLINE_SAMPLE_STEP);
          rl.snappedToId = bestId;
        }
      }

      function distPointToPolyline(px, py, points) {
        if (!points || points.length < 2) return 1e9;
        let best = 1e9;
        for (let i = 0; i < points.length - 1; i++) {
          const a = points[i];
          const b = points[i + 1];
          best = Math.min(
            best,
            distPointSeg(px, py, a.x, a.y, b.x, b.y)
          );
        }
        const a0 = points[points.length - 1];
        const b0 = points[0];
        if (a0 !== b0 && (a0.x !== b0.x || a0.y !== b0.y)) {
          best = Math.min(
            best,
            distPointSeg(px, py, a0.x, a0.y, b0.x, b0.y)
          );
        }
        return best;
      }

      function shapeWorldAabb(s) {
        if (s.type === "triangle") {
          return {
            minX: s.x,
            maxX: s.x + TRI_LEG_TOP,
            minY: s.y,
            maxY: s.y + TRI_LEG_LEFT,
          };
        }
        if (s.type === "leaf") {
          return {
            minX: s.x,
            maxX: s.x + LEAF_W,
            minY: s.y,
            maxY: s.y + LEAF_H,
          };
        }
        if (s.type === "label") {
          const lw = labelDisplayWidthForLetter(s.letter);
          return {
            minX: s.x,
            maxX: s.x + lw,
            minY: s.y,
            maxY: s.y + LABEL_H,
          };
        }
        if (s.type === "ruler") {
          return rulerAabb(s);
        }
        if (s.type === "compass") {
          const tips = compassTipsWorld(s);
          let minX = Math.min(s.x, tips.L.x, tips.R.x);
          let maxX = Math.max(s.x, tips.L.x, tips.R.x);
          let minY = Math.min(s.y, tips.L.y, tips.R.y);
          let maxY = Math.max(s.y, tips.L.y, tips.R.y);
          const pad = COMPASS_HINGE_R + 6;
          return {
            minX: minX - pad,
            maxX: maxX + pad,
            minY: minY - pad,
            maxY: maxY + pad,
          };
        }
        return null;
      }

      function polylineTotalLength(points) {
        if (!points || points.length < 2) return 0;
        let L = 0;
        for (let i = 0; i < points.length - 1; i++) {
          L += Math.hypot(
            points[i + 1].x - points[i].x,
            points[i + 1].y - points[i].y
          );
        }
        return L;
      }

      function straightenRedlineBelowShape(rl, target) {
        const totalLen = polylineTotalLength(rl.points);
        if (totalLen < 1e-3) return;
        const b = shapeWorldAabb(target);
        if (!b) return;
        const y = b.maxY + REDLINE_BELOW_GAP;
        const midX = (b.minX + b.maxX) * 0.5;
        const half = totalLen * 0.5;
        rl.points = [
          { x: midX - half, y: y },
          { x: midX + half, y: y },
        ];
        delete rl.snappedToId;
        if (target.type === "leaf") {
          rl.straightenedFromLeafId = target.id;
        } else {
          delete rl.straightenedFromLeafId;
        }
      }

      function drawRedLineShape(ctx, rl) {
        const pts = rl.points;
        if (!pts || pts.length < 1) return;
        ctx.save();
        ctx.strokeStyle = REDLINE_COLOR;
        ctx.fillStyle = REDLINE_COLOR;
        ctx.lineWidth = REDLINE_STROKE_WIDTH;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        if (pts.length === 1) {
          ctx.beginPath();
          ctx.arc(pts[0].x, pts[0].y, 2, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
          return;
        }
        ctx.beginPath();
        ctx.moveTo(pts[0].x, pts[0].y);
        for (let i = 1; i < pts.length; i++) {
          ctx.lineTo(pts[i].x, pts[i].y);
        }
        ctx.stroke();
        ctx.restore();
      }

      function compassTipsWorld(s) {
        const fL = compassFootLocal(s, "L");
        const fR = compassFootLocal(s, "R");
        return {
          L: compassLocalToWorld(s, fL.lx, fL.ly),
          R: compassLocalToWorld(s, fR.lx, fR.ly),
        };
      }

      /**
       * 左腿尖落在 Va、右腿尖落在 Vb（有向边），求铰链、张角、朝向。
       * @returns {{ cx: number, cy: number, ang: number, spread: number, err: number } | null}
       */
      function compassSnapConfigForDirectedEdge(Va, Vb, L) {
        const dx = Vb.x - Va.x;
        const dy = Vb.y - Va.y;
        const d = Math.hypot(dx, dy);
        if (d < 1e-6) return null;
        const smin = COMPASS_MIN_SPREAD;
        const smax = COMPASS_MAX_SPREAD;
        if (d < 2 * L * Math.sin(smin) - 0.25 || d > 2 * L * Math.sin(smax) + 0.25) {
          return null;
        }
        const spread = Math.asin(Math.min(1, d / (2 * L)));
        const ux = dx / d;
        const uy = dy / d;
        const ang = Math.atan2(uy, ux);
        const lxL = -Math.sin(spread) * L;
        const lyL = Math.cos(spread) * L;
        const lxR = Math.sin(spread) * L;
        const lyR = Math.cos(spread) * L;
        const cr = Math.cos(ang);
        const sr = Math.sin(ang);
        const wxL = lxL * cr - lyL * sr;
        const wyL = lxL * sr + lyL * cr;
        const wxR = lxR * cr - lyR * sr;
        const wyR = lxR * sr + lyR * cr;
        const cx = Va.x - wxL;
        const cy = Va.y - wyL;
        const err = Math.hypot(cx + wxR - Vb.x, cy + wyR - Vb.y);
        return { cx, cy, ang, spread, err };
      }

      /** 圆规贴边吸附：轮廓线段（世界坐标），非三角形 / 叶形返回 null */
      function shapeEdgesWorldForCompassSnap(sh) {
        if (sh.type === "triangle") {
          return triangleEdgesWorld(sh);
        }
        if (sh.type === "leaf") {
          const verts = leafOutlineVertsWorld(sh);
          if (!verts || verts.length < 3) return null;
          const edges = [];
          for (let i = 0; i < verts.length; i++) {
            const a = verts[i];
            const b = verts[(i + 1) % verts.length];
            edges.push({
              ax: a.x,
              ay: a.y,
              bx: b.x,
              by: b.y,
            });
          }
          return edges;
        }
        return null;
      }

      /**
       * 拖动圆规枢轴松手时：指针靠近三角形或叶形边则旋转并张开两脚尖落在边两端（与直尺贴边一致）。
       */
      function trySnapCompassToNearestShapeEdgeByPointer(cmp, px, py) {
        const L = COMPASS_LEG_LEN;
        const margin = COMPASS_LEG_LEN + COMPASS_HINGE_R;
        const mar = margin * 0.15;
        let best = null;
        let bestScore = 1e9;

        for (let si = 0; si < shapes.length; si++) {
          const sh = shapes[si];
          const edges = shapeEdgesWorldForCompassSnap(sh);
          if (!edges) {
            continue;
          }
          for (let ei = 0; ei < edges.length; ei++) {
            const e = edges[ei];
            const dist = distPointSeg(px, py, e.ax, e.ay, e.bx, e.by);
            if (dist > COMPASS_POLY_EDGE_POINTER_SNAP) {
              continue;
            }
            const Va = { x: e.ax, y: e.ay };
            const Vb = { x: e.bx, y: e.by };
            for (let swap = 0; swap < 2; swap++) {
              const A = swap ? Vb : Va;
              const B = swap ? Va : Vb;
              const cfg = compassSnapConfigForDirectedEdge(A, B, L);
              if (!cfg || cfg.err > 2.5) {
                continue;
              }
              const dh = Math.hypot(cmp.x - cfg.cx, cmp.y - cfg.cy);
              const score = dist + 0.02 * dh;
              if (score < bestScore) {
                bestScore = score;
                best = cfg;
              }
            }
          }
        }
        if (best) {
          cmp.x = Math.max(mar, Math.min(cssW - mar, best.cx));
          cmp.y = Math.max(COMPASS_Y_MIN, Math.min(cssH - mar, best.cy));
          cmp.angle = best.ang;
          cmp.spread = best.spread;
          cmp.edgeSnapStraightenPending = true;
          return true;
        }
        return false;
      }

      /** 两脚是否同时贴近同一轮廓线段（判断是否仍贴在边上） */
      function compassTipsBothNearSameShapeEdge(cmp, maxDist) {
        const tips = compassTipsWorld(cmp);
        for (let si = 0; si < shapes.length; si++) {
          const edges = shapeEdgesWorldForCompassSnap(shapes[si]);
          if (!edges) {
            continue;
          }
          for (let ei = 0; ei < edges.length; ei++) {
            const e = edges[ei];
            const dL = distPointSeg(
              tips.L.x,
              tips.L.y,
              e.ax,
              e.ay,
              e.bx,
              e.by
            );
            const dR = distPointSeg(
              tips.R.x,
              tips.R.y,
              e.ax,
              e.ay,
              e.bx,
              e.by
            );
            if (dL <= maxDist && dR <= maxDist) {
              return true;
            }
          }
        }
        return false;
      }

      /**
       * 贴边吸附后拖动圆规：两脚均不再贴近任一轮廓边时，保持张角并将朝向摆正（angle=0）。
       */
      function maybeStraightenCompassUprightIfLeftShapeEdge(cmp) {
        if (!cmp.edgeSnapStraightenPending) {
          return;
        }
        if (
          compassTipsBothNearSameShapeEdge(cmp, COMPASS_POLY_EDGE_POINTER_SNAP)
        ) {
          return;
        }
        cmp.angle = 0;
        cmp.edgeSnapStraightenPending = false;
      }

      function bottomGuideLineY() {
        return cssH * COMPASS_GUIDE_Y_RATIO;
      }

      /** 命中底部参考线线段（约 x∈[10,cssW-10], y=gy）旁的带状区域，用于点击加点 */
      function hitBottomGuideLineBand(px, py, padY, padX) {
        if (!bottomGuideLineShown) return false;
        const gy = bottomGuideLineY();
        const py0 = padY != null ? padY : 14;
        const px0 = padX != null ? padX : 8;
        const gl = 10;
        const gr = cssW - 10;
        if (Math.abs(py - gy) > py0) return false;
        if (px < gl - px0 || px > gr + px0) return false;
        return true;
      }

      /**
       * 扫弧进度缓动：前半加速、后半减速，中段变化快，视觉上「甩弧」幅度更大。
       */
      function easeSweepAnim(tRaw) {
        const t = Math.max(0, Math.min(1, tRaw));
        return t < 0.5
          ? 16 * t * t * t * t * t
          : 1 - Math.pow(-2 * t + 2, 5) / 2;
      }

      function angleLerpRad(a, b, t) {
        let d = b - a;
        while (d > Math.PI) {
          d -= 2 * Math.PI;
        }
        while (d < -Math.PI) {
          d += 2 * Math.PI;
        }
        return a + d * t;
      }

      /** 角度归一化到 [0, 2π)（与 canvas arc 一致） */
      function normAngle0(a) {
        let x = a % (Math.PI * 2);
        if (x < 0) {
          x += Math.PI * 2;
        }
        return x;
      }

      /** 右脚尖 y：枢轴 (px,py)、半径 r、极角 ang（canvas arc 约定） */
      function compassRightFootYAtAngle(px, py, r, ang) {
        return py + r * Math.sin(ang);
      }

      /**
       * 在两极角之间沿劣弧插值（最短路径，转角 ∈ (−π, π]）。
       */
      function minorArcDelta(s, e) {
        s = normAngle0(s);
        e = normAngle0(e);
        let d = e - s;
        if (d > Math.PI) {
          d -= Math.PI * 2;
        }
        if (d <= -Math.PI) {
          d += Math.PI * 2;
        }
        return d;
      }

      /**
       * 扫弧端点排序：优先「一脚在参考线上方、一脚在下方」；否则按脚上 y 从小到大（上→下）。
       */
      function guideSweepOrderEndpointsAboveToBelow(px, py, r, gy, af, at) {
        const yf = compassRightFootYAtAngle(px, py, r, af);
        const yt = compassRightFootYAtAngle(px, py, r, at);
        const fAbove = yf < gy - 1e-6;
        const fBelow = yf > gy + 1e-6;
        const tAbove = yt < gy - 1e-6;
        const tBelow = yt > gy + 1e-6;
        if (fAbove && tBelow) {
          return { start: af, end: at };
        }
        if (tAbove && fBelow) {
          return { start: at, end: af };
        }
        if (yf <= yt) {
          return { start: af, end: at };
        }
        return { start: at, end: af };
      }

      /**
       * 扫弧动画在时刻 timeMs 的右脚极角、已过时间。
       * 弧为劣弧：起点终点由 guideSweepOrderEndpointsAboveToBelow 排序（参考线上方 → 下方），
       * 转角用 minorArcDelta；canvas 绘制与 sweepArcAnticlockwise 一致。
       */
      function guideSweepAnimSample(g, timeMs) {
        const elapsed = timeMs - g.t0;
        const tp = Math.min(1, elapsed / g.duration);
        const ease = easeSweepAnim(tp);
        const start = g.sweepArcStart;
        const delta = g.sweepArcDeltaMinor;
        const endA = start + delta * ease;
        return {
          endA: endA,
          elapsed: elapsed,
        };
      }

      /**
       * 左脚尖、右脚尖世界坐标固定时求铰链与 angle/spread（两腿长均为 legLen）。
       * 左脚固定、右脚沿弧扫时用此式反求圆规姿态。
       */
      function compassPoseFromFixedTips(FLx, FLy, FRx, FRy, legLen) {
        const dx = FRx - FLx;
        const dy = FRy - FLy;
        const d = Math.hypot(dx, dy);
        if (d < 1e-4 || d > 2 * legLen - 0.5) {
          return null;
        }
        const mx = (FLx + FRx) * 0.5;
        const my = (FLy + FRy) * 0.5;
        const hh = legLen * legLen - (d * 0.5) * (d * 0.5);
        if (hh < 0) {
          return null;
        }
        const h = Math.sqrt(hh);
        const nx = -dy / d;
        const ny = dx / d;
        const c1x = mx + nx * h;
        const c1y = my + ny * h;
        const c2x = mx - nx * h;
        const c2y = my - ny * h;
        const hinge =
          c1y < c2y ? { x: c1x, y: c1y } : { x: c2x, y: c2y };
        const vLx = FLx - hinge.x;
        const vLy = FLy - hinge.y;
        const vRx = FRx - hinge.x;
        const vRy = FRy - hinge.y;
        const c =
          (vLx * vRx + vLy * vRy) /
          (legLen * legLen);
        let spread =
          0.5 *
          Math.acos(Math.min(1, Math.max(-1, c)));
        spread = Math.max(
          COMPASS_MIN_SPREAD,
          Math.min(COMPASS_MAX_SPREAD, spread)
        );
        const refLx = Math.sin(-spread) * legLen;
        const refLy = Math.cos(-spread) * legLen;
        const angle = Math.atan2(
          vLx * refLy - vLy * refLx,
          vLx * refLx + vLy * refLy
        );
        return {
          x: hinge.x,
          y: hinge.y,
          angle: angle,
          spread: spread,
        };
      }

      /**
       * 绕左脚枢轴 pivot 刚体转动：以吸附后的参考姿态 refSt 为 0°，转角 dRot（弧度）后铰链与 angle 同步旋转，
       * 左脚尖恒在 pivot（与真圆规扎针画弧一致）。
       */
      function applyCompassRigidRotateAboutPivot(
        cmp,
        pivotX,
        pivotY,
        refSt,
        dRot
      ) {
        const c = Math.cos(dRot);
        const s = Math.sin(dRot);
        const hx0 = refSt.x - pivotX;
        const hy0 = refSt.y - pivotY;
        cmp.x = pivotX + hx0 * c - hy0 * s;
        cmp.y = pivotY + hx0 * s + hy0 * c;
        cmp.angle = refSt.angle + dRot;
        cmp.spread = refSt.spread;
      }

      /**
       * 吸附扫弧动画：像扎针画圆一样，以吸附后姿态 toSt 为基准绕左脚尖 pivot 刚体旋转，
       * 使右脚尖极角等于虚线弧上的 endA（与橙点一致）；结束时写回 toSt。
       */
      function applyCompassPoseFromSweepAnim() {
        const g = guideSweepAnim;
        if (g == null || g.compassId == null) {
          return;
        }
        const cmp = shapes.find(function (sh) {
          return sh.id === g.compassId && sh.type === "compass";
        });
        if (!cmp) {
          return;
        }
        const now = performance.now();
        if (now - g.t0 >= g.duration - 1e-6) {
          if (g.toSt != null) {
            cmp.x = g.toSt.x;
            cmp.y = g.toSt.y;
            cmp.angle = g.toSt.angle;
            cmp.spread = g.toSt.spread;
          }
          return;
        }
        const sample = guideSweepAnimSample(g, now);
        const ts = g.toSt;
        if (ts != null && g.refRightAngle != null) {
          const dRot = sample.endA - g.refRightAngle;
          applyCompassRigidRotateAboutPivot(
            cmp,
            g.pivotX,
            g.pivotY,
            ts,
            dRot
          );
          return;
        }
        const Rx = g.pivotX + g.r * Math.cos(sample.endA);
        const Ry = g.pivotY + g.r * Math.sin(sample.endA);
        const pose = compassPoseFromFixedTips(
          g.pivotX,
          g.pivotY,
          Rx,
          Ry,
          COMPASS_LEG_LEN
        );
        if (pose != null) {
          cmp.x = pose.x;
          cmp.y = pose.y;
          cmp.angle = pose.angle;
          cmp.spread = pose.spread;
          return;
        }
        if (g.fromSt != null && g.toSt != null) {
          const t = Math.min(1, sample.elapsed / g.duration);
          const ease = easeSweepAnim(t);
          const a = g.fromSt;
          const b = g.toSt;
          cmp.x = a.x + (b.x - a.x) * ease;
          cmp.y = a.y + (b.y - a.y) * ease;
          cmp.spread = Math.max(
            COMPASS_MIN_SPREAD,
            Math.min(
              COMPASS_MAX_SPREAD,
              a.spread + (b.spread - a.spread) * ease
            )
          );
          cmp.angle = angleLerpRad(a.angle, b.angle, ease);
        }
      }

      /**
       * 吸附成功后：扫弧为劣弧，端点顺序为参考线上方→下方；canvas 沿最短劣弧绘制（必要时 anticlockwise）；左脚扎针刚体转动。
       */
      function beginGuideSweepAnimation(
        tipsBefore,
        tipsAfter,
        compassId,
        fromSt,
        toSt
      ) {
        const hasCompassPose =
          compassId != null &&
          fromSt != null &&
          toSt != null;
        if (guideSweepAnim != null && guideSweepAnim.raf) {
          cancelAnimationFrame(guideSweepAnim.raf);
          guideSweepAnim = null;
        }
        const px = tipsAfter.L.x;
        const py = tipsAfter.L.y;
        const r = Math.hypot(tipsAfter.R.x - px, tipsAfter.R.y - py);
        if (r < 8) {
          if (hasCompassPose) {
            const cmp = shapes.find(function (sh) {
              return sh.id === compassId && sh.type === "compass";
            });
            if (cmp) {
              cmp.x = toSt.x;
              cmp.y = toSt.y;
              cmp.angle = toSt.angle;
              cmp.spread = toSt.spread;
            }
          }
          return;
        }
        const a0 = Math.atan2(tipsBefore.R.y - py, tipsBefore.R.x - px);
        const a1 = Math.atan2(tipsAfter.R.y - py, tipsAfter.R.x - px);
        let deltaA = a1 - a0;
        while (deltaA > Math.PI) {
          deltaA -= 2 * Math.PI;
        }
        while (deltaA < -Math.PI) {
          deltaA += 2 * Math.PI;
        }
        if (Math.abs(deltaA) < 0.035 && !hasCompassPose) {
          return;
        }
        let overlayArcDelta = deltaA;
        if (Math.abs(overlayArcDelta) < 0.28) {
          const sx = tipsAfter.R.x - tipsBefore.R.x;
          const sy = tipsAfter.R.y - tipsBefore.R.y;
          const dir =
            Math.abs(sx) + Math.abs(sy) < 2
              ? 1
              : Math.abs(sx) >= Math.abs(sy)
                ? sx >= 0
                  ? 1
                  : -1
                : sy >= 0
                  ? 1
                  : -1;
          overlayArcDelta = dir * 0.42;
        }
        const gyLine = bottomGuideLineY();
        const arcSweep = overlayArcDelta * SWEEP_ARC_ANGLE_SCALE;
        const arcFrom = a0 - arcSweep;
        const arcTo = a0 + arcSweep;
        const ord = guideSweepOrderEndpointsAboveToBelow(
          px,
          py,
          r,
          gyLine,
          arcFrom,
          arcTo
        );
        const dMinor = minorArcDelta(ord.start, ord.end);
        guideSweepAnim = {
          pivotX: px,
          pivotY: py,
          r: r,
          a0: a0,
          deltaA: deltaA,
          overlayArcDelta: overlayArcDelta,
          refRightAngle: a1,
          sweepArcStart: ord.start,
          sweepArcDeltaMinor: dMinor,
          sweepArcAnticlockwise: dMinor < 0,
          t0: performance.now(),
          duration: SWEEP_ANIM_DURATION_MS,
          raf: 0,
          compassId: compassId,
          fromSt: fromSt,
          toSt: toSt,
        };
        function tickGuideSweepAnim() {
          if (guideSweepAnim == null) {
            return;
          }
          redraw();
          const elapsed = performance.now() - guideSweepAnim.t0;
          if (elapsed >= guideSweepAnim.duration) {
            cancelAnimationFrame(guideSweepAnim.raf);
            const fin = guideSweepAnim.toSt;
            const cid = guideSweepAnim.compassId;
            guideSweepAnim = null;
            if (fin != null && cid != null) {
              const cmp = shapes.find(function (sh) {
                return sh.id === cid && sh.type === "compass";
              });
              if (cmp) {
                cmp.x = fin.x;
                cmp.y = fin.y;
                cmp.angle = fin.angle;
                cmp.spread = fin.spread;
              }
            }
            redraw();
            return;
          }
          guideSweepAnim.raf = requestAnimationFrame(tickGuideSweepAnim);
        }
        tickGuideSweepAnim();
      }

      function drawGuideSweepAnimOverlay(ctx) {
        if (guideSweepAnim == null) {
          return;
        }
        const g = guideSweepAnim;
        const tp = Math.min(
          1,
          (performance.now() - g.t0) / g.duration
        );
        const ease = easeSweepAnim(tp);
        const endDraw =
          g.sweepArcStart + g.sweepArcDeltaMinor * ease;
        ctx.save();
        ctx.strokeStyle = "rgba(25, 85, 165, 0.92)";
        ctx.lineWidth = 4.5;
        ctx.lineCap = "round";
        ctx.setLineDash([10, 7]);
        ctx.beginPath();
        ctx.arc(
          g.pivotX,
          g.pivotY,
          g.r,
          g.sweepArcStart,
          endDraw,
          g.sweepArcAnticlockwise
        );
        ctx.stroke();
        ctx.setLineDash([]);
        const hx = g.pivotX + g.r * Math.cos(endDraw);
        const hy = g.pivotY + g.r * Math.sin(endDraw);
        ctx.fillStyle = "rgba(230, 105, 35, 0.95)";
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(hx, hy, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      }

      function guideMarkFootX(m) {
        return typeof m === "number" ? m : m.x;
      }

      /**
       * 底部参考线上：手动基准短竖线与圆规脚印标记里，横坐标最靠左的一点（用于直尺 0 刻度对齐）。
       * 无任何点时返回 null。
       */
      function leftmostGuidePointXOnBottomLine() {
        let minX = Infinity;
        for (let di = 0; di < guideLineRefDots.length; di++) {
          minX = Math.min(minX, guideLineRefDots[di].x);
        }
        for (let mi = 0; mi < guideLineMarks.length; mi++) {
          minX = Math.min(minX, guideMarkFootX(guideLineMarks[mi]));
        }
        return minX === Infinity ? null : minX;
      }

      /**
       * 松开直尺拖动后：尺面近似水平且贴近底部参考线时，摆正为水平；刻度 0 的世界 x 对齐线上最左点；
       * 尺体整体下移，使参考线留在尺面上方空隙内（须已有基准点或圆规脚印，否则不吸附）。
       */
      function trySnapRulerToBottomGuideLine(ruler) {
        if (!bottomGuideLineShown) return false;
        const gy = bottomGuideLineY();
        const gl = 10;
        const gr = cssW - 10;
        const b = rulerAabb(ruler);
        if (b.maxX < gl || b.minX > gr) return false;
        const ra = ruler.angle || 0;
        if (Math.abs(Math.sin(ra)) > 0.35) return false;
        if (verticalDistRulerAabbToLine(b, gy) > RULER_GUIDE_SNAP_DIST) {
          return false;
        }
        const anchorX = leftmostGuidePointXOnBottomLine();
        if (anchorX == null) return false;
        const mxLoc = (RULER_W - RULER_SCALE_W) / 2;
        const u0 = mxLoc - RULER_W / 2;
        ruler.angle = 0;
        ruler.x = anchorX - u0;
        ruler.y = gy + RULER_GUIDE_SNAP_LINE_CLEARANCE_PX + RULER_H / 2;
        return true;
      }

      function guideMarksSortedFootXs(marks) {
        const xs = marks.map(guideMarkFootX);
        return xs.slice().sort(function (a, b) {
          return a - b;
        });
      }

      /** 已知左脚尖世界坐标求铰链（与 drawCompass 中腿方向一致） */
      function compassHingeFromLeftTipWorld(anchorX, gy, ang, sp, L) {
        const lxL = -Math.sin(sp) * L;
        const lyL = Math.cos(sp) * L;
        const cr = Math.cos(ang);
        const sr = Math.sin(ang);
        const dlx = lxL * cr - lyL * sr;
        const dly = lxL * sr + lyL * cr;
        return { cx: anchorX - dlx, cy: gy - dly };
      }

      /**
       * 两脚贴近水平辅助线时：取 ang 为 0 或 π 使两腿尖同高落在 y=gy，并调整铰链 y。
       * 首次吸附记录左右两 x；之后左脚尖须贴近上一「右脚标记」x，再吸附并只追加新右脚 x。
       * 若左脚尖靠近用户在参考线上点击放置的基准点，则优先吸附到该点。
       */
      function trySnapCompassToBottomGuide(cmp) {
        if (!bottomGuideLineShown) return false;
        const gy = bottomGuideLineY();
        const L = COMPASS_LEG_LEN;
        const tips = compassTipsWorld(cmp);
        const dY = Math.max(Math.abs(tips.L.y - gy), Math.abs(tips.R.y - gy));
        if (dY > COMPASS_GUIDE_SNAP_Y) return false;

        const sp = Math.max(
          COMPASS_MIN_SPREAD,
          Math.min(COMPASS_MAX_SPREAD, cmp.spread != null ? cmp.spread : 0.38)
        );
        let cur = cmp.angle || 0;
        while (cur > Math.PI) cur -= 2 * Math.PI;
        while (cur < -Math.PI) cur += 2 * Math.PI;
        const ang = Math.abs(cur) < Math.abs(cur - Math.PI) ? 0 : Math.PI;
        const margin = COMPASS_LEG_LEN + COMPASS_HINGE_R;
        const mar = margin * 0.15;
        let refAnchorX = null;
        let bestRefD = 1e9;
        for (let ri = 0; ri < guideLineRefDots.length; ri++) {
          const d = Math.hypot(
            tips.L.x - guideLineRefDots[ri].x,
            tips.L.y - gy
          );
          if (d < bestRefD) {
            bestRefD = d;
            refAnchorX = guideLineRefDots[ri].x;
          }
        }
        const nearRef =
          refAnchorX != null && bestRefD <= COMPASS_GUIDE_REF_SNAP;

        /**
         * 将左脚尖落在 (anchorX, gy)，与链式吸附同验算。
         * @returns {ReturnType<typeof compassTipsWorld> | null}
         */
        function trySnapCompassAtAnchor(anchorX) {
          const bak = {
            x: cmp.x,
            y: cmp.y,
            angle: cmp.angle,
            spread: cmp.spread,
          };
          const h = compassHingeFromLeftTipWorld(anchorX, gy, ang, sp, L);
          const cx = Math.max(mar, Math.min(cssW - mar, h.cx));
          const cy = Math.max(COMPASS_Y_MIN, Math.min(cssH - mar, h.cy));
          cmp.x = cx;
          cmp.y = cy;
          cmp.angle = ang;
          cmp.spread = sp;
          const tips2 = compassTipsWorld(cmp);
          if (
            Math.abs(tips2.L.x - anchorX) > 6 ||
            Math.max(Math.abs(tips2.L.y - gy), Math.abs(tips2.R.y - gy)) > 3
          ) {
            cmp.x = bak.x;
            cmp.y = bak.y;
            cmp.angle = bak.angle;
            cmp.spread = bak.spread;
            return null;
          }
          return tips2;
        }

        if (nearRef) {
          const tips2 = trySnapCompassAtAnchor(refAnchorX);
          if (tips2) {
            if (guideLineMarks.length >= 2) {
              guideLineMarks.push({
                x: tips2.R.x,
                pivotX: tips2.L.x,
                pivotY: tips2.L.y,
              });
            } else {
              guideLineMarks = [
                {
                  x: tips2.L.x,
                  pivotX: tips2.L.x,
                  pivotY: tips2.L.y,
                },
                {
                  x: tips2.R.x,
                  pivotX: tips2.L.x,
                  pivotY: tips2.L.y,
                },
              ];
            }
            return true;
          }
        }

        if (guideLineMarks.length >= 2) {
          const anchorX = guideMarkFootX(
            guideLineMarks[guideLineMarks.length - 1]
          );
          const dChain = Math.hypot(tips.L.x - anchorX, tips.L.y - gy);
          if (dChain > COMPASS_GUIDE_CHAIN_HIT) return false;
          const tips2 = trySnapCompassAtAnchor(anchorX);
          if (!tips2) return false;
          guideLineMarks.push({
            x: tips2.R.x,
            pivotX: tips2.L.x,
            pivotY: tips2.L.y,
          });
          return true;
        }

        const cosA = Math.cos(ang);
        const cy0 = gy - L * Math.cos(sp) * cosA;
        cmp.x = Math.max(mar, Math.min(cssW - mar, cmp.x));
        cmp.y = Math.max(COMPASS_Y_MIN, Math.min(cssH - mar, cy0));
        cmp.angle = ang;
        cmp.spread = sp;
        const tips2 = compassTipsWorld(cmp);
        guideLineMarks = [
          {
            x: tips2.L.x,
            pivotX: tips2.L.x,
            pivotY: tips2.L.y,
          },
          {
            x: tips2.R.x,
            pivotX: tips2.L.x,
            pivotY: tips2.L.y,
          },
        ];
        return true;
      }

      function drawCompass(ctx, s) {
        const spread = Math.max(
          COMPASS_MIN_SPREAD,
          Math.min(COMPASS_MAX_SPREAD, s.spread != null ? s.spread : 0.38)
        );
        const ang = s.angle || 0;
        const L = COMPASS_LEG_LEN;
        const lx1 = Math.sin(-spread) * L;
        const ly1 = Math.cos(-spread) * L;
        const rx1 = Math.sin(spread) * L;
        const ry1 = Math.cos(spread) * L;

        const uxl = lx1 / L;
        const uyl = ly1 / L;
        const pxl = -uyl;
