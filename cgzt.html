        const pyl = uxl;
        const uxr = rx1 / L;
        const uyr = ry1 / L;
        const pxr = -uyr;
        const pyr = uxr;
        /** 木质腿沿 wv、金属腿沿 sv；贴顶水平直角边时 wv/sv 与 lx/rx 对调以交换两腿外观 */
        const swapLegsDraw = compassTipsNearTriangleTopHorizontalEdge(s);
        const wvx = swapLegsDraw ? lx1 : rx1;
        const wvy = swapLegsDraw ? ly1 : ry1;
        const svx = swapLegsDraw ? rx1 : lx1;
        const svy = swapLegsDraw ? ry1 : ly1;
        const wux = swapLegsDraw ? uxl : uxr;
        const wuy = swapLegsDraw ? uyl : uyr;
        const wpx = swapLegsDraw ? pxl : pxr;
        const wpy = swapLegsDraw ? pyl : pyr;
        const sux = swapLegsDraw ? uxr : uxl;
        const suy = swapLegsDraw ? uyr : uyl;
        const spx = swapLegsDraw ? pxr : pxl;
        const spy = swapLegsDraw ? pyr : pyl;

        ctx.save();
        ctx.translate(s.x, s.y);
        ctx.rotate(ang);

        const tipL = 0.97;
        const shMx = lx1 * tipL;
        const shMy = ly1 * tipL + 2;
        const shWx = rx1 * tipL;
        const shWy = ry1 * tipL + 2;
        ctx.strokeStyle = "rgba(0,0,0,0.1)";
        ctx.lineWidth = 7;
        ctx.lineCap = "butt";
        ctx.lineJoin = "miter";
        ctx.beginPath();
        ctx.moveTo(0, 2);
        ctx.lineTo(shMx, shMy);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, 2);
        ctx.lineTo(shWx, shWy);
        ctx.stroke();

        const woodEnd = 0.84;
        const wex = wvx * woodEnd;
        const wey = wvy * woodEnd;
        ctx.lineWidth = 9;
        ctx.strokeStyle = "#8b6644";
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(wex, wey);
        ctx.stroke();
        ctx.lineWidth = 3;
        ctx.strokeStyle = "#d4a574";
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(wvx * 0.82, wvy * 0.82);
        ctx.stroke();

        const la = Math.atan2(wvx, wvy);
        ctx.save();
        ctx.translate(wvx * 0.89, wvy * 0.89);
        ctx.rotate(la);
        ctx.fillStyle = "#9a9ea6";
        ctx.strokeStyle = "#5a5e68";
        ctx.lineWidth = 1;
        ctx.fillRect(-4.5, -4, 9, 10);
        ctx.strokeRect(-4.5, -4, 9, 10);
        ctx.restore();

        const tWood0 = 0.9;
        const tWood1 = 0.965;
        const hw0 = 3.8;
        const hw1 = 0.85;
        ctx.fillStyle = "#b88250";
        ctx.strokeStyle = "#6a4a30";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(wvx * tWood0 + wpx * hw0, wvy * tWood0 + wpy * hw0);
        ctx.lineTo(wvx * tWood0 - wpx * hw0, wvy * tWood0 - wpy * hw0);
        ctx.lineTo(wvx * tWood1 - wpx * hw1, wvy * tWood1 - wpy * hw1);
        ctx.lineTo(wvx * tWood1 + wpx * hw1, wvy * tWood1 + wpy * hw1);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = "#141418";
        ctx.beginPath();
        ctx.moveTo(wvx, wvy);
        ctx.lineTo(wvx * tWood1 - wpx * hw1, wvy * tWood1 - wpy * hw1);
        ctx.lineTo(wvx * tWood1 + wpx * hw1, wvy * tWood1 + wpy * hw1);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "#2a2c32";
        ctx.beginPath();
        ctx.moveTo(wvx, wvy);
        ctx.lineTo(wvx - wux * 5.5 - wpx * 0.55, wvy - wuy * 5.5 - wpy * 0.55);
        ctx.lineTo(wvx - wux * 5.5 + wpx * 0.55, wvy - wuy * 5.5 + wpy * 0.55);
        ctx.closePath();
        ctx.fill();

        const steelEnd = 0.88;
        const sex = svx * steelEnd;
        const sey = svy * steelEnd;
        ctx.lineWidth = 5;
        ctx.strokeStyle = "#7a8088";
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(sex, sey);
        ctx.stroke();
        ctx.strokeStyle = "#d0d6de";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(svx * 0.86, svy * 0.86);
        ctx.stroke();

        const tn0 = 0.9;
        const tn1 = 0.972;
        const nhw0 = 3.2;
        const nhw1 = 0.35;
        ctx.fillStyle = "#6a6e78";
        ctx.strokeStyle = "#3a3d45";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(svx * tn0 + spx * nhw0, svy * tn0 + spy * nhw0);
        ctx.lineTo(svx * tn0 - spx * nhw0, svy * tn0 - spy * nhw0);
        ctx.lineTo(svx * tn1 - spx * nhw1, svy * tn1 - spy * nhw1);
        ctx.lineTo(svx * tn1 + spx * nhw1, svy * tn1 + spy * nhw1);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#2c2e34";
        ctx.beginPath();
        ctx.moveTo(svx, svy);
        ctx.lineTo(svx * tn1 - spx * nhw1, svy * tn1 - spy * nhw1);
        ctx.lineTo(svx * tn1 + spx * nhw1, svy * tn1 + spy * nhw1);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = "#c8ccd4";
        ctx.lineWidth = 0.9;
        ctx.beginPath();
        ctx.moveTo(svx * 0.9 + spx * 1.1, svy * 0.9 + spy * 1.1);
        ctx.lineTo(svx * tn1 * 0.98 + spx * 0.25, svy * tn1 * 0.98 + spy * 0.25);
        ctx.stroke();
        ctx.fillStyle = "#0e0e12";
        ctx.beginPath();
        ctx.moveTo(svx, svy);
        ctx.lineTo(svx - sux * 4.2 - spx * 0.28, svy - suy * 4.2 - spy * 0.28);
        ctx.lineTo(svx - sux * 4.2 + spx * 0.28, svy - suy * 4.2 + spy * 0.28);
        ctx.closePath();
        ctx.fill();

        const g = ctx.createRadialGradient(-3, -6, 1, 0, -2, COMPASS_HINGE_R);
        g.addColorStop(0, "#f2e6b8");
        g.addColorStop(0.45, "#d4b456");
        g.addColorStop(1, "#7d6220");
        ctx.beginPath();
        ctx.arc(0, -2, COMPASS_HINGE_R * 0.52, 0, Math.PI * 2);
        ctx.fillStyle = g;
        ctx.fill();
        ctx.strokeStyle = "#4a3810";
        ctx.lineWidth = 1.1;
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(0, -2, COMPASS_HINGE_R * 0.72, Math.PI * 0.88, Math.PI * 0.12, true);
        ctx.strokeStyle = "#2a1a06";
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0, -6);
        ctx.lineTo(0, -COMPASS_HINGE_R * 1.25);
        ctx.lineWidth = 4.5;
        ctx.strokeStyle = "#5c4528";
        ctx.lineCap = "round";
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(0, -COMPASS_HINGE_R * 1.32, 5.5, 0, Math.PI * 2);
        ctx.fillStyle = "#6a5030";
        ctx.fill();
        ctx.strokeStyle = "#3d2810";
        ctx.lineWidth = 1;
        ctx.stroke();

        ctx.restore();
      }

      function bboxFor(shape) {
        if (shape.type === "triangle") {
          return { w: TRI_LEG_TOP, h: TRI_LEG_LEFT };
        }
        if (shape.type === "ruler") {
          const b = rulerAabb(shape);
          return { w: b.maxX - b.minX, h: b.maxY - b.minY };
        }
        if (shape.type === "label") {
          return {
            w: labelDisplayWidthForLetter(shape.letter),
            h: LABEL_H,
          };
        }
        if (shape.type === "redline") {
          return { w: 0, h: 0 };
        }
        return { w: LEAF_W, h: LEAF_H };
      }

      function hitTest(cssX, cssY) {
        for (let i = shapes.length - 1; i >= 0; i--) {
          const s = shapes[i];
          if (s.type === "redline") {
            if (
              s.points &&
              s.points.length >= 2 &&
              distPointToPolyline(cssX, cssY, s.points) <= REDLINE_HIT_DIST
            ) {
              return s.id;
            }
            continue;
          }
          if (s.type === "ruler") {
            if (rulerHit(s, cssX, cssY)) {
              return s.id;
            }
            continue;
          }
          if (s.type === "compass") {
            if (compassHitRegion(s, cssX, cssY)) {
              return s.id;
            }
            continue;
          }
          const { w, h } = bboxFor(s);
          if (
            cssX >= s.x &&
            cssY >= s.y &&
            cssX <= s.x + w &&
            cssY <= s.y + h
          ) {
            if (s.type === "label") {
              return s.id;
            }
            const lx = cssX - s.x;
            const ly = cssY - s.y;
            sctx.beginPath();
            if (s.type === "triangle") {
              trianglePath(sctx, TRI_LEG_TOP, TRI_LEG_LEFT);
            } else {
              leafPath(sctx, LEAF_W, LEAF_H);
            }
            if (sctx.isPointInPath(lx, ly)) {
              return s.id;
            }
          }
        }
        return null;
      }

      function syncBatchLetterLabelsFromAnchors() {
        let sortedGuide = null;
        let gy = null;
        if (bottomGuideLineShown && guideLineMarks.length > 0) {
          gy = bottomGuideLineY();
          sortedGuide = guideLineMarks
            .map(function (m) {
              return { x: guideMarkFootX(m) };
            })
            .sort(function (a, b) {
              return a.x - b.x;
            });
        }
        for (let i = shapes.length - 1; i >= 0; i--) {
          const s = shapes[i];
          if (s.type !== "label" || !s.batchLetters || !s.anchor) continue;
          if (dragShapeId === s.id) continue;
          const a = s.anchor;
          if (a.kind === "triVertex") {
            const tri = shapes.find(function (sh) {
              return sh.id === a.triId && sh.type === "triangle";
            });
            if (!tri) {
              if (dragShapeId === s.id) dragShapeId = null;
              shapes.splice(i, 1);
              continue;
            }
            const V = triangleVertsWorld(tri);
            const wlab = labelDisplayWidthForLetter(s.letter);
            if (a.vertex === "BL") {
              const V2 = V[2];
              s.x = V2.x - TRI_VERTEX_LABEL_GAP - wlab;
              s.y = V2.y - LABEL_H / 2;
            } else if (a.vertex === "TR") {
              const V1 = V[1];
              s.x = V1.x + TRI_VERTEX_LABEL_GAP;
              s.y = V1.y - LABEL_H / 2;
            } else if (a.vertex === "TL") {
              const V0 = V[0];
              s.x = V0.x - TRI_VERTEX_LABEL_GAP - wlab;
              s.y = V0.y - LABEL_H / 2;
            }
          } else if (a.kind === "guideMark") {
            if (
              !bottomGuideLineShown ||
              !sortedGuide ||
              a.markIndex >= sortedGuide.length
            ) {
              if (dragShapeId === s.id) dragShapeId = null;
              shapes.splice(i, 1);
              continue;
            }
            const cx = sortedGuide[a.markIndex].x;
            const wlab = labelDisplayWidthForLetter(s.letter);
            s.x = cx - wlab / 2;
            s.y = gy + GUIDE_MARK_LABEL_BELOW_GAP;
          }
        }
      }

      /** 参考线上的基准标记：自 y=gy 仅向上的短竖线（不向下方伸出） */
      function drawGuideRefTickUp(ctx, x, gy) {
        ctx.strokeStyle = "#285080";
        ctx.lineWidth = 2.25;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(x, gy);
        ctx.lineTo(x, gy - GUIDE_REF_TICK_LEN_PX);
        ctx.stroke();
      }

      function redraw() {
        applyCompassPoseFromSweepAnim();
        syncBatchLetterLabelsFromAnchors();
        const ctx = canvas.getContext("2d");
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, cssW, cssH);
        ctx.strokeStyle = GRID;
        ctx.lineWidth = 1;
        const step = 32;
        for (let x = 0; x <= cssW; x += step) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, cssH);
          ctx.stroke();
        }
        for (let y = 0; y <= cssH; y += step) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(cssW, y);
          ctx.stroke();
        }

        if (bottomGuideLineShown) {
          const gy = bottomGuideLineY();
          ctx.save();
          ctx.strokeStyle = "#3d5a8a";
          ctx.lineWidth = 2.5;
          ctx.beginPath();
          ctx.moveTo(10, gy);
          ctx.lineTo(cssW - 10, gy);
          ctx.stroke();
          for (let di = 0; di < guideLineRefDots.length; di++) {
            drawGuideRefTickUp(ctx, guideLineRefDots[di].x, gy);
          }
          ctx.restore();
        }

        for (const s of shapes) {
          ctx.save();
          if (s.type === "triangle") {
            ctx.translate(s.x, s.y);
            drawTriangleStroke(ctx, TRI_LEG_TOP, TRI_LEG_LEFT);
          } else if (s.type === "leaf") {
            ctx.translate(s.x, s.y);
            drawLeafStroke(ctx, LEAF_W, LEAF_H);
          } else if (s.type === "ruler") {
            drawRulerStroke(ctx, s);
          } else if (s.type === "compass") {
            drawCompass(ctx, s);
          } else if (s.type === "redline") {
            drawRedLineShape(ctx, s);
          } else if (s.type === "label") {
            drawLabelStroke(ctx, s);
          }
          ctx.restore();
        }

        if (redLineStroke != null && redLineStroke.points.length > 0) {
          drawRedLineShape(ctx, {
            id: -1,
            points: redLineStroke.points,
          });
        }

        if (bottomGuideLineShown && guideLineMarks.length > 0) {
          const gy = bottomGuideLineY();
          ctx.save();
          for (let mi = 0; mi < guideLineMarks.length; mi++) {
            const m = guideLineMarks[mi];
            const x = guideMarkFootX(m);
            let onRef = false;
            for (let ri = 0; ri < guideLineRefDots.length; ri++) {
              if (
                Math.abs(x - guideLineRefDots[ri].x) <=
                GUIDE_REF_MARK_COINCIDE
              ) {
                onRef = true;
                break;
              }
            }
            if (onRef) {
              drawGuideRefTickUp(ctx, x, gy);
            } else {
              const px = m.pivotX;
              const py = m.pivotY;
              const R = Math.hypot(x - px, gy - py);
              ctx.fillStyle = "#285080";
              ctx.strokeStyle = "#285080";
              ctx.lineWidth = 2;
              if (R >= 5) {
                const baseAng = Math.atan2(gy - py, x - px);
                let span = GUIDE_MARK_ARC_LENGTH_PX / (2 * R);
                const spanMax = Math.PI * 0.42;
                if (span > spanMax) {
                  span = spanMax;
                }
                ctx.beginPath();
                ctx.arc(px, py, R, baseAng - span, baseAng + span, false);
                ctx.stroke();
              }
              ctx.beginPath();
              ctx.arc(x, gy, 3.8, 0, Math.PI * 2);
              ctx.fill();
            }
          }
          ctx.restore();
        }

        drawGuideSweepAnimOverlay(ctx);

        if (
          bottomGuideLineShown &&
          guideLineMarks.length >= 2
        ) {
          const gyMap = bottomGuideLineY();
          for (let ti = 0; ti < shapes.length; ti++) {
            if (shapes[ti].type !== "triangle") continue;
            drawCompassGuideMappingArrows(
              ctx,
              shapes[ti],
              gyMap,
              guideLineMarks
            );
            break;
          }
        }

        if (bottomGuideLineShown && guideLine12cmLabelPersisted) {
          const gy = bottomGuideLineY();
          const cx = cssW / 2;
          ctx.save();
          ctx.font = "600 19px system-ui, sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "top";
          ctx.strokeStyle = "rgba(255,255,255,0.92)";
          ctx.fillStyle = "#1a4d72";
          ctx.lineWidth = 3;
          ctx.lineJoin = "round";
          const t12 = "12厘米";
          const labelY = gy + 6;
          ctx.strokeText(t12, cx, labelY);
          ctx.fillText(t12, cx, labelY);
          ctx.restore();
        }

        tryAddRulerTriangleAlignmentHints();
        prunePersistedEdgeHints();
        const lengthHints = buildPersistedLengthHintsForDraw();
        if (lengthHints.length > 0) {
          drawLengthHints(ctx, lengthHints);
        }
        drawTrianglePerimeterFormulas(ctx);

        const staleLeafIds = [];
        persistedLeaf13cmLabelIds.forEach(function (lid) {
          const lf = shapes.find(function (sh) {
            return sh.id === lid && sh.type === "leaf";
          });
          if (!lf) {
            staleLeafIds.push(lid);
            return;
          }
          const cx = lf.x + LEAF_W / 2;
          const by = lf.y + LEAF_H + 20;
          ctx.save();
          ctx.font = "600 19px system-ui, sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "top";
          ctx.strokeStyle = "rgba(255,255,255,0.92)";
          ctx.fillStyle = "#3d2a18";
          ctx.lineWidth = 3;
          ctx.lineJoin = "round";
          const t13 = "13厘米";
          ctx.strokeText(t13, cx, by);
          ctx.fillText(t13, cx, by);
          ctx.restore();
        });
        for (let si = 0; si < staleLeafIds.length; si++) {
          persistedLeaf13cmLabelIds.delete(staleLeafIds[si]);
        }
      }

      function resize() {
        dpr = window.devicePixelRatio || 1;
        cssW = wrap.clientWidth;
        cssH = wrap.clientHeight;
        canvas.width = Math.max(1, Math.floor(cssW * dpr));
        canvas.height = Math.max(1, Math.floor(cssH * dpr));
        canvas.style.width = cssW + "px";
        canvas.style.height = cssH + "px";
        redraw();
      }

      function cssPointFromEvent(e) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: e.clientX - rect.left,
          y: e.clientY - rect.top,
        };
      }

      function setCanvasCursorFromHover(px, py) {
        lastHoverCss.x = px;
        lastHoverCss.y = py;
        if (drawRedLineMode) {
          canvas.style.cursor = "crosshair";
          return;
        }
        for (let ri = shapes.length - 1; ri >= 0; ri--) {
          const rs = shapes[ri];
          if (
            rs.type === "redline" &&
            rs.snappedToId != null &&
            rs.points &&
            rs.points.length >= 2 &&
            distPointToPolyline(px, py, rs.points) <= REDLINE_HIT_DIST
          ) {
            canvas.style.cursor = "pointer";
            return;
          }
        }
        if (placeCompassMode) {
          canvas.style.cursor = "crosshair";
          return;
        }
        for (let i = shapes.length - 1; i >= 0; i--) {
          const s = shapes[i];
          if (s.type !== "compass") continue;
          const r = compassHitRegion(s, px, py);
          if (r === "L" || r === "R" || r === "body") {
            canvas.style.cursor = "grab";
            return;
          }
        }
        if (
          bottomGuideLineShown &&
          !drawRedLineMode &&
          hitTest(px, py) == null &&
          hitBottomGuideLineBand(px, py)
        ) {
          canvas.style.cursor = "pointer";
          return;
        }
        canvas.style.cursor = hitTest(px, py) != null ? "grab" : "default";
      }

      canvas.addEventListener("pointerdown", function (e) {
        if (e.button !== 0) return;
        const p = cssPointFromEvent(e);
        let id = hitTest(p.x, p.y);
        const paletteCompassEl = document.getElementById("paletteCompass");
        if (drawRedLineMode && redLineStroke == null && id == null) {
          const q = snapRedLinePointToLeafOutlineIfClose(p.x, p.y);
          redLineStroke = {
            points: [{ x: q.x, y: q.y }],
            pointerId: e.pointerId,
          };
          canvas.setPointerCapture(e.pointerId);
          canvas.style.cursor = "crosshair";
          redraw();
          return;
        }
        if (placeCompassMode) {
          if (id == null) {
            recordUndoBeforeChange();
            shapes.push({
              id: nextId++,
              type: "compass",
              x: p.x,
              y: p.y,
              spread: 0.35,
              angle: 0,
            });
            if (!bottomGuideLineShown) {
              bottomGuideLineShown = true;
            }
            placeCompassMode = false;
            if (paletteCompassEl) {
              paletteCompassEl.classList.remove("active");
            }
            redraw();
            return;
          }
          placeCompassMode = false;
          if (paletteCompassEl) {
            paletteCompassEl.classList.remove("active");
          }
        }
        if (
          bottomGuideLineShown &&
          !drawRedLineMode &&
          id == null &&
          !placeCompassMode &&
          hitBottomGuideLineBand(p.x, p.y)
        ) {
          if (guideLineRefDots.length >= 1) {
            redraw();
            return;
          }
          const gl = 10;
          const gr = cssW - 10;
          const x = Math.max(gl, Math.min(gr, p.x));
          recordUndoBeforeChange();
          guideLineRefDots.push({ x: x });
          redraw();
          return;
        }
        if (id == null) return;
        const s = shapes.find(function (sh) {
          return sh.id === id;
        });
        if (!s) return;
        if (s.type === "redline" && s.snappedToId != null) {
          const tgt = shapes.find(function (sh) {
            return sh.id === s.snappedToId;
          });
          if (tgt) {
            recordUndoBeforeChange();
            straightenRedlineBelowShape(s, tgt);
          } else {
            delete s.snappedToId;
          }
          redraw();
          return;
        }
        if (s.type === "redline") {
          return;
        }
        recordUndoBeforeChange();
        dragShapeId = id;
        dragOffsetX = p.x - s.x;
        dragOffsetY = p.y - s.y;
        if (s.type === "ruler") {
          rulerTap = { x0: p.x, y0: p.y, moved: false };
          compassLegDrag = null;
          compassTap = null;
        } else if (s.type === "compass") {
          rulerTap = null;
          const leg = compassHitRegion(s, p.x, p.y);
          compassLegDrag = leg === "L" || leg === "R" ? leg : null;
          compassTap =
            compassLegDrag == null
              ? { x0: p.x, y0: p.y, moved: false }
              : null;
        } else {
          rulerTap = null;
          compassLegDrag = null;
          compassTap = null;
        }
        canvas.setPointerCapture(e.pointerId);
        canvas.style.cursor = compassLegDrag != null ? "grabbing" : "grabbing";
      });

      canvas.addEventListener("pointermove", function (e) {
        const p = cssPointFromEvent(e);
        if (
          redLineStroke != null &&
          e.pointerId === redLineStroke.pointerId
        ) {
          const pts = redLineStroke.points;
          const last = pts[pts.length - 1];
          const q = snapRedLinePointToLeafOutlineIfClose(p.x, p.y);
          if (Math.hypot(q.x - last.x, q.y - last.y) >= 2) {
            pts.push({ x: q.x, y: q.y });
          }
          redraw();
          return;
        }
        if (dragShapeId != null) {
          const s = shapes.find(function (sh) {
            return sh.id === dragShapeId;
          });
          if (!s) return;
          if (
            s.type === "compass" &&
            (compassLegDrag === "L" || compassLegDrag === "R")
          ) {
            compassUpdateSpreadFromPointer(s, p.x, p.y, compassLegDrag);
            redraw();
            return;
          }
          if (s.type === "ruler") {
            if (rulerTap != null) {
              const dist = Math.hypot(p.x - rulerTap.x0, p.y - rulerTap.y0);
              if (!rulerTap.moved && dist <= RULER_TAP_DRAG_THRESH) {
                return;
              }
              rulerTap.moved = true;
            }
            s.x = p.x - dragOffsetX;
            s.y = p.y - dragOffsetY;
            redraw();
            return;
          }
          if (s.type === "compass") {
            if (compassLegDrag == null && compassTap != null) {
              const dist = Math.hypot(
                p.x - compassTap.x0,
                p.y - compassTap.y0
              );
              if (!compassTap.moved && dist <= RULER_TAP_DRAG_THRESH) {
                return;
              }
              compassTap.moved = true;
            }
            let nx = p.x - dragOffsetX;
            let ny = p.y - dragOffsetY;
            const margin = COMPASS_LEG_LEN + COMPASS_HINGE_R;
            nx = Math.max(margin * 0.15, Math.min(cssW - margin * 0.15, nx));
            ny = Math.max(COMPASS_Y_MIN, Math.min(cssH - margin * 0.15, ny));
            s.x = nx;
            s.y = ny;
            maybeStraightenCompassUprightIfLeftShapeEdge(s);
            redraw();
            return;
          }
          const { w, h } = bboxFor(s);
          let nx = p.x - dragOffsetX;
          let ny = p.y - dragOffsetY;
          nx = Math.max(0, Math.min(cssW - w, nx));
          ny = Math.max(0, Math.min(cssH - h, ny));
          s.x = nx;
          s.y = ny;
          redraw();
          return;
        }
        setCanvasCursorFromHover(p.x, p.y);
      });

      function endDrag(e) {
        if (dragShapeId == null) return;
        const sid = dragShapeId;
        const s = shapes.find(function (sh) {
          return sh.id === sid;
        });
        dragShapeId = null;
        try {
          canvas.releasePointerCapture(e.pointerId);
        } catch (_) {}
        let needRedraw = false;
        const pEnd = cssPointFromEvent(e);
        const rulerTapNoMove =
          s &&
          s.type === "ruler" &&
          rulerTap != null &&
          !rulerTap.moved;
        const compassTapNoMove =
          s &&
          s.type === "compass" &&
          compassTap != null &&
          !compassTap.moved &&
          compassLegDrag == null;
        const compassBodyDragged =
          s &&
          s.type === "compass" &&
          compassTap != null &&
          compassTap.moved &&
          compassLegDrag == null;

        if (s && s.type === "ruler" && rulerTap != null && rulerTap.moved) {
          if (trySnapRulerToNearestShapeEdge(s, pEnd.x, pEnd.y)) {
            needRedraw = true;
          } else if (trySnapRulerToBottomGuideLine(s)) {
            needRedraw = true;
          }
        }
        if (
          s &&
          s.type === "ruler" &&
          rulerTap != null &&
          rulerTap.moved &&
          bottomGuideLineShown &&
          rulerCloseToBottomGuideLine(s)
        ) {
          guideLine12cmLabelPersisted = true;
          needRedraw = true;
        }
        if (
          s &&
          s.type === "ruler" &&
          rulerTap != null &&
          rulerTap.moved
        ) {
          for (let ri = 0; ri < shapes.length; ri++) {
            const rl = shapes[ri];
            if (rl.type !== "redline" || rl.straightenedFromLeafId == null) {
              continue;
            }
            const pts = rl.points;
            if (!pts || pts.length !== 2) continue;
            if (rulerCloseToHorizontalSegment(s, pts[0], pts[1], 8)) {
              persistedLeaf13cmLabelIds.add(rl.straightenedFromLeafId);
              needRedraw = true;
            }
          }
        }

        rulerTap = null;
        compassTap = null;
        compassLegDrag = null;

        if (rulerTapNoMove) {
          cycleRulerAngle(s);
          needRedraw = true;
        }
        if (compassTapNoMove) {
          cycleCompassAngle(s);
          needRedraw = true;
        }
        if (s && s.type === "compass") {
          const fromState = {
            x: s.x,
            y: s.y,
            angle: s.angle,
            spread: s.spread,
          };
          const tipsBeforeSnap = compassTipsWorld(s);
          if (trySnapCompassToBottomGuide(s)) {
            s.edgeSnapStraightenPending = false;
            const toState = {
              x: s.x,
              y: s.y,
              angle: s.angle,
              spread: s.spread,
            };
            const tipsAfterSnap = compassTipsWorld(s);
            s.x = fromState.x;
            s.y = fromState.y;
            s.angle = fromState.angle;
            s.spread = fromState.spread;
            beginGuideSweepAnimation(
              tipsBeforeSnap,
              tipsAfterSnap,
              s.id,
              fromState,
              toState
            );
            needRedraw = true;
          } else if (
            compassBodyDragged &&
            trySnapCompassToNearestShapeEdgeByPointer(s, pEnd.x, pEnd.y)
          ) {
            needRedraw = true;
          }
        }
        if (needRedraw) {
          redraw();
        }
        setCanvasCursorFromHover(pEnd.x, pEnd.y);
      }

      function finalizeRedLineStroke(e) {
        if (
          redLineStroke == null ||
          e.pointerId !== redLineStroke.pointerId
        ) {
          return;
        }
        try {
          canvas.releasePointerCapture(e.pointerId);
        } catch (_) {}
        const pts = redLineStroke.points;
        redLineStroke = null;
        if (pts.length >= 2) {
          recordUndoBeforeChange();
          const rl = { id: nextId++, type: "redline", points: pts.slice() };
          snapRedlineToNearestShape(rl);
          shapes.push(rl);
        }
        redraw();
        const p = cssPointFromEvent(e);
        setCanvasCursorFromHover(p.x, p.y);
      }

      canvas.addEventListener("pointerup", finalizeRedLineStroke);
      canvas.addEventListener("pointercancel", finalizeRedLineStroke);
      canvas.addEventListener("pointerup", endDrag);
      canvas.addEventListener("pointercancel", endDrag);

      function addTriangleOrLeafFromPalette(kind) {
        if (kind !== "triangle" && kind !== "leaf") return;
        let w;
        let h;
        if (kind === "triangle") {
          w = TRI_LEG_TOP;
          h = TRI_LEG_LEFT;
        } else {
          w = LEAF_W;
          h = LEAF_H;
        }
        const cw = cssW > 0 ? cssW : wrap.clientWidth;
        const ch = cssH > 0 ? cssH : wrap.clientHeight;
        let x = (cw - w) / 2;
        let y = (ch - h) / 2 - PALETTE_SHAPE_INITIAL_OFFSET_UP;
        x = Math.max(0, Math.min(cw - w, x));
        y = Math.max(0, Math.min(ch - h, y));
        recordUndoBeforeChange();
        shapes.push({ id: nextId++, type: kind, x: x, y: y });
        redraw();
      }

      function removeBatchLetterLabels() {
        for (let i = shapes.length - 1; i >= 0; i--) {
          const sh = shapes[i];
          if (sh.type === "label" && sh.batchLetters) {
            if (dragShapeId === sh.id) dragShapeId = null;
            shapes.splice(i, 1);
          }
        }
      }

      function applyBatchLetterLabels() {
        recordUndoBeforeChange();
        removeBatchLetterLabels();
        const gyBase =
          bottomGuideLineShown && guideLineMarks.length > 0
            ? bottomGuideLineY()
            : null;
        if (gyBase != null && guideLineMarks.length > 0) {
          const sorted = guideLineMarks
            .map(function (m) {
              return { x: guideMarkFootX(m) };
            })
            .sort(function (a, b) {
              return a.x - b.x;
            });
          for (let gi = 0; gi < sorted.length; gi++) {
            const letter =
              GUIDE_MARK_LETTER_CYCLE[gi % GUIDE_MARK_LETTER_CYCLE.length];
            const cx = sorted[gi].x;
            const wlab = labelDisplayWidthForLetter(letter);
            shapes.push({
              id: nextId++,
              type: "label",
              letter: letter,
              x: cx - wlab / 2,
              y: gyBase + GUIDE_MARK_LABEL_BELOW_GAP,
              batchLetters: true,
              anchor: { kind: "guideMark", markIndex: gi },
            });
          }
        }
        const trianglesOnly = shapes.filter(function (sh) {
          return sh.type === "triangle";
        });
        for (let ti = 0; ti < trianglesOnly.length; ti++) {
          const tid = trianglesOnly[ti].id;
          shapes.push({
            id: nextId++,
            type: "label",
            letter: "A",
            x: 0,
            y: 0,
            batchLetters: true,
            anchor: { kind: "triVertex", triId: tid, vertex: "BL" },
          });
          shapes.push({
            id: nextId++,
            type: "label",
            letter: "B",
            x: 0,
            y: 0,
            batchLetters: true,
            anchor: { kind: "triVertex", triId: tid, vertex: "TR" },
          });
          shapes.push({
            id: nextId++,
            type: "label",
            letter: "C",
            x: 0,
            y: 0,
            batchLetters: true,
            anchor: { kind: "triVertex", triId: tid, vertex: "TL" },
          });
        }
        syncBatchLetterLabelsFromAnchors();
        redraw();
      }

      function toggleRulerFromPalette() {
        recordUndoBeforeChange();
        let hasRuler = false;
        for (let i = 0; i < shapes.length; i++) {
          if (shapes[i].type === "ruler") {
            hasRuler = true;
            break;
          }
        }
        if (hasRuler) {
          for (let i = shapes.length - 1; i >= 0; i--) {
            if (shapes[i].type !== "ruler") continue;
            if (dragShapeId === shapes[i].id) {
              dragShapeId = null;
            }
            shapes.splice(i, 1);
          }
        } else {
          const cw = cssW > 0 ? cssW : wrap.clientWidth;
          const ch = cssH > 0 ? cssH : wrap.clientHeight;
          const cx = Math.max(
            RULER_W / 2,
            Math.min(cw - RULER_W / 2, cw / 2)
          );
          const cy = Math.max(
            RULER_H / 2,
            Math.min(ch - RULER_H / 2, ch / 2)
          );
          const r = {
            id: nextId++,
            type: "ruler",
            x: cx,
            y: cy,
            angle: RULER_ANGLE_H,
          };
          shapes.push(r);
        }
        redraw();
      }

      document.querySelectorAll(".palette-item[data-shape]").forEach(function (el) {
        const kind = el.getAttribute("data-shape");
        if (kind === "ruler") {
          el.addEventListener("click", function () {
            toggleRulerFromPalette();
          });
          el.addEventListener("keydown", function (e) {
            if (e.key === "Enter" || e.key === " ") {
              e.preventDefault();
              toggleRulerFromPalette();
            }
          });
          return;
        }
        const pc = document.createElement("canvas");
        pc.width = 72;
        pc.height = 72;
        const ctx = pc.getContext("2d");
        ctx.translate(8, 8);
        if (kind === "triangle") {
          drawTriangleStroke(ctx, 48, 36);
        } else {
          drawLeafStroke(ctx, 56, 62);
        }
        el.appendChild(pc);

        el.addEventListener("click", function (e) {
          e.preventDefault();
          addTriangleOrLeafFromPalette(kind);
        });
        el.addEventListener("keydown", function (e) {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            addTriangleOrLeafFromPalette(kind);
          }
        });
      });

      (function initPaletteLetters() {
        const el = document.getElementById("paletteLetters");
        if (!el) return;
        function applyLetters() {
          applyBatchLetterLabels();
        }
        el.addEventListener("click", function (e) {
          e.preventDefault();
          applyLetters();
        });
        el.addEventListener("keydown", function (e) {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            applyLetters();
          }
        });
      })();

      (function initPaletteCompass() {
        const el = document.getElementById("paletteCompass");
        if (!el) return;
        function togglePlaceCompass() {
          placeCompassMode = !placeCompassMode;
          if (placeCompassMode) {
            drawRedLineMode = false;
            redLineStroke = null;
            const rle = document.getElementById("paletteRedLine");
            if (rle) {
              rle.classList.remove("active");
            }
          }
          el.classList.toggle("active", placeCompassMode);
          setCanvasCursorFromHover(lastHoverCss.x, lastHoverCss.y);
        }
        el.addEventListener("click", function (e) {
          e.preventDefault();
          togglePlaceCompass();
        });
        el.addEventListener("keydown", function (e) {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            togglePlaceCompass();
          }
        });
      })();

      (function initPaletteRedLine() {
        const el = document.getElementById("paletteRedLine");
        if (!el) return;
        function toggleDrawRedLine() {
          drawRedLineMode = !drawRedLineMode;
          if (drawRedLineMode) {
            placeCompassMode = false;
            redLineStroke = null;
            const ce = document.getElementById("paletteCompass");
            if (ce) {
              ce.classList.remove("active");
            }
          }
          el.classList.toggle("active", drawRedLineMode);
          setCanvasCursorFromHover(lastHoverCss.x, lastHoverCss.y);
        }
        el.addEventListener("click", function (e) {
          e.preventDefault();
          toggleDrawRedLine();
        });
        el.addEventListener("keydown", function (e) {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            toggleDrawRedLine();
          }
        });
      })();

      function clearCanvas() {
        recordUndoBeforeChange();
        shapes.length = 0;
        nextId = 1;
        persistedEdgeHintKeys.clear();
        dragShapeId = null;
        dragOffsetX = 0;
        dragOffsetY = 0;
        rulerTap = null;
        compassTap = null;
        compassLegDrag = null;
        placeCompassMode = false;
        drawRedLineMode = false;
        redLineStroke = null;
        bottomGuideLineShown = false;
        guideLine12cmLabelPersisted = false;
        persistedLeaf13cmLabelIds.clear();
        guideLineMarks.length = 0;
        guideLineRefDots.length = 0;
        if (guideSweepAnim != null && guideSweepAnim.raf) {
          cancelAnimationFrame(guideSweepAnim.raf);
        }
        guideSweepAnim = null;
        const ce = document.getElementById("paletteCompass");
        if (ce) ce.classList.remove("active");
        const rle = document.getElementById("paletteRedLine");
        if (rle) rle.classList.remove("active");
        setCanvasCursorFromHover(lastHoverCss.x, lastHoverCss.y);
        redraw();
      }

      (function initPaletteUndo() {
        const el = document.getElementById("paletteUndo");
        if (!el) return;
        el.addEventListener("click", function (e) {
          e.preventDefault();
          undoLastChange();
        });
        el.addEventListener("keydown", function (e) {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            undoLastChange();
          }
        });
      })();

      (function initPaletteClear() {
        const el = document.getElementById("paletteClear");
        if (!el) return;
        el.addEventListener("click", function (e) {
          e.preventDefault();
          clearCanvas();
        });
        el.addEventListener("keydown", function (e) {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            clearCanvas();
          }
        });
      })();

      window.addEventListener("resize", resize);
      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(resize);
      } else {
        requestAnimationFrame(resize);
      }
    })();
  </script>
</body>
</html>
